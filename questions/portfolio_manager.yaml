  explanation: "完整流程：(1)因子提案：研究员提交因子报告（经济逻辑、初步回测、文献支持）(2)同行评审：其他研究员独立复现、挑战假设 (3)高级审查：PM 和风控评估因子与现有组合的互补性 (4)独立回测：独立团队用 out-of-sample 数据验证 (5)纸上交易（paper trading）：至少3-6个月模拟盘运行 (6)小规模实盘：以5-10%权重纳入实盘 (7)全面部署：表现达标后逐步提升权重。关键检查点：t-stat > 3.0、ICIR > 0.5、与现有因子相关性 < 0.3、paper trading 期间表现符合预期。"
