  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在评估投资绩效时，以下哪种做法最能减少 outcome bias？\nWhen evaluating investment performance, which practice best reduces outcome bias?"
  options:
    - "A. 仅关注最终收益结果 / Only focus on final return outcomes"
    - "B. 评估决策过程的质量，而非仅看结果 / Evaluate the quality of the decision process, not just outcomes"
    - "C. 只在表现好时进行评估 / Only conduct evaluations when performance is good"
    - "D. 每天更换策略 / Change strategies daily"
  answer: "B"
  explanation: "Outcome bias 是指根据结果好坏来评判决策质量。正确做法是评估'决策过程的质量'：(1)是否基于合理的分析框架？(2)是否考虑了已知风险？(3)决策时可获取的信息是否被充分利用？好决策也可能有坏结果（bad luck），坏决策也可能有好结果（good luck）。这是 Annie Duke 的'Thinking in Bets'的核心思想。"
