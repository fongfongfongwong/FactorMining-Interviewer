- id: PM_LIQ_136
  category: liquidity_management
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在基金赎回压力管理中，liquidity cascade（流动性级联）风险是什么？\nWhat is liquidity cascade risk in fund redemption pressure management?"
  options:
    - "A. 赎回→被迫卖出流动性好的资产→组合流动性恶化→更多投资者赎回→恶性循环 / Redemptions → forced selling of liquid assets → portfolio liquidity deteriorates → more redemptions → vicious cycle"
    - "B. 所有投资者同时买入 / All investors buy simultaneously"
    - "C. 基金无法接受新申购 / Fund cannot accept new subscriptions"
    - "D. 只影响债券基金 / Only affects bond funds"
  answer: "A"
  explanation: "流动性级联(liquidity spiral)：(1)大额赎回来临→基金经理先卖流动性好的资产(大盘股/利率债)满足赎回；(2)卖出后组合中流动性差的资产(小盘股/信用债)比例增大→组合整体流动性恶化；(3)剩余投资者看到组合流动性恶化→更多人赎回(first-mover advantage)→基金被迫折价卖出流动性差的资产→NAV下跌→更多赎回。对策：(1)维持最低现金水平(如5%);(2)赎回门槛(gating)；(3)swing pricing(赎回者承担市场冲击成本)；(4)按比例卖出(不cherry-pick流动性好的)。"
