- id: PM_DER_140
  category: derivative_overlays
  difficulty: expert
  type: show_work
  points: 5
  question: "一个股票组合当前beta为1.2，组合规模10亿元。PM希望临时将beta降至0.8（预期市场下跌）。沪深300期货面值每手约100万元，beta≈1.0。计算：(1)需要卖出多少手期货？(2)对冲后如果市场下跌5%，组合的预期表现是什么？(3)列举使用期货overlay的3个风险。\nPortfolio beta=1.2, size=1B CNY. PM wants to reduce beta to 0.8 temporarily. CSI300 futures: ~1M per contract, beta≈1.0. Calculate: (1) contracts to sell; (2) expected P&L if market drops 5%; (3) three risks of futures overlay."
  options: []
  answer: "(1) 需要对冲的beta = 1.2 - 0.8 = 0.4。对冲金额 = 0.4 × 10亿 = 4亿元。期货手数 = 4亿 / (100万 × 1.0) = 400手。卖出400手沪深300期货。\n\n(2) 市场下跌5%时：股票组合P&L = -5% × 1.2 × 10亿 = -6000万。期货对冲P&L = +5% × 1.0 × 400 × 100万 = +2000万。净P&L = -6000 + 2000 = -4000万 = -4%。验证：-4% = -5% × 0.8(调整后beta)。\n\n(3) 风险：(a)基差风险(basis risk)——期货价格与现货指数的偏离导致对冲不完美；(b)保证金风险(margin risk)——期货需要缴纳保证金，极端行情下可能追加保证金；(c)滚动风险(rollover risk)——期货到期需要滚动，新旧合约价差产生成本。"
  explanation: "期货overlay是最常用的beta管理工具。关键：(1)手数计算=目标beta变化×组合规模/(期货面值×期货beta)；(2)验证对冲效果：调整后beta=原beta-对冲beta=1.2-0.4=0.8。"
  hints:
    - "手数 = (目标beta变化 × 组合规模) / 期货面值"
    - "注意期货本身的beta(此处为1.0)"
  rubric: "手数计算(2分)；P&L分析(1分)；三种风险(2分)"
