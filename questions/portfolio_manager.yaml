  question: "在'risk budget meets tail risk'的框架下，以下哪种方法最有效地将尾部风险纳入组合优化？\nWhich method most effectively incorporates tail risk into portfolio optimization?"
  options:
    - "A. 使用CVaR(Conditional Value-at-Risk)替代方差作为风险度量 / Use CVaR instead of variance as the risk measure"
    - "B. 使用标准差 / Use standard deviation"
    - "C. 忽略尾部风险 / Ignore tail risk"
    - "D. 只关注最大回撤 / Only focus on max drawdown"
  answer: "A"
  explanation: "CVaR(又称Expected Shortfall, ES)：(1)定义：给定置信水平α(如95%)，CVaR是损失超过VaR时的条件期望——即'在最差5%的情景下平均会亏多少'；(2)相比VaR的优势：CVaR是coherent risk measure(满足subadditivity——组合的CVaR ≤ 各资产CVaR之和)；(3)在优化中用CVaR替代方差：min CVaR s.t. return ≥ target——自动偏好低尾部风险的组合；(4)计算：可用scenario-based optimization(历史或模拟的收益率scenario)。"
  hints: []
  rubric: ""
  time_limit_seconds: 120

