  question: "在量化投资组合中整合ESG因子时，以下哪种方法最常用？\nWhat is the most common approach to integrating ESG factors into quantitative portfolios?"
  options:
    - "A. 将ESG评分作为额外的alpha因子或约束条件纳入优化器 / Incorporate ESG scores as additional alpha factors or constraints in the optimizer"
    - "B. 完全排除所有ESG评分低的公司 / Completely exclude all low-ESG-score companies"
    - "C. 忽略ESG因素 / Ignore ESG factors"
    - "D. 仅投资ESG评分最高的10家公司 / Only invest in top 10 ESG companies"
  answer: "A"
  explanation: "ESG整合方法从简单到复杂：(1)负面筛选(exclusion)——排除特定行业(如烟草、军工)，最简单但损失投资域；(2)ESG约束——在优化器中加入ESG得分下限约束(如组合加权ESG > benchmark ESG)；(3)ESG作为alpha因子——将ESG得分与其他因子(如value, momentum)一起纳入alpha模型；(4)ESG tilting——在基准权重基础上按ESG得分调整。方法(2)(3)最常用，兼顾ESG目标和投资回报。"
