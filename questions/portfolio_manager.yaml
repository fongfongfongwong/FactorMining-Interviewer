  explanation: "Tail Risk Parity vs Risk Parity：(1)传统Risk Parity以波动率(标准差)为风险度量——假设收益率正态分布；(2)Tail Risk Parity以CVaR为风险度量——考虑了肥尾(fat tail)和非对称性；(3)区别：某些资产(如credit)波动率低但尾部风险大(突然违约)——传统RP会超配credit, Tail RP会减配；(4)计算更复杂(CVaR不像方差那样有解析解)，通常需要scenario-based optimization。"
