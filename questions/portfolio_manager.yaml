  question: "在构建 factor-based portfolio 时，以下哪种方法最能有效控制非目标因子的暴露？\nWhen constructing a factor-based portfolio, which method best controls unintended factor exposures?"
  options:
    - "A. 简单的因子排序分组（quintile sort）/ Simple factor quintile sorting"
