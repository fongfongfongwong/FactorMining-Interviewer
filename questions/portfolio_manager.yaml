- id: PM_TEAM_002
  category: team_management
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在量化投资团队的决策复盘中，以下哪种做法最有助于避免 hindsight bias（事后偏差）？\nIn a quant team's decision review process, which practice best helps avoid hindsight bias?"
  options:
    - "A. 仅在策略表现不佳时进行复盘 / Only conduct reviews when strategy underperforms"
    - "B. 在做决策时预先记录决策理由和预期结果，复盘时对照实际结果评估决策过程而非仅看结果 / Pre-record decision rationale and expected outcomes; during review evaluate the process against actual results, not just outcomes"
    - "C. 删除所有历史决策记录以避免偏见 / Delete all historical decision records to avoid bias"
    - "D. 只让第三方进行复盘 / Only have third parties conduct reviews"
  answer: "B"
  explanation: "避免 hindsight bias 的关键是'事前记录、事后对照'：(1)在做决策时记录理由、假设、预期结果和风险评估（Investment Decision Log）(2)复盘时对照当时记录评估决策过程质量（而非仅看最终收益）(3)这避免了事后用已知结果来评判当时决策的合理性。好决策也可能有坏结果，坏决策也可能有好结果。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

