  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在组合再平衡中，calendar rebalancing 和 threshold rebalancing 的关键区别是什么？\nWhat is the key difference between calendar rebalancing and threshold rebalancing?"
  options:
    - "A. Calendar rebalancing 按固定时间间隔调整，threshold rebalancing 当偏离超过阈值时调整 / Calendar rebalances at fixed intervals; threshold rebalances when drift exceeds a threshold"
