  question: "ESG momentum（ESG评分变化）作为投资因子的逻辑是什么？\nWhat is the investment logic of ESG momentum (ESG score changes) as a factor?"
  options:
    - "A. ESG评分正在改善的公司可能有未被市场充分定价的正面变化(如治理改善→盈利提升) / Companies with improving ESG scores may have underpriced positive changes"
