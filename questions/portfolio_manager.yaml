- id: PM_PORT_005
  category: portfolio_construction
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "Active Share 衡量的是什么？当 Active Share = 20% 时意味着什么？\nWhat does Active Share measure? What does Active Share = 20% imply?"
  options:
    - "A. 组合与基准的跟踪误差为20% / The tracking error vs benchmark is 20%"
    - "B. 组合中20%的持仓权重与基准不同 / 20% of portfolio weights differ from benchmark"
    - "C. 组合超额收益为20% / Portfolio excess return is 20%"
    - "D. 组合的换手率为20% / Portfolio turnover is 20%"
  answer: "B"
  explanation: "Active Share = (1/2) * Σ|w_p,i - w_b,i|，衡量组合持仓与基准之间权重差异的绝对值之和的一半。Active Share = 20% 表示组合与基准的持仓重合度很高（80%相同），属于 closet indexing。高 Active Share（>60%）通常意味着更积极的主动管理。"
  hints: []
  rubric: ""
  time_limit_seconds: 120

- id: PM_PORT_006
