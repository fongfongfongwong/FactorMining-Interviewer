  question: "在因子研究中，为什么需要对因子值做截面标准化（cross-sectional standardization）？\nWhy is cross-sectional standardization of factor values necessary in factor research?"
  options:
    - "A. 使不同因子具有可比性，便于合成综合得分 / To make different factors comparable for composite score construction"
    - "B. 提高因子的预测能力 / To improve factor predictive power"
