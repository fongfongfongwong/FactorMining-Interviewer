- id: PM_RISK_001
  category: risk_attribution
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在 Barra 多因子风险模型中，股票的风险被分解为哪些部分？\nIn the Barra multi-factor risk model, how is a stock's risk decomposed?"
  options:
    - "A. 系统性风险和非系统性风险（因子风险 + 特异性风险）/ Systematic risk and idiosyncratic risk (factor risk + specific risk)"
    - "B. 上行风险和下行风险 / Upside risk and downside risk"
    - "C. 短期风险和长期风险 / Short-term risk and long-term risk"
    - "D. 流动性风险和信用风险 / Liquidity risk and credit risk"
  answer: "A"
  explanation: "Barra 模型将股票收益表示为：r_i = Σ(X_ik * f_k) + ε_i，其中 X_ik 是因子暴露，f_k 是因子收益，ε_i 是特异性收益。相应地，风险分解为因子风险（systematic）和特异性风险（idiosyncratic）。组合层面：σ²_p = X'_p * F * X_p + Δ_p，F 是因子协方差矩阵，Δ_p 是特异性方差。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

- id: PM_RISK_002
  category: risk_attribution
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "Brinson 业绩归因模型将超额收益分解为哪几个部分？\nThe Brinson attribution model decomposes excess return into which components?"
  options:
    - "A. Alpha 和 Beta / Alpha and Beta"
    - "B. 配置效应、选择效应和交互效应 / Allocation effect, selection effect, and interaction effect"
    - "C. 因子收益和残差收益 / Factor return and residual return"
    - "D. 绝对收益和相对收益 / Absolute return and relative return"
  answer: "B"
  explanation: "Brinson-Fachler 模型：超额收益 = 配置效应（Allocation）+ 选择效应（Selection）+ 交互效应（Interaction）。Allocation = Σ(w_p,j - w_b,j)(r_b,j - r_b)；Selection = Σw_b,j(r_p,j - r_b,j)；Interaction = Σ(w_p,j - w_b,j)(r_p,j - r_b,j)。其中 j 代表资产分组（通常按行业）。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

