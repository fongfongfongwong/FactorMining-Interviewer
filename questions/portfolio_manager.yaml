    - "B. 在多个账户之间频繁对倒交易以制造虚假成交量 / Frequent wash trading between multiple accounts to create false volume"
    - "C. 按照投资组合模型调整持仓 / Adjusting positions according to portfolio model"
    - "D. 使用限价单下单 / Using limit orders"
