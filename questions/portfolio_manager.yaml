  answer: ""
  explanation: "分析框架：(1)统计分析：当前回撤是否在历史分布内？如果 -3σ 以外需高度警惕 (2)因子归因：哪些因子贡献了负收益？是因子层面失效还是特异性损失？(3)市场环境分析：是否处于极端 regime？类似环境历史上是否出现过？(4)因子有效性检验：当前 IC/ICIR 是否显著恶化？(5)Crowding 检查：策略是否过于拥挤？(6)模型诊断：输入数据有无问题？代码有无 bug？(7)同行比较：同类策略是否也在回撤？若是，更可能是系统性因素而非模型失效。决策矩阵：短期噪音→维持策略；因子衰退→调整权重；模型失效→暂停并调查。"
