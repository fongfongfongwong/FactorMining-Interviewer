  question: "请描述你理想中的 research-to-portfolio pipeline：从研究员发现一个新因子到该因子被纳入实盘组合的完整流程和质量控制节点。\nDescribe your ideal research-to-portfolio pipeline: the complete process and quality control checkpoints from a researcher discovering a new factor to it being deployed in the live portfolio."
