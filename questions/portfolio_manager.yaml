  explanation: "Winsorize（缩尾处理）将超出阈值（如 ±3σ 或 ±5σ）的极端值截断到阈值水平。目的是：(1)防止极端异常值主导合成信号 (2)降低因子对数据错误的敏感性 (3)使因子分布更接近正态，提高后续统计分析的可靠性。通常在标准化之前进行。"
