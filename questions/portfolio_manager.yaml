- id: PM_PORT_015
  category: portfolio_construction
  difficulty: expert
  type: show_work
  points: 1
  question: "请推导 Risk Parity 组合中资产 i 的边际风险贡献（Marginal Contribution to Risk, MCTR）公式，并说明如何从 MCTR 推导出 Total Contribution to Risk (TCTR)。假设组合有 N 个资产。\nDerive the Marginal Contribution to Risk (MCTR) formula for asset i in a Risk Parity portfolio, and show how TCTR follows. Assume N assets."
  options: []
  answer: ""
  explanation: "组合风险 σ_p = √(w'Σw)。MCTR_i = ∂σ_p/∂w_i = (Σw)_i / σ_p。TCTR_i = w_i * MCTR_i = w_i * (Σw)_i / σ_p。可验证 Σ TCTR_i = σ_p（Euler 分解定理）。Risk Parity 条件: TCTR_i = σ_p / N 对所有 i。"
  hints:
    - "从 σ_p² = w'Σw 开始，对 w_i 求偏导"
    - "利用 Euler's theorem for homogeneous functions"
  rubric: "满分要点：(1)正确推导MCTR (2)正确推导TCTR (3)验证Euler分解 (4)写出Risk Parity条件"
  time_limit_seconds: 480

