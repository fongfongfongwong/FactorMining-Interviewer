    - "D. 做多波动率ETF / Long volatility ETF"
  answer: "A"
  explanation: "尾部风险对冲工具比较：(1)OTM Put——最直接的保险(payoff在S跌破strike时生效)，成本是premium(类似保费)；(2)缺点：长期持有成本高(theta decay)、需要选择合适的strike和tenor；(3)优化：使用put spread(买近OTM put+卖远OTM put)降低成本但限制保护程度；(4)替代方案：VIX call options(波动率飙升时获利)、CDS(信用风险对冲)、managed futures(crisis alpha)。现金增加虽然降低风险但也降低收益。"
