  explanation: "Alpha Decay 指因子信号产生后，其预测能力（alpha）随时间推移而衰减。快速衰减的因子（如短期反转）需要更频繁的交易来捕获，但也意味着更高的交易成本。慢速衰减的因子（如价值）允许较低换手率。Alpha decay profile 是设计持仓期和换手率的关键参考。"
