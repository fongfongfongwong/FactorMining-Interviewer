  points: 1
  question: "以下关于 benchmark tracking 的说法，哪个是正确的？\nWhich statement about benchmark tracking is correct?"
  options:
    - "A. Tracking Error 越大说明组合表现越好 / Higher Tracking Error means better performance"
    - "B. Full replication 适用于成分股数量非常多的指数 / Full replication works best for indices with very many constituents"
    - "C. Stratified sampling 通过匹配关键风险因子特征来近似复制指数 / Stratified sampling replicates the index by matching key risk factor characteristics"
    - "D. Tracking Error 仅由交易成本决定 / Tracking Error is determined solely by transaction costs"
