  question: "一个因子的 IC 均值为 0.04，IC 标准差为 0.08。投资组合覆盖 500 只股票。使用 Grinold 基本法则估算该组合的 Information Ratio。\nA factor has mean IC = 0.04 and IC standard deviation = 0.08. The portfolio covers 500 stocks. Use the Fundamental Law of Active Management to estimate the portfolio's IR."
  options: []
  answer: ""
  explanation: "Grinold 基本法则：IR ≈ IC * √BR，其中 BR（breadth）是独立投注次数。如果每月调仓，且假设500只股票的投注相互独立，则 BR = 500。IR ≈ 0.04 * √500 ≈ 0.04 * 22.36 ≈ 0.89。ICIR = IC_mean / IC_std = 0.04/0.08 = 0.5。注意：实际中独立投注假设过于理想，因子间相关性、行业相关性会降低有效 BR。"
  hints:
    - "IR ≈ IC × √BR"
    - "考虑 breadth 的实际含义"
  rubric: "满分要点：(1)正确引用基本法则 (2)正确计算 (3)讨论假设的局限性 (4)计算 ICIR"
  time_limit_seconds: 300

