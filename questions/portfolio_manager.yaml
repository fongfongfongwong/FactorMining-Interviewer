  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "T+1 交易制度对量化策略的最大影响是什么？\nWhat is the biggest impact of the T+1 settlement rule on quantitative strategies?"
  options:
    - "A. 没有任何影响 / No impact"
    - "B. 当日买入的股票不能当日卖出，限制了日内交易和风险管理的灵活性 / Shares bought today cannot be sold the same day, limiting intraday trading and risk management flexibility"
    - "C. 增加了交易成本 / Increases transaction costs"
    - "D. 仅影响小盘股 / Only affects small-cap stocks"
  answer: "B"
  explanation: "T+1 制度意味着当日买入的股票次日才能卖出。影响：(1)日内策略受限（虽可通过持有底仓+日内 T+0 变相实现）(2)买入后当天无法止损（增加隔夜风险）(3)组合再平衡需要分两天完成（卖旧买新）(4)对快速衰减的 alpha 信号执行效率降低。量化策略需要将 T+1 约束纳入优化器和交易管理系统。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

- id: PM_COMP_003
  category: compliance
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "根据中国证监会规定，公募基金的持仓集中度限制（'双十规定'）是什么？\nAccording to CSRC regulations, what are the concentration limits for mutual funds (the 'double-ten rule')?"
  options:
    - "A. 单只股票持仓不超过基金净值的10%，同一基金管理人旗下所有基金持有单只股票不超过该股票流通市值的10% / Single stock ≤ 10% of fund NAV; all funds under same manager ≤ 10% of stock's free-float market cap"
    - "B. 单只股票不超过5% / Single stock ≤ 5%"
    - "C. 前10大持仓不超过50% / Top 10 holdings ≤ 50%"
    - "D. 没有集中度限制 / No concentration limits"
  answer: "A"
  explanation: "'双十规定'是中国公募基金的核心持仓限制：(1)一只基金持有某只股票的市值不超过基金净值的 10% (2)同一基金管理人管理的所有基金持有某只股票不超过该股票流通市值的 10%。量化策略在优化器中必须严格执行此约束，特别是管理多只产品时需要考虑联合约束。"
