  answer: "A"
  explanation: "单期 Brinson 分解的各效应简单加总无法还原多期累积超额收益，因为收益是几何（乘法）累积的。解决方法包括：(1) Carino linking（对数调整）(2) Menchero method（将跨期交互分配到各效应中）(3) GRAP（几何归因）。这些方法确保多期归因结果精确分解。"
