  question: "在使用 Robust Optimization 构建组合时，uncertainty set 的选择如何影响结果？\nIn Robust Optimization for portfolio construction, how does the choice of uncertainty set affect results?"
  options:
    - "A. Uncertainty set 越大，组合越集中 / Larger uncertainty set leads to more concentrated portfolio"
    - "B. Uncertainty set 越大，组合越接近等权重 / Larger uncertainty set leads to portfolio closer to equal-weight"
    - "C. Uncertainty set 的形状不影响结果 / The shape of the uncertainty set does not affect results"
    - "D. Robust Optimization 总是优于传统 MVO / Robust Optimization always outperforms traditional MVO"
