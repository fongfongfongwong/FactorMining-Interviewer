  explanation: "好的 KPI 体系应包括：(1)过程指标：研究方法论的严谨性、代码质量、文档完整性 (2)结果指标：新因子的 IC/ICIR、纳入组合后的贡献 (3)协作指标：code review 参与度、知识分享频率 (4)创新指标：新方法探索、学术跟踪。仅看收益结果会鼓励冒险和过拟合，仅看过程会缺乏成果导向。"
