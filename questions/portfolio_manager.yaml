- id: PM_PORT_014
  category: portfolio_construction
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "以下关于组合再平衡的交易成本与收益权衡，哪个说法正确？\nRegarding the cost-benefit tradeoff of portfolio rebalancing, which statement is correct?"
  options:
    - "A. 再平衡频率越高，组合表现一定越好 / Higher rebalancing frequency always leads to better performance"
    - "B. 再平衡可以利用均值回归效应，但过于频繁的再平衡会因交易成本侵蚀收益 / Rebalancing exploits mean reversion but excessive rebalancing erodes returns via transaction costs"
    - "C. 不再平衡的组合长期一定跑赢再平衡的组合 / A never-rebalanced portfolio always outperforms a rebalanced one"
    - "D. 再平衡仅影响收益，不影响风险 / Rebalancing only affects returns, not risk"
  answer: "B"
  explanation: "再平衡的收益来源之一是利用资产价格的均值回归（rebalancing premium），即卖高买低。但每次再平衡都产生交易成本（佣金、冲击成本、买卖价差），因此存在最优再平衡频率。学术研究（如 Kritzman 等）表明，最优频率取决于交易成本水平和资产波动特征。"
