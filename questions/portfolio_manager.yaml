  question: "在构建 composite alpha signal 时，为什么通常先对单因子做 winsorize 处理？\nWhen constructing a composite alpha signal, why is winsorization typically applied to individual factors first?"
  options:
    - "A. 增加因子方差 / To increase factor variance"
    - "B. 限制极端值对合成信号的过大影响，提高信号的稳健性 / To limit the outsized impact of extreme values on the composite signal and improve robustness"
    - "C. 使因子值全部变为正数 / To make all factor values positive"
    - "D. 减少计算量 / To reduce computational cost"
