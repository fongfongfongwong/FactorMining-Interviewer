  question: "组合的 Information Ratio = 0.8，年化 Tracking Error = 3%。该组合的年化超额收益（相对基准）是多少？\nIf a portfolio's Information Ratio = 0.8 and annualized Tracking Error = 3%, what is the annualized excess return?"
