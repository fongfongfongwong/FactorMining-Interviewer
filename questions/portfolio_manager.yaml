  explanation: "Tracking Error (TE) = std(r_p - r_b)，是组合超额收益（相对基准）的标准差。TE 衡量组合偏离基准的波动程度。例如，年化 TE = 2% 意味着组合收益相对基准的偏差在 68% 的时间内不超过 ±2%。Information Ratio = 超额收益均值 / TE。"
  hints: []
