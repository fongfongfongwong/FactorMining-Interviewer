  question: "在量化组合的流动性管理中，以下哪种指标最适合衡量组合的整体流动性？\nWhich metric best measures overall portfolio liquidity in quantitative portfolio management?"
  options:
    - "A. Days-to-Liquidate (DTL)——按正常日均交易量的一定比例完全清仓所需天数 / Days-to-Liquidate — days needed to fully liquidate at a fraction of ADV"
    - "B. 股票数量 / Number of stocks"
    - "C. 组合市值 / Portfolio market cap"
    - "D. 持仓集中度 / Position concentration"
  answer: "A"
  explanation: "Days-to-Liquidate(DTL)：(1)计算：DTL_i = Position_i / (Participation_Rate × ADV_i)，组合DTL = max(DTL_i)或加权平均；(2)Participation Rate通常设为日均交易量的10-25%(超过25%市场冲击急剧增加)；(3)应用：限制组合DTL < N天(如5天)——确保在需要时可以及时清仓；(4)对A股：大市值股(沪深300成分)DTL通常<1天，小市值可能>10天。流动性管理在极端行情中尤为重要(流动性枯竭时ADV大幅缩小)。"
