- id: PM_TAIL_160
  category: tail_risk_hedging
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在量化组合的drawdown control（回撤控制）中，以下哪种方法最为实用？\nWhich drawdown control method is most practical for quantitative portfolios?"
  options:
    - "A. CPPI (Constant Proportion Portfolio Insurance)——根据剩余缓冲(cushion=组合价值-floor)动态调整风险资产配置 / CPPI — dynamically adjust risky asset allocation based on remaining cushion"
    - "B. 设置止损后永不再进入 / Set stop-loss and never re-enter"
    - "C. 不做回撤控制 / No drawdown control"
    - "D. 只在回撤时加仓 / Only add positions during drawdowns"
  answer: "A"
  explanation: "CPPI回撤控制：(1)设定floor(如不允许回撤超过10%→floor=0.9×initial NAV)；(2)cushion = 组合价值 - floor；(3)风险资产配置 = multiplier × cushion/组合价值(如multiplier=5)；(4)效果：组合下跌时cushion缩小→自动减少风险资产(derisking)；组合上涨时cushion增大→增加风险资产(re-risking)；(5)floor是动态的——可以用rolling max drawdown target；(6)挑战：在gap down(跳空下跌)时可能穿透floor(CPPI不是完美保险)。"
  hints: []
  rubric: ""
  time_limit_seconds: 120
