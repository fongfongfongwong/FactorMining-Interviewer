  question: "关于 Minimum Variance Portfolio，以下哪个说法是错误的？\nWhich statement about the Minimum Variance Portfolio is INCORRECT?"
  options:
    - "A. 它不需要预期收益的输入 / It does not require expected return inputs"
    - "B. 它位于 efficient frontier 的最左端 / It sits at the leftmost point of the efficient frontier"
    - "C. 它一定能产生最高的 Sharpe Ratio / It always produces the highest Sharpe Ratio"
    - "D. 实证中它往往能跑赢市值加权指数 / Empirically it often outperforms cap-weighted indices"
  answer: "C"
  explanation: "Minimum Variance Portfolio 最小化组合波动率，不需要预期收益输入。它位于 efficient frontier 最左端。但最高 Sharpe Ratio 的组合是 tangency portfolio（切点组合），不是 MVP。实证研究（如 Clarke, De Silva, Thorley 2006）表明 MVP 确实往往能跑赢市值加权指数，这与低波动异象（low-volatility anomaly）相关。"
