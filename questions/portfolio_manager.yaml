- id: PM_PORT_010
  category: portfolio_construction
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在 Black-Litterman 模型中，τ (tau) 参数的作用是什么？\nIn the Black-Litterman model, what role does the parameter τ (tau) play?"
  options:
    - "A. 控制先验收益（equilibrium returns）的不确定性程度 / Controls the uncertainty of prior equilibrium returns"
    - "B. 决定组合中的最大单一持仓权重 / Determines the maximum single-position weight"
    - "C. 设定目标跟踪误差 / Sets the target tracking error"
    - "D. 衡量投资者的风险厌恶程度 / Measures the investor's risk aversion"
  answer: "A"
  explanation: "τ 是一个标量参数，乘以协方差矩阵 Σ 来表示均衡收益估计的不确定性（即先验分布的方差 τΣ）。τ 越大，表示对均衡收益的信心越低，投资者观点在后验中的权重越大。通常 τ 取值在 0.01 到 0.05 之间。"
  hints: []
  rubric: ""
  time_limit_seconds: 120

