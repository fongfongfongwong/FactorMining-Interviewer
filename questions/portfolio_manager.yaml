- id: PM_ESG_104
  category: esg_integration
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "Carbon footprint（碳足迹）在投资组合碳排放管理中如何计算和使用？\nHow is carbon footprint calculated and used in portfolio carbon management?"
  options:
    - "A. 组合碳足迹 = Σ(w_i × Carbon_Intensity_i)，其中碳强度=碳排放量/收入；用于设定减排目标和基准对比 / Portfolio CF = Σ(w_i × Carbon_Intensity_i); used for reduction targets and benchmarking"
    - "B. 只统计直接排放 / Only count direct emissions"
    - "C. 碳足迹与投资无关 / Carbon footprint is irrelevant to investing"
    - "D. 不需要量化碳排放 / No need to quantify emissions"
  answer: "A"
  explanation: "组合碳排放管理：(1)碳排放范围：Scope 1(直接排放)+Scope 2(外购电力排放)为基础，Scope 3(价值链排放)逐步纳入；(2)碳强度(WACI=Weighted Average Carbon Intensity)——组合加权平均碳排放/收入，可跨组合比较；(3)应用：设定比基准减排30%的目标→在优化器中约束组合WACI < 70%×benchmark WACI；(4)净零路径(Net Zero)：逐年降低碳足迹目标(如每年-7%对齐Paris Agreement)。"
