  answer: "A"
  explanation: "A 股涨跌停制度：主板（上交所、深交所）普通股 ±10%，ST 股 ±5%。科创板和创业板注册制改革后调整为 ±20%。新股上市前5个交易日不设涨跌停（科创板和创业板）。量化策略必须在交易和回测中正确处理涨跌停：涨停无法买入、跌停无法卖出。"
