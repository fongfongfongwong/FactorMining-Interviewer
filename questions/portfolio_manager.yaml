  question: "在因子合成中，使用 Rank IC 相比 Pearson IC 的主要优势是什么？\nWhat is the main advantage of using Rank IC over Pearson IC in factor evaluation?"
  options:
    - "A. Rank IC 不受异常值影响，对非线性单调关系也敏感 / Rank IC is robust to outliers and captures nonlinear monotonic relationships"
    - "B. Rank IC 计算更快 / Rank IC is faster to compute"
    - "C. Rank IC 总是比 Pearson IC 大 / Rank IC is always larger than Pearson IC"
    - "D. Rank IC 不需要收益率数据 / Rank IC does not require return data"
  answer: "A"
  explanation: "Rank IC（Spearman 秩相关系数）基于排序而非原始值，因此：(1)不受极端异常值影响 (2)能捕捉单调非线性关系（如因子值翻倍时收益不翻倍但排序关系成立）(3)对因子值分布无要求。Pearson IC 在数据含有异常值或关系非线性时可能严重低估因子的实际预测能力。"
