- id: PM_PORT_008
  category: portfolio_construction
  difficulty: expert
  type: show_work
  points: 1
  question: "假设一个两资产组合，资产A预期收益10%，波动率15%，资产B预期收益6%，波动率8%，相关系数0.3。请推导全局最小方差组合（Global Minimum Variance Portfolio）的权重公式并计算具体权重。\nGiven a two-asset portfolio: Asset A has expected return 10%, volatility 15%; Asset B has expected return 6%, volatility 8%; correlation = 0.3. Derive the GMVP weight formula and compute the weights."
  options: []
  answer: ""
  explanation: "GMVP 权重公式: w_A = (σ_B² - ρ*σ_A*σ_B) / (σ_A² + σ_B² - 2*ρ*σ_A*σ_B)。代入: w_A = (0.0064 - 0.3*0.15*0.08) / (0.0225 + 0.0064 - 2*0.3*0.15*0.08) = (0.0064 - 0.0036) / (0.0225 + 0.0064 - 0.0072) = 0.0028 / 0.0217 ≈ 0.129。所以 w_A ≈ 12.9%, w_B ≈ 87.1%。"
  hints:
    - "最小化 σ_p² = w²σ_A² + (1-w)²σ_B² + 2w(1-w)ρσ_Aσ_B"
    - "对 w 求导并令导数为零"
  rubric: "满分要点：(1)正确写出组合方差公式 (2)正确求导 (3)推导出权重公式 (4)代入数值计算正确"
  time_limit_seconds: 480

- id: PM_PORT_009
