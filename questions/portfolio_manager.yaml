  type: multiple_choice
  points: 1
  question: "Tracking Error 的定义是什么？\nWhat is the definition of Tracking Error?"
  options:
    - "A. 组合收益减去基准收益的平均值 / The average of portfolio return minus benchmark return"
    - "B. 组合收益与基准收益之差的标准差 / The standard deviation of the difference between portfolio and benchmark returns"
