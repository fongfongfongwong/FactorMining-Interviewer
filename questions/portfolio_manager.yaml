- id: PM_ALPHA_016
  category: alpha_factors
  difficulty: expert
  type: show_work
  points: 1
  question: "假设有3个因子，IC均值分别为 [0.03, 0.05, 0.02]，IC协方差矩阵为 [[0.01, 0.002, 0.001], [0.002, 0.015, 0.003], [0.001, 0.003, 0.008]]。请推导最大化 ICIR 的最优因子合成权重。\nGiven 3 factors with IC means [0.03, 0.05, 0.02] and IC covariance matrix as above, derive the optimal factor combination weights that maximize ICIR."
  options: []
  answer: ""
  explanation: "最大化 ICIR = μ'w / √(w'Σw) 等价于求解 w* = Σ⁻¹μ（然后归一化）。这与 Markowitz tangency portfolio 的解法相同。需要计算 IC 协方差矩阵的逆矩阵，然后乘以 IC 均值向量。结果归一化后得到最优权重。实际中，由于 IC 估计噪声大，通常对权重向等权方向做 shrinkage。"
  hints:
    - "类比 tangency portfolio 的推导"
    - "w* ∝ Σ⁻¹μ"
  rubric: "满分要点：(1)正确设定优化问题 (2)推导出w* = Σ⁻¹μ (3)讨论归一化 (4)讨论shrinkage的必要性"
  time_limit_seconds: 480

