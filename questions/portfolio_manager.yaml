- id: PM_PORT_001
  category: portfolio_construction
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在 Mean-Variance Optimization 中，efficient frontier 上的每一个点代表什么？\nIn Mean-Variance Optimization, what does each point on the efficient frontier represent?"
  options:
    - "A. 给定风险水平下的最大预期收益组合 / The portfolio with maximum expected return for a given level of risk"
    - "B. 给定收益水平下的最大风险组合 / The portfolio with maximum risk for a given return"
    - "C. 所有资产等权重配置的组合 / An equal-weight allocation of all assets"
    - "D. 全球最小方差组合 / The global minimum variance portfolio only"
  answer: "A"
  explanation: "Efficient frontier 上的每个点代表在给定风险（标准差）水平下能够获得的最高预期收益的投资组合，或等价地，在给定预期收益水平下风险最小的组合。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

- id: PM_PORT_002
  category: portfolio_construction
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "Black-Litterman 模型相比传统 MVO 的核心优势是什么？\nWhat is the core advantage of the Black-Litterman model over traditional MVO?"
  options:
    - "A. 不需要协方差矩阵 / It does not require a covariance matrix"
    - "B. 将投资者观点与市场均衡收益相结合，生成更稳定的配置 / It combines investor views with market equilibrium returns for more stable allocations"
    - "C. 能保证正的超额收益 / It guarantees positive excess returns"
    - "D. 仅适用于股票市场 / It only applies to equity markets"
  answer: "B"
  explanation: "Black-Litterman 的核心创新是以 CAPM 均衡收益（implied equilibrium returns）为先验，再融合投资者主观观点（views），通过贝叶斯框架生成后验收益估计。这避免了 MVO 对输入参数极度敏感导致的极端权重问题。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

- id: PM_PORT_003
  category: portfolio_construction
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "Risk Parity 策略的核心思想是什么？\nWhat is the core idea behind a Risk Parity strategy?"
  options:
    - "A. 使每个资产的名义权重相等 / Equal nominal weight for each asset"
    - "B. 使每个资产对组合总风险的贡献相等 / Equal risk contribution from each asset to total portfolio risk"
    - "C. 最大化组合的 Sharpe Ratio / Maximize the portfolio Sharpe Ratio"
    - "D. 最小化组合的最大回撤 / Minimize the portfolio maximum drawdown"
  answer: "B"
  explanation: "Risk Parity 的核心是使每个资产（或资产类别）对组合总风险的边际贡献（marginal contribution to risk）相等。这通常意味着低波动资产（如债券）获得更高权重，高波动资产（如股票）获得较低权重。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

- id: PM_PORT_004
