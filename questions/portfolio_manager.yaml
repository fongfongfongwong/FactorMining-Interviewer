  question: "在多期业绩归因中，Brinson 模型面临的主要问题是什么？如何解决？\nWhat is the main issue with the Brinson model in multi-period attribution? How is it resolved?"
  options:
    - "A. 多期分解不具有可加性，可使用几何链接法（geometric linking）解决 / Multi-period decomposition is not additive; solved by geometric linking methods"
