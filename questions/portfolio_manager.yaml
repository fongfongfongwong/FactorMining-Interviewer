  explanation: "CVaR（Conditional VaR，又称 Expected Shortfall）衡量损失超过 VaR 阈值后的平均损失，对尾部风险最为敏感。波动率是对称度量，不区分尾部；VaR 只给出一个分位数的损失值，不关注超过该分位数后的损失程度；CVaR 则完整刻画了尾部损失分布。"
