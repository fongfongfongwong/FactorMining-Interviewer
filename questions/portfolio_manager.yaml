- id: PM_ESG_102
  category: esg_integration
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在ESG投资中，'double materiality'（双重重要性）的概念是什么？\nWhat is the concept of 'double materiality' in ESG investing?"
  options:
    - "A. ESG因素既影响公司财务表现(financial materiality)，公司活动也影响环境和社会(impact materiality) / ESG factors affect company financials AND company activities affect environment/society"
    - "B. 只考虑财务影响 / Only consider financial impact"
    - "C. 只考虑环境影响 / Only consider environmental impact"
    - "D. ESG不具有重要性 / ESG is not material"
  answer: "A"
  explanation: "双重重要性(EU CSRD/ESRS框架)：(1)Financial materiality(由外向内)——ESG风险如何影响公司的财务状况和估值(如气候风险导致资产减值)；(2)Impact materiality(由内向外)——公司活动如何影响环境和社会(如碳排放、劳工问题)。量化投资中：financial materiality更直接影响alpha；impact materiality满足ESG mandate和监管要求。两者都应纳入。"
  hints: []
  rubric: ""
  time_limit_seconds: 120

- id: PM_ESG_103
  category: esg_integration
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在构建ESG量化组合时，不同ESG数据供应商(MSCI, Sustainalytics, Bloomberg)评分差异大的主要原因是什么？\nWhat is the main reason for large ESG score differences across data providers?"
  options:
    - "A. 评估框架不同——各供应商对E/S/G的权重、子指标选择和计算方法不同 / Different frameworks — providers differ in E/S/G weights, sub-indicator selection, and methodology"
    - "B. 数据来源完全不同 / Completely different data sources"
    - "C. 随机误差 / Random error"
    - "D. 供应商恶意操纵 / Provider manipulation"
  answer: "A"
  explanation: "ESG评分分歧(Berg, Kolbel, Rigobon, 2022)：(1)不同供应商间ESG评分相关性仅~0.5(vs信用评级~0.99)；(2)原因：权重分歧(MSCI偏重行业关键风险, Sustainalytics偏重全面评估)、指标选择(碳排放vs碳强度vs碳足迹)、测量方法(绝对值vs同行相对值)；(3)对量化投资的影响：不能简单依赖单一来源，应综合多源ESG数据或使用原始ESG数据自建评分。"
