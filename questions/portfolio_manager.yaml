  question: "在多资产配置中使用Risk Budgeting（风险预算）时，以下哪种实现方式最常用？\nWhat is the most common implementation of Risk Budgeting in multi-asset allocation?"
  options:
    - "A. 设定每个资产类别对总组合风险的贡献比例(如股票贡献50%风险，债券25%，另类25%) / Set each asset class's contribution to total risk (e.g., equities 50%, bonds 25%, alternatives 25%)"
    - "B. 等权配置 / Equal weight"
    - "C. 最大化总风险 / Maximize total risk"
    - "D. 不设限制 / No constraints"
  answer: "A"
  explanation: "Risk Budgeting实现：(1)定义：设定各资产类别的Risk Contribution(RC)目标——RC_i = w_i × (∂σ_p/∂w_i)；(2)求解：找到权重w使得各资产的RC比例符合预算(如RC_equity=50%×σ_p)；(3)特殊情况：所有RC相等→Risk Parity；(4)优势：以风险为'货币'进行配置(而非资金)——认识到不同资产类别风险贡献差异巨大(传统60/40中股票贡献~90%风险)。"
