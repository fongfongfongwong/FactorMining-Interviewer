- id: PM_COMP_009
  category: compliance
  difficulty: expert
  type: open_ended
  points: 1
  question: "请讨论量化投资中的'公平交易'（fair dealing）原则，以及在管理多只产品时如何确保不同客户之间的公平性。\nDiscuss the 'fair dealing' principle in quantitative investing and how to ensure fairness among different clients when managing multiple products."
  options: []
  answer: ""
  explanation: "公平交易原则要求：(1)交易分配公平：当多只产品需要执行相同交易时，使用 pro-rata 分配或轮换制度，不能优先某一产品 (2)IPO 和定增分配：按照事先确定的规则分配 (3)交叉交易限制：不同产品之间的交叉交易需要符合最佳价格原则 (4)同时交易：所有产品的交易信号应同时执行，不能有时间先后优势。实施机制：(1)自动化交易分配系统 (2)交易分配规则事先文档化并经合规审核 (3)定期审计分配结果的公平性 (4)异常偏差自动告警。对量化特别重要：因为量化可能管理大量同质产品，分配不当的影响面更广。"
  hints:
    - "考虑在同一时间点多只产品需要交易同一只股票的情况"
    - "考虑如何用技术手段保证公平性"
  rubric: "满分要点：(1)公平交易原则清晰 (2)交易分配机制 (3)技术实施方案 (4)审计和监控 (5)量化特殊考虑"
  time_limit_seconds: 360

- id: PM_COMP_010
  category: compliance
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在量化投资的风险限制（risk limits）设置中，以下哪种做法最佳？\nWhich is the best practice for setting risk limits in quantitative investing?"
  options:
    - "A. 设置软限制和硬限制两级，软限制触发预警，硬限制触发强制减仓 / Set soft and hard limits: soft limits trigger alerts, hard limits trigger forced position reduction"
    - "B. 仅设置硬限制 / Only set hard limits"
    - "C. 不设置任何限制以保持灵活性 / No limits to maintain flexibility"
    - "D. 所有限制由交易员自行决定 / All limits decided by traders"
  answer: "A"
  explanation: "两级风险限制体系：(1)软限制（soft limit）：接近阈值时触发预警，PM 和风控收到通知，评估是否需要调整（如 TE 达到目标的 80%）(2)硬限制（hard limit）：突破阈值时自动触发减仓或停止交易（如 TE 达到目标的 100%）。两级体系兼顾了灵活性和纪律性，避免了频繁触发硬限制的交易成本，同时确保风险不失控。"
