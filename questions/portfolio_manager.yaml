  explanation: "Top-down 方法：宏观信号 → 资产类别/行业配置 → 个股选择。优势：能捕捉系统性风险和机会，逻辑清晰。劣势：宏观预测准确率低，信号频率低。Bottom-up 方法：个股因子 → 组合构建 → 宏观约束。优势：信号丰富，alpha 来源多元。劣势：可能忽视系统性风险。整合方式：(1)Black-Litterman 融合宏观 view (2)因子择时层：根据宏观 regime 调整因子权重 (3)行业约束层：宏观信号控制行业偏离 (4)风险层：宏观 stress testing。"
  hints:
