- id: PM_MA_117
  category: multi_asset_allocation
  difficulty: senior
  type: show_work
  points: 5
  question: "一个养老金组合当前配置为：股票60%、债券30%、另类10%。预期年化回报分别为8%、3%、6%，波动率分别为15%、5%、10%。股债相关性0.1，股另相关性0.3，债另相关性0.05。计算：(1)组合预期回报；(2)组合波动率(使用矩阵法)；(3)如果要求组合波动率不超过8%，如何调整配置？\nA pension portfolio: 60% equity (8% return, 15% vol), 30% bond (3%, 5%), 10% alternatives (6%, 10%). Correlations: stock-bond 0.1, stock-alt 0.3, bond-alt 0.05. Calculate: (1) portfolio return; (2) portfolio vol; (3) adjust to cap vol at 8%."
  options: []
  answer: "(1) 组合预期回报 = 0.6×8% + 0.3×3% + 0.1×6% = 4.8% + 0.9% + 0.6% = 6.3%。\n\n(2) 组合方差 = w'Σw = 0.6²×15² + 0.3²×5² + 0.1²×10² + 2×0.6×0.3×15×5×0.1 + 2×0.6×0.1×15×10×0.3 + 2×0.3×0.1×5×10×0.05 = 81 + 2.25 + 1 + 2.7 + 5.4 + 0.15 = 92.5。组合波动率 = √92.5 ≈ 9.62%。\n\n(3) 当前波动率9.62%>8%目标。需要降低股票权重(最大风险贡献者)：例如调整为50%股票、35%债券、15%另类。重新计算：0.5²×225 + 0.35²×25 + 0.15²×100 + 2×0.5×0.35×15×5×0.1 + 2×0.5×0.15×15×10×0.3 + 2×0.35×0.15×5×10×0.05 = 56.25 + 3.0625 + 2.25 + 2.625 + 6.75 + 0.2625 = 71.2 → σ ≈ 8.44%。需要进一步微调（如45/38/17）才能达到8%以下。"
  explanation: "这道题测试多资产组合的风险计算和配置调整。关键：(1)正确使用协方差矩阵计算组合方差；(2)识别股票是最大的风险贡献者(~85%的组合风险)；(3)降低波动率最有效的方式是减少股票配置+增加低波动资产(债券)。"
  hints:
    - "组合方差 = w'Σw，展开为方差项+协方差交叉项"
    - "股票通常是组合风险的最大来源"
  rubric: "预期回报(1分)；方差计算(2分)；波动率(1分)；配置调整(1分)"
  time_limit_seconds: 360

