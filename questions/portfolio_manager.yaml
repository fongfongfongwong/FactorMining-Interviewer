    - "B. 将所有知识集中在一个核心人物头脑中，不做文档化 / Concentrating all knowledge in one key person without documentation"
    - "C. 定期进行技术分享和读书会 / Regular tech sharing and reading groups"
    - "D. 建立标准化的回测框架和代码规范 / Building standardized backtesting frameworks and code standards"
  answer: "B"
  explanation: "知识集中在一个人（'key man risk'）是团队最大的风险。当该核心人物离职时，团队的核心知识和能力随之流失。正确做法包括：(1)所有策略逻辑文档化 (2)代码有完整注释和版本控制 (3)知识分享制度化 (4)培养多人了解核心系统。"
