  explanation: "不同因子的量纲和分布差异很大（如 P/E 可能是5-50，ROE 是0-0.3）。截面标准化（z-score = (x - mean) / std 或 rank 标准化）使所有因子值可比，权重具有统一含义。此外，标准化有助于控制异常值影响（通常配合 winsorize 在 ±3σ 或 ±5σ）。"
