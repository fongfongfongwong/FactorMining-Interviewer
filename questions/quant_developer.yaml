- id: QD_PYAD_150
  category: advanced_python
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在Python asyncio中，以下关于事件循环(event loop)的说法哪个是正确的？\nWhich statement about Python asyncio's event loop is correct?"
  options:
    - "A. 事件循环在单线程中调度协程，通过非阻塞IO实现并发 / Event loop schedules coroutines in a single thread via non-blocking IO"
    - "B. asyncio自动使用多线程并行 / asyncio automatically uses multi-threading"
    - "C. 每个协程运行在独立线程中 / Each coroutine runs in a separate thread"
    - "D. asyncio不支持网络IO / asyncio doesn't support network IO"
  answer: "A"
