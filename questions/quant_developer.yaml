    - "B. 增加更多worker节点 / Add more worker nodes"
    - "C. 使用更大的消息缓冲区 / Use larger message buffers"
    - "D. 将消息复制到本地文件 / Copy messages to local files"
  answer: "A"
  explanation: "消息确认机制(acknowledgment)是保证at-least-once delivery的标准做法。Worker处理完任务后发送ack；若worker宕机未发ack，broker会在超时后将消息重新分发给其他worker。RabbitMQ的basic.ack和Kafka的commit offset都是这一机制的实现。"
