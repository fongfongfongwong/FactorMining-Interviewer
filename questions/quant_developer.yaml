  code_snippet: |
    import pandas as pd
    import numpy as np

    # SLOW version - 需要优化
    def calc_ic_slow(factor_df: pd.DataFrame, return_df: pd.DataFrame) -> pd.Series:
        """
        factor_df: index=date, columns=stock_code, values=factor_value
        return_df: index=date, columns=stock_code, values=next_period_return
        Returns: Series indexed by date with IC values
        """
        ic_series = pd.Series(index=factor_df.index, dtype=float)
        for date in factor_df.index:
            f = factor_df.loc[date].dropna()
            r = return_df.loc[date].dropna()
            common = f.index.intersection(r.index)
            if len(common) > 10:
                ic_series[date] = f[common].corr(r[common])
        return ic_series

