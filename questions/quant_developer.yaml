  explanation: "因子数据通常是读多写少的场景（因子值每日计算一次，但查询频率很高），Cache-Aside模式最适合：(1)读请求先查Redis，命中则直接返回；(2)未命中则从数据库加载，写入Redis并设置TTL；(3)因子更新时先更新DB再删除缓存（而非更新缓存，避免并发写导致不一致）。"
