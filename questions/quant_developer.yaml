  options:
    - "A. 幂等性设计 + at-least-once delivery / Idempotent design + at-least-once delivery"
    - "B. 仅依赖TCP的可靠传输 / Rely solely on TCP reliable transport"
    - "C. 在应用层实现两阶段提交(2PC) / Application-level two-phase commit"
    - "D. 使用UDP减少重复 / Use UDP to reduce duplicates"
