  question: "在量化交易系统的网络编程中，TCP的Nagle算法在低延迟场景下应该如何处理？\nHow should TCP's Nagle algorithm be handled in low-latency quant trading network programming?"
  options:
    - "A. 禁用(TCP_NODELAY)——避免小包被缓冲导致延迟 / Disable (TCP_NODELAY) — prevent small packet buffering latency"
    - "B. 保持默认启用 / Keep default enabled"
    - "C. 只在发送端禁用 / Disable only on sender"
    - "D. Nagle算法不影响延迟 / Nagle doesn't affect latency"
  answer: "A"
  explanation: "Nagle算法将小包缓冲合并成大包发送(减少网络开销)，但引入延迟(等待凑够数据或上一个ACK返回)。在交易系统中每个订单消息都需要立即发送，应设置TCP_NODELAY禁用Nagle。注意同时禁用delayed ACK(TCP_QUICKACK)以避免接收端的额外延迟。"
