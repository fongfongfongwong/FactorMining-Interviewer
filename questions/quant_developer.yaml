  question: "在GPU编程中，warp divergence导致性能下降的原因是？\nWhy does warp divergence cause performance degradation in GPU programming?"
  options:
    - "A. 同一warp内的线程遇到分支时必须串行执行不同路径 / Threads in the same warp must serialize when encountering divergent branches"
    - "B. warp divergence会导致内存泄漏 / Warp divergence causes memory leaks"
    - "C. GPU会自动将divergent线程迁移到其他warp / GPU auto-migrates divergent threads"
    - "D. warp divergence只影响double精度运算 / Only affects double precision"
  answer: "A"
  explanation: "GPU以warp(32线程)为单位执行指令。当warp内线程遇到if-else分支走不同路径时，GPU必须串行执行两条路径——先执行if路径(部分线程活跃)，再执行else路径(另一部分线程活跃)，总时间为两条路径之和。在因子计算中应尽量用数学运算替代条件分支。"
  code_snippet: ""
