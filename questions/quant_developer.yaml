    - "B. 加速读查询 / Speed up read queries"
    - "C. 减少磁盘空间 / Reduce disk space"
    - "D. 替代索引 / Replace indexes"
  answer: "A"
  explanation: "WAL(Write-Ahead Logging)是数据库ACID中Durability的基础：(1)任何数据修改先写入WAL(顺序追加写，极快)；(2)WAL写入成功后才确认事务提交；(3)数据页的修改可以异步刷盘(checkpoint)；(4)崩溃恢复时重放WAL中已提交未刷盘的记录。这使得即使在崩溃瞬间也不丢失已确认的数据。PostgreSQL, MySQL InnoDB都使用WAL。"
