  question: "以下代码实现了一个简单的double-checked locking模式用于策略对象的延迟初始化。在C++11中，这段代码是否正确？\nIs this double-checked locking pattern correct in C++11 for lazy initialization of strategy objects?"
  options:
    - "A. 正确——std::atomic的load/store保证了正确的内存顺序"
    - "B. 错误——应使用std::call_once代替"
    - "C. 错误——instance.load()需要memory_order_acquire"
    - "D. A和B都正确，但B是更推荐的方式"
  answer: "D"
  explanation: "代码使用seq_cst是正确的（比必要的更强但正确）。std::call_once是C++标准推荐的线程安全延迟初始化方式，内部使用platform-specific优化(如pthread_once)，代码更简洁且不需要手动管理atomic和mutex。C++11的函数内静态变量也是线程安全的：static Strategy* inst = new Strategy();——编译器保证只初始化一次。"
  code_snippet: |
    class StrategyFactory {
        std::atomic<Strategy*> instance{nullptr};
        std::mutex mtx;

        Strategy* get() {
            Strategy* p = instance.load();
            if (!p) {
                std::lock_guard<std::mutex> lock(mtx);
                p = instance.load();
                if (!p) {
                    p = new Strategy();
                    instance.store(p);
                }
            }
            return p;
        }
    };
