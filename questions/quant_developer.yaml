  question: "在构建因子表达式树(expression tree)进行遗传规划(genetic programming)因子挖掘时，需要检测两棵表达式树是否语义等价。这个问题的计算复杂度是？\nWhen checking semantic equivalence of two factor expression trees in GP-based factor mining, the computational complexity is:"
