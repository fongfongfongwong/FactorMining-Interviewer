  explanation: "真正的exactly-once在分布式系统中很难实现。最实用的方案是：at-least-once delivery（保证消息不丢）+ 幂等性处理（重复消息不产生副作用）。每个交易信号带唯一ID，消费端维护已处理ID集合，重复信号直接忽略。2PC虽然理论上可行但性能差且实现复杂。"
