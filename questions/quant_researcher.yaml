  question: '在 Markov chain 框架下建模A股市场状态切换。假设市场有两个状态（牛市/熊市），转移概率矩阵为 P = [[0.95, 0.05], [0.10, 0.90]]。牛市的 stationary probability（平稳概率）为：

    Modeling A-share market regime switching with a Markov chain. With two states (bull/bear) and transition matrix P = [[0.95, 0.05], [0.10, 0.90]], the stationary probability of the bull state is:'
  options:
  - A. 1/3
  - B. 2/3
  - C. 1/2
  - D. 5/7
  answer: B
  explanation: '令平稳分布为 π = (π₁, π₂)，满足 πP = π 且 π₁ + π₂ = 1。由 π₁ = 0.95π₁ + 0.10π₂ 得 0.05π₁ = 0.10π₂，即 π₁ = 2π₂。代入 π₁ + π₂ = 1 得 π₁ = 2/3。牛市平稳概率为2/3意味着长期来看市场约有2/3的时间处于牛市状态。

    From πP = π: 0.05π₁ = 0.10π₂, so π₁ = 2π₂. With π₁ + π₂ = 1, π₁ = 2/3. The bull state stationary probability of 2/3 means the market spends about 2/3 of the time in a bull regime.'
