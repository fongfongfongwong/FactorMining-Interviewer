  answer: ''
  explanation: '(a) Dupire (1994) 从vanilla期权市场价格反推出确定性的局部波动率函数σ_L(S,t)，使得模型能精确拟合整个波动率曲面。Dupire公式：σ_L²(K,T) = (∂C/∂T + rK∂C/∂K) / (½K²∂²C/∂K²)。


