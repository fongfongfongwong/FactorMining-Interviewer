- id: QR_STOC_010
  category: stochastic_calculus
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: '设 X_t 满足 SDE: dX = 2X dt + 3 dW。使用 Ito''s lemma，d(e^{-2t}X_t) 等于：

    Given SDE dX = 2X dt + 3 dW, using Ito''s lemma, d(e^{-2t}X_t) equals:'
  options:
  - A. 3e^{-2t} dW
  - B. e^{-2t}(2X dt + 3 dW) - 2e^{-2t}X dt
  - C. 3e^{-2t} dW（与A等价）/ 3e^{-2t} dW (equivalent to A)
  - D. A, B, C 都正确 / A, B, C are all correct
  answer: D
  explanation: '设 f(t,X) = e^{-2t}X。df = (∂f/∂t)dt + (∂f/∂X)dX + ½(∂²f/∂X²)(dX)²。∂f/∂t = -2e^{-2t}X，∂f/∂X = e^{-2t}，∂²f/∂X² = 0。

    df = -2e^{-2t}Xdt + e^{-2t}(2Xdt + 3dW) + 0 = 3e^{-2t}dW。

    漂移项相消，这表明 e^{-2t}X_t 是一个鞅（在适当的可积条件下）。B展开后也等于3e^{-2t}dW，所以ABC都等价。

    The drift terms cancel, showing e^{-2t}X_t is a martingale. All three expressions are equivalent.'
