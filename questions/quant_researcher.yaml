    - "B. 忽略不平衡 / Ignore imbalance"
    - "C. 只预测一个类别 / Only predict one class"
    - "D. 删除多数类样本 / Delete majority class samples"
  answer: "A"
  explanation: "因子标签设计处理不平衡：(1)分位数标签——将股票收益率按横截面分位数(如top 20%=1, bottom 20%=-1, 中间=0)作为标签。保证每天正/负标签数量大致相等。(2)回归vs分类——直接预测收益率(回归)避免了分类的不平衡问题；但分类更稳健(减少异常值影响)。(3)加权损失函数——对少数类(如极端涨跌)赋予更高权重。(4)rank loss——直接优化排序而非分类/回归(如ListNet loss)——最适合因子预测(关注排序而非绝对值)。"
