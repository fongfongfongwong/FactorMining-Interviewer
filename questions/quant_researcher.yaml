  points: 1
  question: '关于 quadratic variation（二次变分），标准布朗运动 W(t) 在 [0,T] 上的二次变分 [W,W]_T 等于：

    The quadratic variation of standard Brownian motion W(t) on [0,T], [W,W]_T equals:'
  options:
  - A. W(T)²
  - B. T
  - C. T/2
  - D. E[W(T)²] = T（期望值）/ E[W(T)²] = T (expected value)
  answer: B
  explanation: '[W,W]_T = lim_{n→∞} Σᵢ(W(tᵢ) - W(tᵢ₋₁))² = T（几乎必然成立）。这不是期望值而是路径性质（pathwise result），这也是为什么在Ito''s lemma中 (dW)² = dt 的原因。这个性质使得Ito积分与Riemann-Stieltjes积分不同。

    [W,W]_T = T almost surely (pathwise, not just in expectation). This is why (dW)² = dt in Ito''s lemma, distinguishing it from ordinary calculus.'
