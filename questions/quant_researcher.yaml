- id: QR_BAYES_117
  category: bayesian_methods
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在贝叶斯框架下进行因子选择时，Bayes Factor 的定义和解释是什么？\nWhat is the definition and interpretation of Bayes Factor for factor selection?"
  options:
    - "A. BF₁₀ = P(data|M₁)/P(data|M₀)，衡量数据对两个模型的支持比 / BF₁₀ = marginal likelihood ratio, measures evidence for M₁ vs M₀"
    - "B. BF是后验概率 / BF is the posterior probability"
    - "C. BF是p-value的替代 / BF replaces p-value directly"
    - "D. BF只能比较两个嵌套模型 / BF only compares nested models"
  answer: "A"
  explanation: "Bayes Factor BF₁₀ = P(data|M₁)/P(data|M₀)是两个模型的边际似然(marginal likelihood)之比：(1)BF>10表示数据强烈支持M₁；(2)BF∈[3,10]表示中等支持；(3)BF<1/3表示支持M₀。在因子选择中：M₁为包含某因子的模型，M₀为不包含的模型，BF衡量该因子是否有增量价值。与p-value不同，BF可以量化支持原假设(无效应)的证据。"
