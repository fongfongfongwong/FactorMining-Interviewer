- id: QR_ML_009
  category: machine_learning
  difficulty: senior
  type: code
  points: 5
  question: '编写 Python 函数实现基于 purged k-fold cross-validation 的模型评估。考虑金融数据的时间依赖性，在fold之间加入purge和embargo。

    Write a Python function for purged k-fold cross-validation for model evaluation, addressing temporal dependence in financial data with purge and embargo between folds.'
  options: []
  answer: ''
  explanation: Purged k-fold CV (de Prado, 2018) 在传统k-fold基础上：(1) Purge：从训练集中删除与验证集时间上重叠的观测（考虑收益率计算的前向窗口）；(2) Embargo：在验证集后增加一段禁止期，该期间的数据也从训练集中排除。
  code_snippet: "import numpy as np\nimport pandas as pd\nfrom typing import Generator\n\ndef purged_kfold_split(\n    dates: pd.DatetimeIndex,\n    n_splits: int = 5,\n    purge_window: int = 5,\n    embargo_window: int = 5\n) -> Generator[tuple[np.ndarray, np.ndarray], None, None]:\n    \"\"\"\n    Purged K-Fold cross-validation for financial time series.\n\n    Args:\n        dates: Sorted datetime index\n        n_splits: Number of folds\n        purge_window: Days to purge from training set before val start\n        embargo_window: Days to embargo after val end\n\n    Yields:\n        (train_indices, val_indices)\n    \"\"\"\n    n = len(dates)\n    indices = np.arange(n)\n    fold_size = n // n_splits\n\n    for i in range(n_splits):\n        val_start = i * fold_size\n        val_end = min((i + 1) * fold_size, n)\n\n        val_idx = indices[val_start:val_end]\n\n        # Purge: remove training samples within purge_window before val\n        purge_start = max(0, val_start - purge_window)\n\
    \        # Embargo: remove training samples within embargo_window after val\n        embargo_end = min(n, val_end + embargo_window)\n\n        train_mask = np.ones(n, dtype=bool)\n        train_mask[purge_start:embargo_end] = False\n\n        train_idx = indices[train_mask]\n\n        if len(train_idx) < 10 or len(val_idx) < 1:\n            continue\n\n        yield train_idx, val_idx\n"
  code_language: python
  hints:
  - 'Hint 1: Purge删除训练集中因收益率前向计算而泄漏的数据'
  - 'Hint 2: 参考 Marcos Lopez de Prado ''Advances in Financial ML'''
  rubric: 正确实现purge逻辑(2分)；正确实现embargo逻辑(1分)；边界处理(1分)；代码质量(1分)
