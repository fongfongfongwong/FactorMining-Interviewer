- id: QR_ML_004
  category: machine_learning
  difficulty: senior
  type: code
  points: 5
  question: '编写 Python 函数实现 walk-forward validation（前向滚动验证）框架，用于评估因子选股ML模型。要求包含训练窗口、验证窗口和embargo period（禁止期）。

    Write a Python function for walk-forward validation framework to evaluate ML-based factor selection models. Include training window, validation window, and embargo period.'
  options: []
  answer: ''
  explanation: Walk-forward validation是金融时间序列ML模型评估的标准方法。Embargo period（禁止期）防止训练集末尾的数据因收益率计算的前向窗口而与验证集重叠，避免信息泄露。
  code_snippet: "import pandas as pd\nimport numpy as np\nfrom typing import Generator\n\ndef walk_forward_split(\n    dates: pd.DatetimeIndex,\n    train_window: int = 252,\n    val_window: int = 21,\n    embargo: int = 5,\n    step: int = 21,\n    min_train_size: int = 126\n) -> Generator[tuple[np.ndarray, np.ndarray], None, None]:\n    \"\"\"\n    Walk-forward validation splitter with embargo period.\n\n    Args:\n        dates: Sorted datetime index of all available dates\n        train_window: Number of trading days for training (default ~1yr)\n        val_window: Number of trading days for validation (default ~1mo)\n        embargo: Gap days between train and val to prevent leakage\n        step: Step size for rolling the window forward\n        min_train_size: Minimum training set size\n\n    Yields:\n        (train_indices, val_indices) as numpy arrays\n    \"\"\"\n    n = len(dates)\n    all_indices = np.arange(n)\n\n    start = 0\n    while True:\n        train_end = start + train_window\n\
    \        val_start = train_end + embargo\n        val_end = val_start + val_window\n\n        if val_end > n:\n            break\n\n        if train_end - start < min_train_size:\n            start += step\n            continue\n\n        train_idx = all_indices[start:train_end]\n        val_idx = all_indices[val_start:val_end]\n\n        yield train_idx, val_idx\n        start += step\n\ndef evaluate_walk_forward(\n    model_class,\n    X: pd.DataFrame,\n    y: pd.Series,\n    dates: pd.DatetimeIndex,\n    model_params: dict | None = None,\n    **wf_kwargs\n) -> pd.DataFrame:\n    \"\"\"\n    Evaluate ML model using walk-forward validation.\n\n    Returns:\n        DataFrame with validation period metrics\n    \"\"\"\n    if model_params is None:\n        model_params = {}\n    results = []\n\n    for train_idx, val_idx in walk_forward_split(dates, **wf_kwargs):\n        X_train, y_train = X.iloc[train_idx], y.iloc[train_idx]\n        X_val, y_val = X.iloc[val_idx], y.iloc[val_idx]\n\
    \n        model = model_class(**model_params)\n        model.fit(X_train, y_train)\n        y_pred = model.predict(X_val)\n\n        from scipy.stats import spearmanr\n        ic, _ = spearmanr(y_pred, y_val)\n\n        results.append({\n            'val_start': dates[val_idx[0]],\n            'val_end': dates[val_idx[-1]],\n            'ic': ic,\n            'n_train': len(train_idx),\n            'n_val': len(val_idx),\n        })\n\n    return pd.DataFrame(results)\n"
  code_language: python
  hints:
  - 'Hint 1: Embargo period 通常设为收益率计算的前向窗口长度'
  - 'Hint 2: 确保训练集和验证集在时间上严格分离'
  rubric: 正确实现滚动窗口(2分)；embargo period正确(1分)；代码完整可运行(1分)；接口设计合理(1分)
  time_limit_seconds: 600
