  options:
    - "A. 随着更多投资者使用同一数据源，因子的超额收益逐渐降低 / As more investors use the same data source, the factor's excess return gradually diminishes"
    - "B. 数据质量随时间下降 / Data quality decreases over time"
    - "C. 数据量减少 / Data volume decreases"
    - "D. 数据价格上涨 / Data price increases"
  answer: "A"
  explanation: "Alpha衰减的机制：(1)新数据源刚被发现时有信息优势(information edge)——少数人使用，价格未充分反映；(2)随着数据供应商推广，越来越多的基金使用同一数据——大家同时买入/卖出相同信号，alpha被竞争消耗；(3)最终alpha趋近于零(EMH)。对策：(1)寻找独家数据(harder to replicate)；(2)更好的数据处理方法(same data, better alpha)；(3)组合多个另类数据源(ensemble)。"
