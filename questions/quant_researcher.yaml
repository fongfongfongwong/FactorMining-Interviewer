  question: '证明在 martingale（鞅）框架下，一个在 filtration {Fₜ} 下适应的价格过程 {Sₜ} 满足鞅条件 E[Sₜ|Fₛ] = Sₛ (s < t) 意味着该资产不存在套利机会（在适当的技术条件下）。

    (a) 给出鞅的严格定义

    (b) 证明若 Sₜ 是鞅，则任何自融资策略的价值过程也是鞅

    (c) 由此推导无套利条件


    Prove that under the martingale framework, a price process {Sₜ} adapted to filtration {Fₜ} satisfying the martingale condition E[Sₜ|Fₛ] = Sₛ implies no arbitrage (under appropriate technical conditions).

    (a) Give the rigorous definition of a martingale

    (b) Prove that if Sₜ is a martingale, any self-financing strategy''s value process is also a martingale

    (c) Derive the no-arbitrage condition from this'
  options: []
  answer: ''
  explanation: '(a) 鞅定义：{Mₜ}是关于{Fₜ}的鞅，若(i) Mₜ是Fₜ适应的，(ii) E[|Mₜ|]<∞，(iii) E[Mₜ|Fₛ]=Mₛ, ∀s≤t。

    (b) 自融资策略(θₜ)的价值过程 Vₜ = θₜ·Sₜ。由自融资条件 dVₜ = θₜ·dSₜ，利用鞅变换(martingale transform)定理，若Sₜ是鞅且θₜ是可预测的有界过程，则Vₜ也是鞅。

    (c) 套利要求：V₀=0, P(Vₜ≥0)=1, P(Vₜ>0)>0。但若Vₜ是鞅且V₀=0，则E[Vₜ]=0。又Vₜ≥0 a.s.意味着Vₜ=0 a.s.，矛盾。因此不存在套利。'
  code_snippet: ''
  code_language: python
  hints:
  - 'Hint 1: 鞅变换定理是关键'
  - 'Hint 2: 利用非负鞅期望为0则恒为0的性质'
  rubric: (a) 3分：三个条件缺一不可；(b) 4分：正确使用鞅变换定理和自融资条件；(c) 3分：用反证法严格推导
