- id: QR_PROB_001
  category: probability_statistics
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: '在A股量化研究中，我们使用 Bayesian inference 更新因子收益率的先验分布。假设因子收益率的先验为 N(0, σ₀²)，似然函数为 N(μ_obs, σ²/n)，则后验均值 (posterior mean) 最接近以下哪个表达式？

    In A-share quant research, we use Bayesian inference to update the prior distribution of factor returns. If the prior is N(0, σ₀²) and the likelihood is N(μ_obs, σ²/n), which expression best approximates the posterior mean?'
  options:
  - A. μ_obs * (σ₀² / (σ₀² + σ²/n))
  - B. μ_obs * (σ²/n / (σ₀² + σ²/n))
  - C. μ_obs * n / (n + σ²/σ₀²)
  - D. A和C等价 / A and C are equivalent
  answer: D
  explanation: '后验均值为 μ_post = μ_obs * (σ₀² / (σ₀² + σ²/n))。将分子分母同乘 n/σ² 可得 μ_obs * n / (n + σ²/σ₀²)，因此A和C等价。这是 Bayesian shrinkage 的经典结果，在因子收益率估计中用于将样本均值向先验收缩。

    The posterior mean is μ_post = μ_obs * (σ₀² / (σ₀² + σ²/n)). Multiplying numerator and denominator by n/σ² yields μ_obs * n / (n + σ²/σ₀²), so A and C are equivalent. This is the classic Bayesian shrinkage result used in factor return estimation.'
  code_snippet: ''
  code_language: python
  hints: []
  rubric: ''
  time_limit_seconds: 120
