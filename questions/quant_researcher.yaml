  question: '描述 Girsanov theorem 及其在期权定价中的应用。

    (a) 陈述 Girsanov 定理的核心内容

    (b) 解释如何从 P-measure（真实概率测度）变换到 Q-measure（风险中性测度）

    (c) 在A股期权（如上证50ETF期权）定价中，Girsanov定理的实际含义是什么


    Describe Girsanov theorem and its application in option pricing.

    (a) State the core content of Girsanov theorem

    (b) Explain the measure change from P-measure to Q-measure

    (c) What is the practical meaning of Girsanov theorem in A-share option pricing (e.g., SSE 50 ETF options)'
  options: []
  answer: ''
  explanation: '(a) Girsanov定理：设W_t是P测度下的标准布朗运动，θ_t是适应过程，定义 dQ/dP = exp(-∫₀ᵀ θ_t dW_t - ½∫₀ᵀ θ_t² dt)（Radon-Nikodym导数）。则 W̃_t = W_t + ∫₀ᵗ θ_s ds 在Q测度下是标准布朗运动。


    (b) 在P测度下 dS/S = μdt + σdW_t。令 θ = (μ-r)/σ（market price of risk），则在Q测度下 dS/S = rdt + σdW̃_t，其中 W̃ 是Q-布朗运动。测度变换将漂移率从μ改为r。


    (c) 对于上证50ETF期权，Girsanov定理允许我们不需要知道ETF的真实预期收益率μ就能给期权定价——只需要知道σ和r。这解释了为什么Black-Scholes公式中没有μ。实际操作中，我们从期权市场价格反推出隐含波动率implied volatility来定价。'
