  question: '讨论 out-of-sample testing 在因子研究中的最佳实践。

    (a) 为什么简单的 train/test split 不够，需要多层次的样本外验证

    (b) 设计一个包含 primary test set、secondary test set 和 live monitoring 的三层验证框架

    (c) 如何处理 ''the test set becomes the training set'' 的问题


    Discuss out-of-sample testing best practices in factor research.

    (a) Why simple train/test split is insufficient

    (b) Design a three-layer validation with primary test, secondary test, and live monitoring

    (c) How to handle ''test set becomes training set'' problem'
  options: []
  answer: ''
  explanation: '(a) 简单train/test split不够因为：1)单次split结果可能偶然；2)研究者看到test set结果后会修改策略，使test set实际上变成了training set（信息泄露）；3)市场环境变化使得某一段test set不具有代表性。


    (b) 三层验证框架：

    - 第一层 (Primary test set)：预留最近2-3年数据，在研究过程中绝不查看。只在因子开发完成后使用一次进行''最终检验''

    - 第二层 (Secondary test set)：在walk-forward框架内使用，允许多次查看但需要记录查看次数并做multiple testing调整

    - 第三层 (Live monitoring)：上线后的持续监控，比较实盘IC与回测IC的差异，设置预警阈值


    (c) 处理''test set变training set''问题：

    1. 严格的研究流程管理：记录所有测试次数

