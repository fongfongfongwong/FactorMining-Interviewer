- id: QR_PROB_012
  category: probability_statistics
  difficulty: senior
  type: code
  points: 5
  question: '编写 Python 函数，实现 Bootstrap 法计算因子IC (Information Coefficient) 的置信区间。函数接收因子值序列和收益率序列，返回IC的95%置信区间。要求使用 Spearman rank correlation 计算IC。

    Write a Python function to compute the 95% confidence interval of factor IC using bootstrap. The function takes factor values and return series, returns the 95% CI of IC using Spearman rank correlation.'
  options: []
  answer: ''
  explanation: Bootstrap方法通过有放回抽样估计统计量的分布。对于IC的置信区间，每次bootstrap抽样计算一次Spearman相关系数，重复B次后取2.5%和97.5%分位数作为95%CI。
  code_snippet: "import numpy as np\nfrom scipy.stats import spearmanr\n\ndef bootstrap_ic_ci(factor_values: np.ndarray,\n                    returns: np.ndarray,\n                    n_bootstrap: int = 10000,\n                    confidence: float = 0.95,\n                    random_state: int = 42) -> tuple[float, float, float]:\n    \"\"\"\n    Bootstrap confidence interval for factor IC (Spearman correlation).\n\n    Args:\n        factor_values: Cross-sectional factor values\n        returns: Corresponding forward returns\n        n_bootstrap: Number of bootstrap iterations\n        confidence: Confidence level (default 0.95)\n        random_state: Random seed\n\n    Returns:\n        (ic_point_estimate, ci_lower, ci_upper)\n    \"\"\"\n    rng = np.random.RandomState(random_state)\n    n = len(factor_values)\n    assert n == len(returns), \"factor_values and returns must have same length\"\n\n    # Point estimate\n    ic_point, _ = spearmanr(factor_values, returns)\n\n    # Bootstrap\n\
    \    bootstrap_ics = np.empty(n_bootstrap)\n    for i in range(n_bootstrap):\n        idx = rng.choice(n, size=n, replace=True)\n        corr, _ = spearmanr(factor_values[idx], returns[idx])\n        bootstrap_ics[i] = corr\n\n    alpha = 1 - confidence\n    ci_lower = np.percentile(bootstrap_ics, 100 * alpha / 2)\n    ci_upper = np.percentile(bootstrap_ics, 100 * (1 - alpha / 2))\n\n    return ic_point, ci_lower, ci_upper\n"
  code_language: python
  hints:
  - 'Hint 1: scipy.stats.spearmanr 计算 Spearman 相关系数'
  - 'Hint 2: Bootstrap 使用有放回抽样 (np.random.choice with replace=True)'
  rubric: 正确实现bootstrap抽样(2分)；使用Spearman相关系数(1分)；正确计算置信区间分位数(1分)；代码风格和边界检查(1分)
  time_limit_seconds: 600
