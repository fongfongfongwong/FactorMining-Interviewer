- id: QR_ML_015
  category: machine_learning
  difficulty: expert
  type: code
  points: 8
  question: '编写一个完整的 LightGBM 因子选股模型训练和评估管道(pipeline)。要求：

    (a) Walk-forward验证框架

    (b) 特征重要性分析（SHAP值）

    (c) 输出每个验证期的IC和分层收益


    Write a complete LightGBM factor selection model training and evaluation pipeline with:

    (a) Walk-forward validation

    (b) Feature importance analysis (SHAP)

    (c) Output IC and stratified returns per validation period'
  options: []
  answer: ''
  explanation: 完整的ML因子选股管道需要包含数据预处理、walk-forward训练、预测评估和特征分析。SHAP值提供局部和全局的特征重要性解释。
  code_snippet: "import numpy as np\nimport pandas as pd\nimport lightgbm as lgb\nimport shap\nfrom scipy.stats import spearmanr\n\nclass FactorMLPipeline:\n    \"\"\"LightGBM-based factor selection pipeline with walk-forward validation.\"\"\"\n\n    def __init__(\n        self,\n        lgb_params: dict | None = None,\n        train_window: int = 504,\n        val_window: int = 21,\n        embargo: int = 5,\n        n_groups: int = 5,\n    ):\n        default_params = {\n            'objective': 'regression',\n            'metric': 'mse',\n            'num_leaves': 31,\n            'learning_rate': 0.05,\n            'feature_fraction': 0.8,\n            'bagging_fraction': 0.8,\n            'bagging_freq': 5,\n            'verbose': -1,\n            'n_estimators': 200,\n            'early_stopping_rounds': 20,\n        }\n        self.lgb_params = lgb_params or default_params\n        self.train_window = train_window\n        self.val_window = val_window\n        self.embargo = embargo\n\
    \        self.n_groups = n_groups\n\n    def run(\n        self,\n        features: pd.DataFrame,\n        labels: pd.Series,\n        dates: pd.Series,\n    ) -> dict:\n        unique_dates = sorted(dates.unique())\n        n_dates = len(unique_dates)\n\n        results = []\n        shap_importances = []\n\n        start = 0\n        while True:\n            train_end = start + self.train_window\n            val_start_idx = train_end + self.embargo\n            val_end_idx = val_start_idx + self.val_window\n\n            if val_end_idx > n_dates:\n                break\n\n            train_dates = unique_dates[start:train_end]\n            val_dates = unique_dates[val_start_idx:val_end_idx]\n\n            train_mask = dates.isin(train_dates)\n            val_mask = dates.isin(val_dates)\n\n            X_train = features[train_mask]\n            y_train = labels[train_mask]\n            X_val = features[val_mask]\n            y_val = labels[val_mask]\n\n            if len(X_train) <\
    \ 100 or len(X_val) < 30:\n                start += self.val_window\n                continue\n\n            model = lgb.LGBMRegressor(**self.lgb_params)\n            model.fit(\n                X_train, y_train,\n                eval_set=[(X_val, y_val)],\n            )\n\n            y_pred = model.predict(X_val)\n\n            # IC\n            ic, _ = spearmanr(y_pred, y_val)\n\n            # Stratified returns\n            pred_series = pd.Series(y_pred, index=y_val.index)\n            quantiles = pd.qcut(pred_series, self.n_groups, labels=False,\n                                duplicates='drop')\n            group_returns = y_val.groupby(quantiles).mean()\n            spread = group_returns.iloc[-1] - group_returns.iloc[0]\n\n            results.append({\n                'val_start': val_dates[0],\n                'val_end': val_dates[-1],\n                'ic': ic,\n                'long_short_spread': spread,\n                'n_stocks': len(X_val),\n            })\n\n     \
    \       # SHAP (sample for speed)\n            sample_size = min(500, len(X_val))\n            explainer = shap.TreeExplainer(model)\n            shap_vals = explainer.shap_values(X_val.iloc[:sample_size])\n            mean_abs_shap = np.abs(shap_vals).mean(axis=0)\n            shap_importances.append(\n                pd.Series(mean_abs_shap, index=features.columns)\n            )\n\n            start += self.val_window\n\n        results_df = pd.DataFrame(results)\n        avg_shap = pd.concat(shap_importances, axis=1).mean(axis=1)\n        avg_shap = avg_shap.sort_values(ascending=False)\n\n        return {\n            'results': results_df,\n            'avg_ic': results_df['ic'].mean(),\n            'ic_ir': (results_df['ic'].mean()\n                      / results_df['ic'].std()),\n            'avg_spread': results_df['long_short_spread'].mean(),\n            'feature_importance_shap': avg_shap,\n        }\n"
  code_language: python
  hints:
  - 'Hint 1: 使用 lgb.LGBMRegressor 作为基础模型'
  - 'Hint 2: SHAP的 TreeExplainer 对树模型高效'
  rubric: Walk-forward框架正确(2分)；LightGBM训练正确(2分)；SHAP特征重要性(2分)；IC和分层收益评估(1分)；代码质量(1分)
  time_limit_seconds: 900
