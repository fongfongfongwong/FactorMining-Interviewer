  question: '在因子截面回归中遇到 multicollinearity（多重共线性）问题时，以下哪种方法最不适合用来解决？

    When encountering multicollinearity in factor cross-sectional regression, which method is LEAST appropriate to resolve it?'
  options:
  - A. 使用 Ridge regression (L2 regularization) / Use Ridge regression
  - B. 对因子做 PCA 降维后再回归 / Apply PCA dimensionality reduction before regression
  - C. 增大样本量（更多截面日期）/ Increase sample size (more cross-sectional dates)
  - D. 对因子做正交化处理 (orthogonalization) / Orthogonalize the factors
  answer: C
  explanation: '多重共线性是自变量之间的高相关性问题，与样本量无关。增加样本量不能解决共线性。Ridge regression 通过L2惩罚压缩系数，PCA提取正交主成分，正交化直接消除因子间相关性，这三种都能有效处理共线性。

    Multicollinearity is a problem of high correlation among regressors, independent of sample size. Increasing sample size does not resolve it. Ridge regression, PCA, and orthogonalization all directly address the correlation structure.'
