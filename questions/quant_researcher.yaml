- id: QR_CS_175
  category: market_microstructure_research
  difficulty: expert
  type: show_work
  points: 5
  question: "请推导Roll (1984) 的有效价差(effective spread)估计量。假设真实价格遵循随机游走，观测价格=真实价格+bid-ask bounce。证明：Effective Spread = 2*sqrt(-Cov(ΔP_t, ΔP_{t-1}))。\nDerive Roll's (1984) effective spread estimator. Assume true price follows random walk, observed price = true price + bid-ask bounce. Show Effective Spread = 2*sqrt(-Cov(ΔP_t, ΔP_{t-1}))."
  options: []
  answer: "推导：设真实价格m_t遵循随机游走：m_t = m_{t-1} + u_t，u_t~iid(0,σ²_u)。\n\n观测价格p_t = m_t + c*q_t，其中c=半价差(half-spread)，q_t∈{+1,-1}以等概率出现(买方/卖方发起)。\n\n价格变化：Δp_t = p_t - p_{t-1} = (m_t-m_{t-1}) + c*(q_t-q_{t-1}) = u_t + c*(q_t-q_{t-1})。\n\n计算自协方差：Cov(Δp_t, Δp_{t-1}) = Cov(u_t+c(q_t-q_{t-1}), u_{t-1}+c(q_{t-1}-q_{t-2}))。\n\n因为u_t独立于q_t且不同时点的u互相独立：= c²*Cov(q_t-q_{t-1}, q_{t-1}-q_{t-2}) = c²*(-Var(q_{t-1})) = -c²*1 = -c²。\n\n因此c = sqrt(-Cov(Δp_t, Δp_{t-1}))，Effective Spread = 2c = 2*sqrt(-Cov)。"
  explanation: "Roll模型的优雅之处：仅用价格变化的自协方差(无需order book数据)即可估计有效价差。条件：自协方差必须为负(如果为正则估计无效)。在A股日频数据中可以估计有效价差，但分钟/秒频数据效果更好。"
  code_snippet: ""
  code_language: python
  hints:
    - "关键是bid-ask bounce导致价格变化的负自相关"
    - "q_t与u_t独立是核心假设"
  rubric: "模型设置(1分)；价格变化推导(1分)；自协方差计算(2分)；最终公式(1分)"
  time_limit_seconds: 420

