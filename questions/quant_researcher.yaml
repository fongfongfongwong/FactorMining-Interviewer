  question: '在A股因子研究中，对因子收益率做 OLS regression 时，以下关于 heteroscedasticity（异方差性）的说法哪个是正确的？

    In A-share factor research, when performing OLS regression on factor returns, which statement about heteroscedasticity is correct?'
  options:
  - A. 异方差性导致OLS系数估计有偏 / Heteroscedasticity causes biased OLS coefficient estimates
  - B. 异方差性导致OLS系数的标准误估计不可靠 / Heteroscedasticity causes unreliable standard error estimates of OLS coefficients
  - C. 使用 White's robust standard errors 可以消除异方差性 / White's robust standard errors eliminate heteroscedasticity
  - D. Breusch-Pagan test 只能检测线性形式的异方差 / Breusch-Pagan test can only detect linear heteroscedasticity
  answer: B
  explanation: 'OLS在异方差下系数仍无偏且一致，但标准误估计不正确（通常偏小），导致t统计量和置信区间不可靠。White''s robust SE修正了标准误但没有消除异方差。Breusch-Pagan默认检测线性形式但可以推广。在因子回归中建议始终使用 Newey-West 或 heteroscedasticity-robust 标准误。

    OLS coefficients remain unbiased and consistent under heteroscedasticity, but standard errors are incorrect (usually understated). White''s robust SE corrects the SE but doesn''t eliminate heteroscedasticity itself.'
