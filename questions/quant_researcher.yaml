- id: QR_TS_005
  category: time_series
  difficulty: senior
  type: code
  points: 5
  question: '编写 Python 函数计算时间序列的 Hurst exponent（赫斯特指数），用于判断A股因子收益率序列的长期记忆特性。使用 R/S (Rescaled Range) 方法。函数应返回 H 值及其经济解释（H>0.5 持续性/趋势，H=0.5 随机游走，H<0.5 均值回复）。

    Write a Python function to compute the Hurst exponent of a time series using R/S analysis, for analyzing long-memory properties of A-share factor return series.'
  options: []
  answer: ''
  explanation: Hurst指数通过R/S分析估计：对不同子序列长度n，计算 rescaled range R(n)/S(n)，然后回归 log(R/S) ~ H × log(n)。A股日度收益率H通常在0.5-0.55，波动率序列H在0.7-0.8。
  code_snippet: "import numpy as np\nimport pandas as pd\n\ndef compute_hurst_exponent(series: np.ndarray, max_lag: int | None = None) -> dict:\n    \"\"\"\n    Compute Hurst exponent using R/S analysis.\n\n    Args:\n        series: Time series array (e.g., daily factor returns)\n        max_lag: Maximum lag for R/S computation (default: len/4)\n\n    Returns:\n        dict with keys: hurst, interpretation, r_squared\n    \"\"\"\n    n = len(series)\n    if max_lag is None:\n        max_lag = max(n // 4, 20)\n\n    lags = range(10, max_lag)\n    rs_values = []\n\n    for lag in lags:\n        n_chunks = n // lag\n        if n_chunks < 1:\n            continue\n        rs_list = []\n        for i in range(n_chunks):\n            chunk = series[i * lag:(i + 1) * lag]\n            mean_val = np.mean(chunk)\n            deviations = np.cumsum(chunk - mean_val)\n            r = np.max(deviations) - np.min(deviations)\n            s = np.std(chunk, ddof=1)\n            if s > 0:\n           \
    \     rs_list.append(r / s)\n        if rs_list:\n            rs_values.append((lag, np.mean(rs_list)))\n\n    if len(rs_values) < 5:\n        return {'hurst': np.nan, 'interpretation': 'insufficient data', 'r_squared': 0.0}\n\n    log_lags = np.log([v[0] for v in rs_values])\n    log_rs = np.log([v[1] for v in rs_values])\n\n    coeffs = np.polyfit(log_lags, log_rs, 1)\n    hurst = coeffs[0]\n    residuals = log_rs - np.polyval(coeffs, log_lags)\n    ss_res = np.sum(residuals ** 2)\n    ss_tot = np.sum((log_rs - np.mean(log_rs)) ** 2)\n    r_squared = 1 - ss_res / ss_tot if ss_tot > 0 else 0.0\n\n    if hurst > 0.55:\n        interpretation = \"persistent (trending)\"\n    elif hurst < 0.45:\n        interpretation = \"anti-persistent (mean-reverting)\"\n    else:\n        interpretation = \"approximately random walk\"\n\n    return {'hurst': round(hurst, 4), 'interpretation': interpretation, 'r_squared': round(r_squared, 4)}\n"
  code_language: python
