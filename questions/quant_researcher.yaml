  question: '关于 order statistics（顺序统计量），若从均匀分布 U(0,1) 中抽取 n 个样本，第 k 个顺序统计量 X_(k) 的期望为：

    For order statistics, if n samples are drawn from U(0,1), the expectation of the k-th order statistic X_(k) is:'
  options:
  - A. k / n
  - B. k / (n+1)
  - C. (k-1) / (n-1)
  - D. (k+1) / (n+2)
  answer: B
  explanation: '均匀分布 U(0,1) 的第 k 个顺序统计量服从 Beta(k, n-k+1) 分布，其期望为 E[X_(k)] = k/(n+1)。这在分位数回归和因子分组（quantile sorting）中非常有用。

    The k-th order statistic from U(0,1) follows Beta(k, n-k+1) with E[X_(k)] = k/(n+1). This is useful in quantile regression and factor quantile sorting.'
  code_snippet: ''
  code_language: python
