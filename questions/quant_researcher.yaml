  question: '在A股多因子模型中，因子收益率的联合分布通常呈现 fat tails 和 tail dependence。请讨论：

    (a) 为什么正态分布（Gaussian copula）不适合建模因子收益率的尾部依赖

    (b) 如何使用 Student-t copula 或其他方法改进

    (c) 在风险管理（VaR/CVaR计算）中，尾部依赖性建模错误会导致什么后果


    In A-share multi-factor models, factor return joint distributions typically exhibit fat tails and tail dependence. Discuss:

    (a) Why Gaussian copula fails to model tail dependence of factor returns

    (b) How to improve using Student-t copula or other methods

    (c) Consequences of incorrect tail dependence modeling in risk management (VaR/CVaR)'
  options: []
  answer: ''
  explanation: '(a) Gaussian copula 的 tail dependence coefficient 为0（除非相关系数为±1），这意味着在极端事件中因子收益率被假设为渐近独立的，这与实际观察不符——市场崩盘时各因子往往同步亏损。

    (b) Student-t copula 具有对称的正尾部依赖系数，随自由度减小而增大。还可以使用 Clayton copula（下尾依赖）、Gumbel copula（上尾依赖）或混合copula。对A股来说，下尾依赖更重要。

    (c) 低估尾部依赖会导致VaR和CVaR严重低估，组合风险被低估，极端情况下的实际损失远超模型预测。2015年A股股灾中，许多量化基金因忽视尾部依赖而遭受超预期损失。'
  code_snippet: ''
