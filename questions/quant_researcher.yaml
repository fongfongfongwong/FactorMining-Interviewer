  - D. AIC适用于预测，BIC适用于寻找真实模型 / AIC is for prediction, BIC is for finding the true model
  answer: A
  explanation: 'BIC的惩罚项为 k×ln(n)（k是参数数，n是样本量），AIC的惩罚项为 2k。当 n > 8 时，ln(n) > 2，BIC的惩罚更重，倾向于更简洁的模型。AIC在渐近上最小化预测误差（asymptotically efficient），BIC在渐近上选择真实模型（consistent）。D的说法也有道理但A更直接准确。

    BIC penalizes complexity more (k×ln(n) vs 2k for AIC). AIC favors slightly more complex models. AIC minimizes prediction error; BIC is consistent for true model selection.'
