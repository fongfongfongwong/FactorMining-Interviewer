    (b) Describe the mathematical process of cross-sectional regression neutralization

    (c) Discuss risks of over-neutralization

    (d) In A-share practice, does neutralization order matter? Why?'
  options: []
  answer: ''
  explanation: '(a) 市值中性化：消除因子与市值的相关性，使因子不包含规模暴露。行业中性化：消除行业效应，保证因子在每个行业内都有区分度。风格中性化：消除对其他已知风格因子（如价值、动量）的暴露。


    (b) 截面回归中性化：factor_neutral = factor_raw - X @ (X''X)⁻¹X'' @ factor_raw = (I - H) @ factor_raw，其中X是中性化目标矩阵（如行业哑变量+ln(市值)）。即取OLS残差作为中性化后的因子。


    (c) 过度中性化风险：如果中性化目标与因子有真实的经济联系，过度中性化会消除有效信号。例如，对价值因子做动量中性化可能消除价值反转的核心信号。中性化因子的数量应有限制，通常只中性化行业和市值。


    (d) 在A股中，中性化顺序确实影响结果。先做行业中性化再做市值中性化，与反过来做的结果不同，因为投影矩阵 (I-H) 不满足交换律。实践中通常将所有中性化目标放在同一个回归中一次性完成（联合中性化），而非分步进行。'
