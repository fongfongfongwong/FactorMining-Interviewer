  question: '在进行多因子回归时，VIF (Variance Inflation Factor) 大于10通常表明存在严重的多重共线性。若因子X₁的VIF=15，这意味着X₁的回归系数的标准误被膨胀了约多少倍？

    In multi-factor regression, VIF > 10 indicates severe multicollinearity. If factor X₁ has VIF=15, its coefficient standard error is inflated by approximately how much?'
  options:
  - A. 15倍 / 15 times
  - B. √15 ≈ 3.87倍 / √15 ≈ 3.87 times
  - C. 15² = 225倍 / 15² = 225 times
  - D. ln(15) ≈ 2.71倍 / ln(15) ≈ 2.71 times
  answer: B
  explanation: 'VIF衡量的是系数方差的膨胀因子：Var(β̂ᵢ) = σ² * VIFᵢ / (n * Var(Xᵢ))。因此标准误的膨胀因子为 √VIF = √15 ≈ 3.87。这意味着与无共线性时相比，X₁系数的标准误增大了约3.87倍，t统计量相应缩小。

    VIF inflates the variance by a factor of VIF, so the standard error is inflated by √VIF = √15 ≈ 3.87. The t-statistic is correspondingly deflated.'
