  question: '在回测 (backtest) 中，以下哪种偏差最难检测和避免？

    In backtesting, which bias is hardest to detect and avoid?'
  options:
  - A. Look-ahead bias (前瞻偏差)
  - B. Survivorship bias (幸存者偏差)
  - C. Data snooping bias (数据窥探偏差)
  - D. Transaction cost underestimation (交易成本低估)
  answer: C
  explanation: 'Data snooping（也称 multiple testing 或 p-hacking）是最隐蔽的偏差。它发生在研究者测试了大量因子/策略后只报告显著的那些，导致统计显著性被夸大。Look-ahead bias 和 survivorship bias 可以通过严格的数据管理避免。交易成本可以合理估计。但 data snooping 是研究过程的内在问题，难以完全消除。修正方法包括 Bonferroni correction、FDR control、out-of-sample validation。

    Data snooping from testing many strategies and reporting only significant ones is most insidious. Use Bonferroni correction, FDR control, or out-of-sample validation to mitigate.'
