  question: '在 Monte Carlo 模拟 GBM 路径时，使用 Euler-Maruyama 方法离散化。以下哪种做法可以避免产生负的股票价格？

    When simulating GBM paths via Monte Carlo with Euler-Maruyama discretization, which approach avoids negative stock prices?'
  options:
  - A. 使用足够小的时间步长 Δt / Use sufficiently small time step Δt
  - B. 对 ln(S) 做 Euler 离散化而非对 S 直接离散化 / Discretize ln(S) instead of S directly
  - C. 使用 Milstein method 替代 Euler method / Use Milstein method instead of Euler
  - D. 当 S 变为负值时重新抽样 / Resample when S becomes negative
  answer: B
  explanation: '对 ln(S) 做离散化：ln(S_{t+Δt}) = ln(S_t) + (μ - σ²/2)Δt + σ√Δt × Z，然后 S_{t+Δt} = exp(ln(S_{t+Δt}))，这保证 S 恒正。直接对S做Euler离散 S_{t+Δt} = S_t(1 + μΔt + σ√Δt × Z) 在 σ√Δt 较大时可能产生负值。这是 log-Euler 方法，也是GBM的精确离散化。

    Discretizing ln(S) ensures positivity since S = exp(ln(S)) > 0. This is also the exact discretization of GBM, making it both correct and efficient.'
