  question: '在对A股因子收益率进行 hypothesis testing 时，使用 t-test 检验因子月度IC均值是否显著不为零。样本量 n=60 个月，IC均值=0.05，IC标准差=0.12。t统计量最接近：

    When testing whether the monthly IC mean of an A-share factor is significantly different from zero using a t-test with n=60 months, IC mean=0.05, IC std=0.12, the t-statistic is closest to:'
  options:
  - A. 2.15
  - B. 3.23
  - C. 4.08
  - D. 1.67
  answer: B
  explanation: 't = IC_mean / (IC_std / sqrt(n)) = 0.05 / (0.12 / sqrt(60)) = 0.05 / 0.01549 ≈ 3.23。这对应ICIR（年化）= IC_mean / IC_std * sqrt(12) = 0.05/0.12 * 3.464 ≈ 1.44，是一个较好的因子。

    t = IC_mean / (IC_std / sqrt(n)) = 0.05 / (0.12 / sqrt(60)) ≈ 3.23. The annualized ICIR = IC_mean / IC_std * sqrt(12) ≈ 1.44, indicating a reasonably strong factor.'
