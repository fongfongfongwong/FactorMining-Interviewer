    - "C. 只使用最新的数据点 / Only use the latest data point"
    - "D. 批量更新，每月一次 / Batch update monthly"
  answer: "A"
  explanation: "贝叶斯在线学习的递推更新：(1)初始先验P(θ)；(2)观测数据y₁后，后验P(θ|y₁)∝P(y₁|θ)P(θ)；(3)将P(θ|y₁)作为下一个数据的先验；(4)观测y₂后更新为P(θ|y₁,y₂)。在实时因子系统中：每天收盘后用新的IC/收益数据更新因子权重的后验分布。对共轭模型(Normal-Normal)这是O(1)的更新操作，非常高效。"
