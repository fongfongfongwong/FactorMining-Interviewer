  points: 1
  question: 'Ito integral ∫₀ᵀ W(t) dW(t) 的值为：

    The value of the Ito integral ∫₀ᵀ W(t) dW(t) is:'
  options:
  - A. W(T)²/2
  - B. W(T)²/2 - T/2
  - C. T/2
  - D. W(T)²/2 + T/2
  answer: B
  explanation: '由 Ito''s lemma，d(W²) = 2W dW + dt（因为 (dW)² = dt）。因此 W(T)² = 2∫₀ᵀ W dW + T，即 ∫₀ᵀ W dW = (W(T)² - T)/2。这与普通微积分的结果 ∫x dx = x²/2 相差一个 -T/2 的修正项，这个修正项来自 Ito correction（二阶变分项）。

    By Ito''s lemma on f(W)=W²: d(W²) = 2WdW + dt. So ∫₀ᵀ WdW = (W(T)²-T)/2. The -T/2 Ito correction distinguishes this from ordinary calculus.'
