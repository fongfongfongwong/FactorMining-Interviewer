  question: '使用 Ito''s lemma 推导 geometric Brownian motion (GBM) 的解析解。设股票价格满足 dS = μS dt + σS dW。

    (a) 令 Y = ln(S)，使用 Ito''s lemma 求 dY

    (b) 对 dY 积分求 S(T) 的解析表达式

    (c) 说明为什么 E[S(T)] = S(0)e^{μT} 而非 S(0)e^{(μ-σ²/2)T}


    Derive the analytical solution of GBM using Ito''s lemma. Given dS = μS dt + σS dW.

    (a) Let Y = ln(S), use Ito''s lemma to find dY

    (b) Integrate dY to find the analytical expression for S(T)

    (c) Explain why E[S(T)] = S(0)e^{μT} and not S(0)e^{(μ-σ²/2)T}'
  options: []
  answer: ''
  explanation: '(a) 设 f(S) = ln(S)，f''(S) = 1/S，f''''(S) = -1/S²。由Ito''s lemma：

    dY = f''(S)dS + ½f''''(S)(dS)² = (1/S)(μSdt + σSdW) + ½(-1/S²)(σ²S²dt)

    = (μ - σ²/2)dt + σdW


    (b) 积分：Y(T) - Y(0) = (μ - σ²/2)T + σW(T)

    ln(S(T)) = ln(S(0)) + (μ - σ²/2)T + σW(T)

    S(T) = S(0) × exp((μ - σ²/2)T + σW(T))


    (c) E[S(T)] = S(0) × E[exp((μ-σ²/2)T + σW(T))]。由于 W(T)~N(0,T)，利用对数正态分布的矩母函数：E[e^{aW(T)}] = e^{a²T/2}。因此 E[S(T)] = S(0)e^{(μ-σ²/2)T+σ²T/2} = S(0)e^{μT}。σ²/2项在取指数期望时被抵消。'
