  question: 'Ornstein-Uhlenbeck (OU) 过程 dX = κ(θ - X)dt + σdW 的长期均值和方差分别为：

    The long-run mean and variance of the OU process dX = κ(θ - X)dt + σdW are:'
  options:
  - A. θ 和 σ²/(2κ)
  - B. θ 和 σ²/κ
  - C. 0 和 σ²/(2κ)
  - D. θ 和 σ²
  answer: A
  explanation: 'OU过程是均值回复过程，长期均值为θ（均值回复水平），长期方差（平稳方差）为σ²/(2κ)。推导：令X_∞为平稳分布，由 Var(X_∞) = σ²/(2κ) 可通过对SDE求方差的稳态条件得到。κ越大回复越快，方差越小。OU过程在量化中常用于对冲比率或统计套利中的价差建模。

    OU process has long-run mean θ and stationary variance σ²/(2κ). Larger κ means faster reversion and lower variance. Commonly used for spread modeling in statistical arbitrage.'
