- id: QR_FACT_003
  category: factor_modeling
  difficulty: senior
  type: code
  points: 5
  question: '编写 Python 函数计算因子 IC decay（IC衰减）曲线。函数接收因子值DataFrame和未来多期收益率DataFrame，计算因子值与未来 1 到 max_lag 期收益率的 rank IC。

    Write a Python function to compute factor IC decay curve. The function takes factor values DataFrame and multi-period forward returns DataFrame, computing rank IC between factor values and 1 to max_lag period forward returns.'
  options: []
  answer: ''
  explanation: IC decay曲线展示因子预测能力随时间的衰减速度。IC的半衰期（half-life）是因子换仓频率的重要参考：半衰期短的因子需要高频换仓，半衰期长的因子适合低频。
  code_snippet: "import pandas as pd\nimport numpy as np\nfrom scipy.stats import spearmanr\n\ndef compute_ic_decay(\n    factor_values: pd.DataFrame,\n    forward_returns: dict[int, pd.DataFrame],\n    max_lag: int = 20\n) -> pd.DataFrame:\n    \"\"\"\n    Compute IC decay curve for a factor.\n\n    Args:\n        factor_values: DataFrame with index=date, columns=stock_code, values=factor\n        forward_returns: Dict mapping lag -> DataFrame of forward returns\n                         e.g., {1: df_1d_return, 2: df_2d_return, ...}\n        max_lag: Maximum lag to compute (default 20 trading days)\n\n    Returns:\n        DataFrame with columns ['lag', 'ic_mean', 'ic_std', 'icir', 'hit_rate']\n    \"\"\"\n    results = []\n    for lag in range(1, max_lag + 1):\n        if lag not in forward_returns:\n            continue\n        ret_df = forward_returns[lag]\n        common_dates = factor_values.index.intersection(ret_df.index)\n\n        ic_series = []\n        for date in common_dates:\n\
    \            fv = factor_values.loc[date].dropna()\n            rv = ret_df.loc[date].dropna()\n            common_stocks = fv.index.intersection(rv.index)\n            if len(common_stocks) < 30:\n                continue\n            corr, _ = spearmanr(fv[common_stocks], rv[common_stocks])\n            ic_series.append(corr)\n\n        if len(ic_series) < 10:\n            continue\n\n        ic_arr = np.array(ic_series)\n        ic_mean = np.mean(ic_arr)\n        ic_std = np.std(ic_arr, ddof=1)\n        icir = ic_mean / ic_std if ic_std > 0 else 0.0\n        hit_rate = np.mean(ic_arr > 0)\n\n        results.append({\n            'lag': lag,\n            'ic_mean': round(ic_mean, 4),\n            'ic_std': round(ic_std, 4),\n            'icir': round(icir, 4),\n            'hit_rate': round(hit_rate, 4),\n        })\n\n    return pd.DataFrame(results)\n"
  code_language: python
  hints:
  - 'Hint 1: 每个截面日期分别计算IC，再取均值'
  - 'Hint 2: 注意处理缺失值和股票覆盖率不足的情况'
  rubric: 正确计算多lag的IC(2分)；处理缺失值和边界条件(1分)；计算IC统计量(ICIR, hit rate)(1分)；代码质量(1分)
