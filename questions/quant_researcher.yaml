- id: QR_RD_004
  category: research_design
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: '关于 multiple testing correction（多重检验修正），Bonferroni correction 对A股因子研究的主要问题是：

    Regarding multiple testing correction, the main issue with Bonferroni correction for A-share factor research is:'
  options:
  - A. 计算太复杂 / Too computationally complex
  - B. 过于保守，可能将真正有效的因子判定为不显著 / Too conservative, may reject truly significant factors
  - C. 只适用于正态分布 / Only applicable to normal distribution
  - D. 不能处理超过10个因子的情况 / Cannot handle more than 10 factors
  answer: B
  explanation: 'Bonferroni correction将显著性水平除以检验次数（α/m），这在测试数百个因子时极为保守。例如测试200个因子时，每个因子的显著性门槛为 0.05/200 = 0.00025，t-stat需要 > 3.66。更好的替代方案是 FDR (False Discovery Rate) 控制（Benjamini-Hochberg procedure），它控制的是错误发现的比例而非总错误概率，功效更高。

    Bonferroni divides α by m, making it extremely conservative when testing hundreds of factors. BH-FDR control is preferred as it controls the proportion of false discoveries.'
