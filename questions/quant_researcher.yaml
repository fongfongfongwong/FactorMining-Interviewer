- id: QR_CS_199
  category: cross_sectional_analysis
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在因子研究中，turnover analysis（换手率分析）揭示了因子的什么特征？\nWhat does turnover analysis reveal about a factor in factor research?"
  options:
    - "A. 因子信号的稳定性——高换手意味着因子排名频繁变化(信号噪声大)，低换手意味着信号持续(更可交易) / Signal stability — high turnover means frequent ranking changes (noisy signal), low turnover means persistent signal (more tradeable)"
    - "B. 因子的收益率 / Factor's return"
    - "C. 因子的名称 / Factor's name"
    - "D. 数据库的大小 / Database size"
  answer: "A"
  explanation: "因子换手率分析：(1)定义：因子portfolio每期更换的股票比例(如月度换手=本月新入组和退出组的股票数/总数)；(2)高换手因子(如短期反转)——信号变化快→需要频繁换仓→交易成本高→net alpha可能被侵蚀；(3)低换手因子(如value)——信号稳定→换仓少→交易成本低→net alpha保留更多；(4)最优因子选择需要考虑：gross alpha(信号强度)× (1-turnover×cost_per_turnover)→maximize net alpha。因此换手率分析是评估因子'可投资性'的关键维度。"
