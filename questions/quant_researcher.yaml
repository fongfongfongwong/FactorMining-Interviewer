- id: QR_RD_008
  category: research_design
  difficulty: expert
  type: show_work
  points: 8
  question: '推导 Benjamini-Hochberg FDR (False Discovery Rate) 控制程序，并应用于因子发现。

    (a) 给出 FDR 的定义

    (b) 描述 BH 程序的步骤

    (c) 假设测试了50个因子，p-values从小到大排列为 p₁=0.001, p₂=0.003, p₃=0.008, p₄=0.012, p₅=0.025, ...，在FDR=5%的控制下，哪些因子被判定为显著？


    Derive the BH-FDR control procedure and apply to factor discovery.

    (a) Define FDR

    (b) Describe BH procedure steps

    (c) With 50 factors tested, sorted p-values p₁=0.001, p₂=0.003, p₃=0.008, p₄=0.012, p₅=0.025, ..., which factors are significant at FDR=5%?'
  options: []
  answer: ''
  explanation: '(a) FDR = E[V/R | R>0] × P(R>0)，其中V是错误拒绝（false discovery）的数量，R是总拒绝数量。FDR控制的是在所有被判定为''显著''的因子中，虚假因子的期望比例。


    (b) BH程序步骤：

    1. 将m个p-value从小到大排列：p(1) ≤ p(2) ≤ ... ≤ p(m)

    2. 计算阈值：对第i个检验，阈值为 (i/m) × q，其中q是目标FDR水平

    3. 找到最大的k使得 p(k) ≤ (k/m) × q

    4. 拒绝前k个假设


    (c) 应用：m=50, q=0.05

    - p₁=0.001 vs (1/50)×0.05=0.001 → 0.001 ≤ 0.001 ✓

    - p₂=0.003 vs (2/50)×0.05=0.002 → 0.003 > 0.002 ✗


    等一下，需要继续检查：

    - p₃=0.008 vs (3/50)×0.05=0.003 → 0.008 > 0.003 ✗

    - p₄=0.012 vs (4/50)×0.05=0.004 → ✗

    - p₅=0.025 vs (5/50)×0.05=0.005 → ✗


    BH程序找最大的k使得 p(k) ≤ (k/50)×0.05。只有k=1满足。因此只有第1个因子（p=0.001）被判定为显著。如果p₂=0.0018而非0.003，则k=2也满足，前2个因子都显著。'
  code_snippet: ''
  code_language: python
  hints:
  - 'Hint 1: BH程序是逐步拒绝程序(step-up procedure)'
  - 'Hint 2: 关键是找到满足条件的最大k'
  rubric: (a) 2分：FDR定义准确；(b) 3分：BH步骤描述清晰；(c) 3分：正确应用并得出结论
