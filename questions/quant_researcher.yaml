  points: 1
  question: '因子 IC (Information Coefficient) 与 ICIR (Information Coefficient Information Ratio) 的关系，以下哪个说法正确？

    Regarding the relationship between IC and ICIR, which statement is correct?'
  options:
  - A. ICIR = IC均值 × IC标准差 / ICIR = IC mean × IC std
  - B. ICIR = IC均值 / IC标准差 / ICIR = IC mean / IC std
  - C. ICIR越高说明因子越强 / Higher ICIR means stronger factor
  - D. B和C都正确 / Both B and C are correct
  answer: D
  explanation: 'ICIR = IC_mean / IC_std，衡量因子预测能力的稳定性。IC_mean高但IC_std也高的因子不如IC_mean略低但IC_std很小的因子可靠。ICIR类似于信息比率（IR = alpha/tracking_error），ICIR > 0.5 通常被认为是好因子。年化ICIR = IC_mean / IC_std × √12（月度数据）。

    ICIR = IC_mean / IC_std measures prediction stability. ICIR > 0.5 is generally considered good. Annualized ICIR = monthly ICIR × √12.'
