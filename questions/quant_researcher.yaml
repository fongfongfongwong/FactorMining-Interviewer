  options: []
  answer: ''
  explanation: HMM假设市场存在不可观测的隐藏状态（如牛市/熊市），每个状态下收益率服从不同的分布。通过EM算法（Baum-Welch）估计参数，用Viterbi算法或前向后向算法推断隐藏状态。
  code_snippet: "import numpy as np\nimport pandas as pd\nfrom hmmlearn.hmm import GaussianHMM\n\ndef detect_market_regimes(\n    returns: pd.Series,\n    n_regimes: int = 2,\n    n_iter: int = 100,\n    random_state: int = 42,\n) -> pd.DataFrame:\n    \"\"\"\n    Detect market regimes using Gaussian HMM.\n\n    Args:\n        returns: Daily return series with datetime index\n        n_regimes: Number of hidden states (default 2: bull/bear)\n        n_iter: Max EM iterations\n        random_state: Random seed\n\n    Returns:\n        DataFrame with columns: date, return, state, prob_bull, prob_bear\n    \"\"\"\n    returns_clean = returns.dropna()\n    X = returns_clean.values.reshape(-1, 1)\n\n    model = GaussianHMM(\n        n_components=n_regimes,\n        covariance_type=\"full\",\n        n_iter=n_iter,\n        random_state=random_state,\n    )\n    model.fit(X)\n\n    states = model.predict(X)\n    state_probs = model.predict_proba(X)\n\n    # Identify bull state as the one with\
    \ higher mean return\n    means = model.means_.flatten()\n    bull_state = np.argmax(means)\n    bear_state = 1 - bull_state\n\n    result = pd.DataFrame({\n        'date': returns_clean.index,\n        'return': returns_clean.values,\n        'state': np.where(states == bull_state, 'bull', 'bear'),\n        'prob_bull': state_probs[:, bull_state],\n        'prob_bear': state_probs[:, bear_state],\n        'regime_mean': np.where(\n            states == bull_state,\n            means[bull_state],\n            means[bear_state],\n        ),\n        'regime_vol': np.where(\n            states == bull_state,\n            np.sqrt(model.covars_[bull_state].flatten()[0]),\n            np.sqrt(model.covars_[bear_state].flatten()[0]),\n        ),\n    })\n\n    return result\n"
  code_language: python
