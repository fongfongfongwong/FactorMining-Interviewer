    (c) 推导 Black-Scholes PDE

    (d) 说明 BS PDE 中为什么μ消失了


    Derive the Black-Scholes PDE. Given dS = μS dt + σS dW, risk-free rate r, option price V(S,t).

    (a) Use Ito''s lemma for dV

    (b) Construct delta-hedging portfolio and require it to be riskless

    (c) Derive the BS PDE

    (d) Explain why μ disappears from the BS PDE'
  options: []
  answer: ''
  explanation: '(a) dV = (∂V/∂t)dt + (∂V/∂S)dS + ½(∂²V/∂S²)(dS)²

    = (∂V/∂t + μS∂V/∂S + ½σ²S²∂²V/∂S²)dt + σS(∂V/∂S)dW


    (b) 构造组合 Π = V - ΔS，其中 Δ = ∂V/∂S（delta对冲）。

    dΠ = dV - ΔdS = (∂V/∂t + ½σ²S²∂²V/∂S²)dt

    随机项dW消除，组合无风险。


    (c) 无套利要求 dΠ = rΠdt，即：

    ∂V/∂t + ½σ²S²∂²V/∂S² = r(V - S∂V/∂S)

    整理得 BS PDE：∂V/∂t + rS∂V/∂S + ½σ²S²∂²V/∂S² - rV = 0


    (d) μ消失是因为delta对冲消除了所有与股票方向性风险相关的项。在风险中性世界中，所有资产的期望收益率都是r，μ被r替代。这是 risk-neutral pricing 的核心思想。'
  code_snippet: ''
