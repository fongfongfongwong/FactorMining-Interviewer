- id: QR_BAYES_120
  category: bayesian_methods
  difficulty: senior
  type: show_work
  points: 5
  question: "假设因子IC的先验分布为 N(0, 0.05²)，某因子在60个月的样本IC均值为0.04，IC标准差为0.10。请计算：(1)后验IC均值；(2)后验95%可信区间；(3)该因子IC>0的后验概率。\nGiven prior IC ~ N(0, 0.05²), sample IC mean = 0.04, sample IC std = 0.10, n = 60 months. Calculate: (1) posterior IC mean; (2) 95% credible interval; (3) posterior P(IC > 0)."
  options: []
  answer: "(1) 后验精度 = 1/σ₀² + n/σ² = 1/0.0025 + 60/0.01 = 400 + 6000 = 6400。后验方差 = 1/6400 ≈ 0.000156。后验标准差 ≈ 0.0125。后验均值 = (0/σ₀² + n*x̄/σ²) / (1/σ₀² + n/σ²) = (0 + 60*0.04/0.01) / 6400 = 240/6400 = 0.0375。\n\n(2) 95%可信区间 = 0.0375 ± 1.96*0.0125 = [0.013, 0.062]。\n\n(3) P(IC>0) = P(Z > (0-0.0375)/0.0125) = P(Z > -3.0) = Φ(3.0) ≈ 0.9987 ≈ 99.9%。"
  explanation: "这是正态-正态共轭模型的标准计算。注意后验均值0.0375比样本均值0.04略低(向先验0收缩)。数据量较大(n=60)使得收缩幅度小。后验95%可信区间不包含0，后验P(IC>0)>99%，说明该因子IC显著为正。"
  code_snippet: ""
  code_language: python
  hints:
    - "正态共轭先验的后验也是正态分布"
    - "后验精度 = 先验精度 + 数据精度"
  rubric: "后验均值计算(2分)；可信区间(1分)；后验概率(1分)；收缩解释(1分)"
  time_limit_seconds: 300

