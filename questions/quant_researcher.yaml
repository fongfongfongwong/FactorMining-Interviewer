  question: '在 MLE (Maximum Likelihood Estimation) 框架下，对数正态分布 (lognormal distribution) 的参数估计中，以下哪个说法是正确的？

    Under the MLE framework for parameter estimation of a lognormal distribution, which statement is correct?'
  options:
  - A. MLE估计量总是无偏的 / MLE estimators are always unbiased
  - B. MLE的方差估计量是有偏的，需要 Bessel correction / The MLE variance estimator is biased and needs Bessel correction
  - C. MLE在小样本下一定优于矩估计 / MLE is always superior to method of moments in small samples
  - D. 对数正态分布的MLE等价于对对数变换后数据的正态MLE / Lognormal MLE is equivalent to normal MLE on log-transformed data
  answer: D
  explanation: '对数正态分布 Y ~ LogN(μ, σ²) 意味着 ln(Y) ~ N(μ, σ²)。因此对 Y 做MLE等价于对 ln(Y) 做正态分布的MLE。B选项虽然正确描述了方差MLE的有偏性，但不如D准确和完整。A和C都是错误的——MLE不总是无偏的，小样本下也不一定优于矩估计。

    For Y ~ LogN(μ, σ²), we have ln(Y) ~ N(μ, σ²). MLE for Y is thus equivalent to normal MLE on ln(Y). While B correctly notes variance MLE bias, D is the most precise and complete answer.'
