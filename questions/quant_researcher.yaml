  explanation: '(a) 当p>n时，样本协方差矩阵是奇异的（不可逆）。即使p<n但p/n较大时，最大特征值被高估，最小特征值被低估（Marchenko-Pastur定律），导致组合优化极不稳定。

    (b) Ledoit-Wolf将样本协方差矩阵收缩向一个结构化目标（如对角阵或单因子模型协方差矩阵）：Σ̂_LW = δF + (1-δ)S，其中F是目标，S是样本协方差，δ∈[0,1]是收缩强度。这与James-Stein估计类似——将MLE向某个目标收缩以降低总体估计风险。

