- id: QR_FACT_008
  category: factor_modeling
  difficulty: senior
  type: code
  points: 5
  question: '编写 Python 函数实现 Fama-MacBeth 两步回归。第一步：每个截面日期做截面回归得到因子溢价序列。第二步：对因子溢价序列做 t 检验判断显著性。

    Write a Python function for Fama-MacBeth two-step regression. Step 1: Cross-sectional regression for each date to get factor premium series. Step 2: T-test on factor premium series for significance.'
  options: []
  answer: ''
  explanation: Fama-MacBeth (1973) 是多因子检验的标准方法。第一步在每个截面上估计因子溢价（因子收益率），第二步对溢价时间序列做统计推断。优势是自然处理了截面相关性问题。
  code_snippet: "import numpy as np\nimport pandas as pd\nfrom scipy import stats\n\ndef fama_macbeth_regression(\n    returns: pd.DataFrame,\n    factor_exposures: dict[str, pd.DataFrame],\n    min_stocks: int = 100\n) -> pd.DataFrame:\n    \"\"\"\n    Fama-MacBeth two-step cross-sectional regression.\n\n    Args:\n        returns: DataFrame, index=date, columns=stock_code, values=return\n        factor_exposures: Dict of factor_name -> DataFrame (same shape as returns)\n        min_stocks: Minimum number of stocks required per cross-section\n\n    Returns:\n        DataFrame with factor premium statistics (mean, std, t-stat, p-value)\n    \"\"\"\n    factor_names = list(factor_exposures.keys())\n    dates = returns.index\n    premium_records = []\n\n    # Step 1: Cross-sectional regression for each date\n    for date in dates:\n        ret = returns.loc[date].dropna()\n        exposures = {}\n        for fname in factor_names:\n            exp = factor_exposures[fname].loc[date].dropna()\n\
    \            exposures[fname] = exp\n\n        common_stocks = ret.index\n        for fname in factor_names:\n            common_stocks = common_stocks.intersection(exposures[fname].index)\n\n        if len(common_stocks) < min_stocks:\n            continue\n\n        y = ret[common_stocks].values\n        X = np.column_stack([\n            exposures[fname][common_stocks].values\n            for fname in factor_names\n        ])\n        X = np.column_stack([np.ones(len(common_stocks)), X])\n\n        try:\n            betas = np.linalg.lstsq(X, y, rcond=None)[0]\n            record = {'date': date, 'intercept': betas[0]}\n            for i, fname in enumerate(factor_names):\n                record[fname] = betas[i + 1]\n            premium_records.append(record)\n        except np.linalg.LinAlgError:\n            continue\n\n    premium_df = pd.DataFrame(premium_records).set_index('date')\n\n    # Step 2: T-test on factor premium time series\n    results = []\n    all_cols = ['intercept']\
    \ + factor_names\n    for col in all_cols:\n        series = premium_df[col].dropna()\n        n = len(series)\n        mean_val = series.mean()\n        std_val = series.std(ddof=1)\n        t_stat = mean_val / (std_val / np.sqrt(n))\n        p_val = 2 * (1 - stats.t.cdf(abs(t_stat), df=n - 1))\n        results.append({\n            'factor': col,\n            'mean': round(mean_val, 6),\n            'std': round(std_val, 6),\n            't_stat': round(t_stat, 4),\n            'p_value': round(p_val, 4),\n            'n_periods': n,\n        })\n\n    return pd.DataFrame(results)\n"
  code_language: python
  hints:
  - 'Hint 1: 每个截面做一次OLS回归'
  - 'Hint 2: 第二步的t统计量基于因子溢价的时间序列均值和标准误'
  rubric: 正确实现截面回归(2分)；正确计算t统计量(1分)；处理缺失值(1分)；代码风格(1分)
