- id: QR_BAYES_186
  category: bayesian_methods
  difficulty: expert
  type: open_ended
  points: 5
  question: "请设计一个Bayesian factor model选择框架：比较包含不同因子组合的模型。要求：(1)说明如何计算各模型的边际似然(marginal likelihood)；(2)如何使用Bayes Factor比较模型；(3)如何处理模型不确定性(Bayesian Model Averaging)。\nDesign a Bayesian factor model selection framework: (1) marginal likelihood computation; (2) Bayes Factor comparison; (3) model uncertainty handling via BMA."
  options: []
  answer: ""
  explanation: "框架设计：(1)边际似然计算：P(data|M) = ∫P(data|θ,M)P(θ|M)dθ。对于线性因子模型(conjugate normal-inverse-gamma prior)有解析解；对非线性模型使用：(a)Laplace approximation；(b)thermodynamic integration；(c)WAIC/LOO-CV作为近似。(2)Bayes Factor比较：BF_ij = P(data|M_i)/P(data|M_j)。比较如：M₁(3因子)vs M₂(5因子)vs M₃(5因子+交互项)。BF自动惩罚模型复杂度(Occam's razor效应——更复杂的模型先验更分散)。(3)BMA处理模型不确定性：后验模型概率P(M_k|data) ∝ P(data|M_k)P(M_k)。预测时对所有模型做加权平均：P(y_new|data) = Σ P(y_new|data,M_k)P(M_k|data)。效果：不选择单一'最优'模型，而是综合所有模型的预测(考虑模型不确定性)——在因子收益预测中BMA通常优于单一模型。"
