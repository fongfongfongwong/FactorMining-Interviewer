  question: '在 rough volatility 模型框架下，假设波动率过程的 Hurst 参数 H ≈ 0.1。以下哪个说法是正确的？

    In the rough volatility framework with Hurst parameter H ≈ 0.1 for the volatility process, which statement is correct?'
  options:
  - A. 波动率过程比标准布朗运动更光滑 / The volatility process is smoother than standard Brownian motion
  - B. 波动率的 autocorrelation 随 lag 以幂律衰减，指数约为 2H ≈ 0.2 / Volatility autocorrelation decays as a power law with exponent 2H ≈ 0.2
  - C. 该模型等价于 fractional Brownian motion 且是半鞅 / This model is equivalent to fBM and is a semimartingale
  - D. H < 0.5 意味着波动率具有长记忆性 / H < 0.5 implies long memory in volatility
  answer: B
  explanation: 'H ≈ 0.1 < 0.5 意味着波动率路径比布朗运动更粗糙（更不光滑），A错。Fractional Brownian motion 不是半鞅（当H≠0.5时），C错。H < 0.5 对应短记忆和反持续性（anti-persistence），不是长记忆，D错。波动率的 autocorrelation 近似为 C × lag^{2H-1} ≈ lag^{-0.8} 的幂律衰减，变换后 log-volatility 的 variance 以 lag^{2H} 增长，B正确。

    H ≈ 0.1 means rougher than BM (A wrong), fBM is not semimartingale for H≠0.5 (C wrong), H<0.5 means short memory/anti-persistence (D wrong). The correct power law exponent is approximately 2H.'
