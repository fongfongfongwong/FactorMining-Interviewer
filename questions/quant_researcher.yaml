  question: '在构建因子时，我们经常对原始指标做截面 rank 变换后标准化。这种做法的主要统计学依据是：

    When constructing factors, we often apply cross-sectional rank transformation followed by standardization. The main statistical rationale is:'
  options:
  - A. Rank变换使数据服从正态分布 / Rank transformation makes data normally distributed
  - B. Rank变换降低了 outliers 的影响并使分布接近均匀分布 / Rank transformation reduces outlier impact and makes distribution approximately uniform
  - C. Rank变换保留了原始数据的线性关系 / Rank transformation preserves linear relationships
