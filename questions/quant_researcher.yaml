- id: QR_CS_194
  category: cross_sectional_analysis
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在多因子模型的因子风险溢价(factor risk premium)估计中，以下关于Shanken correction的说法哪个正确？\nWhich statement about Shanken correction in factor risk premium estimation is correct?"
  options:
    - "A. Shanken correction修正了Fama-MacBeth回归中因估计beta(generated regressors)导致的标准误低估 / Shanken correction adjusts for downward-biased standard errors due to estimated betas (generated regressors) in FM regression"
    - "B. Shanken correction增加了t统计量 / Shanken correction increases t-statistics"
    - "C. 不需要任何修正 / No correction needed"
    - "D. 只在小样本中需要 / Only needed in small samples"
  answer: "A"
  explanation: "Shanken (1992) correction：(1)问题：Fama-MacBeth回归的第二步使用第一步估计的beta(而非真实beta)作为解释变量——这是'generated regressors'问题，导致第二步回归的标准误被低估(t统计量被高估)；(2)修正：SE_corrected = SE_FM × (1 + λ'Σ_f^{-1}λ)^{1/2}，其中λ是因子风险溢价向量，Σ_f是因子协方差矩阵；(3)效果：修正后t统计量变小，某些因子可能不再显著。在A股因子研究中这个修正很重要但常被忽略。"
