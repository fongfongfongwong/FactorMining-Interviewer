  - 'Hint 2: 非独立情况下需要考虑协方差矩阵的结构'
  rubric: (a) 3分：正确写出CLT近似分布；(b) 2分：正确计算；(c) 3分：正确推导含相关性的方差公式，并讨论对分散化的影响
