  question: '推导 Central Limit Theorem (CLT) 在因子组合收益估计中的应用。假设某因子多头组合包含 N 只等权股票，每只股票的日收益率独立同分布，均值 μ，方差 σ²。

    (a) 写出组合日收益率的分布近似（当 N 较大时）

    (b) 若 N=100, μ=0.05%, σ=2%，求组合日收益率标准差

    (c) 讨论当个股收益率非独立时（截面相关性 ρ>0），CLT 近似如何修正


    Derive the CLT application in factor portfolio return estimation. Assume a factor long portfolio with N equal-weighted stocks, each with i.i.d. daily returns with mean μ and variance σ².

    (a) Write the approximate distribution of portfolio daily return for large N

    (b) If N=100, μ=0.05%, σ=2%, find the portfolio daily return std

    (c) Discuss how CLT approximation changes when stock returns are cross-sectionally correlated (ρ>0)'
  options: []
  answer: ''
  explanation: '(a) 组合收益 R_p = (1/N)ΣRᵢ，由CLT，R_p ~ N(μ, σ²/N) 近似。

    (b) σ_p = σ/√N = 2%/√100 = 0.2%

    (c) 当个股间有截面相关性ρ时，Var(R_p) = σ²/N + ρσ²(N-1)/N ≈ σ²/N + ρσ²。当N→∞时，方差不趋于0，而是趋于ρσ²。这意味着系统性风险无法通过分散化消除。在A股中，截面相关性通常较高（市场beta效应），因此因子组合的风险分散效果有限。'
  code_snippet: ''
  code_language: python
  hints:
