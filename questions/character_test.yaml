- id: CHR_INT_001
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你发现回测结果中有一个对你有利的数据错误——修正后策略的夏普比率从2.0降为1.2。下周就是向投资委员会汇报的日期。你会？\nYou discover a data error in backtesting that favors your strategy—after correction, Sharpe ratio drops from 2.0 to 1.2. Investment committee presentation is next week. You would?"
  options:
    - "A. 修正错误并如实汇报，即使时间紧迫 / Correct the error and report honestly despite tight timeline"
    - "B. 先用原数据汇报，之后再悄悄修正 / Present with original data, quietly correct later"
    - "C. 修正数据但调整其他参数使结果看起来差不多 / Correct data but adjust parameters to make results look similar"
    - "D. 假装没发现这个错误 / Pretend you didn't find the error"
    - "E. 修正错误并在汇报中透明解释发现过程和影响 / Correct error and transparently explain discovery process and impact in presentation"
  answer: "E"
  scoring: {"A": 4, "B": 1, "C": 1, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——不仅修正了错误，还将发现过程作为团队学习机会。A也好但缺少主动透明。B/C/D都是不同程度的欺骗。\nE is best—not only corrects error but turns discovery into team learning opportunity. A is also good but less proactively transparent. B/C/D are varying degrees of deception."

- id: CHR_INT_002
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "一位前同事跳槽到竞争对手后，私下向你索要你当前公司的策略参数和特征数据。他表示可以给你丰厚的回报。你会？\nA former colleague at a competitor privately asks for your company's strategy parameters and feature data, offering generous compensation. You would?"
  options:
    - "A. 断然拒绝并向公司合规部门报告 / Firmly refuse and report to compliance department"
    - "B. 拒绝但不报告，不想惹麻烦 / Refuse but don't report, avoid trouble"
    - "C. 分享一些不太重要的信息作为人情 / Share some less important info as a favor"
    - "D. 用含糊的方式帮助他 / Help in a vague way"
    - "E. 拒绝，报告合规部门，并提醒团队加强信息安全意识 / Refuse, report to compliance, and remind team to strengthen info security awareness"
  answer: "E"
  scoring: {"A": 4, "B": 2, "C": 1, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——全方位保护公司利益。A也好但缺少团队层面的行动。C和D是不同程度的泄密。\nE is best—comprehensively protects company interests. A is also good but lacks team-level action. C and D are varying degrees of leaking."

- id: CHR_INT_003
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "当你发现自己的错误可能已经影响了团队的交易决策时，你会？\nWhen you discover your mistake may have already affected the team's trading decisions, you would?"
  options:
    - "A. 立即主动告知团队并评估影响 / Immediately inform team proactively and assess impact"
    - "B. 先悄悄修正，如果没人发现就不提 / Quietly fix it, don't mention if nobody notices"
    - "C. 等到合适的时机再提 / Wait for an appropriate time to mention"
    - "D. 评估影响大小——如果很小就不说了 / Assess impact size—if small, don't mention"
    - "E. 立即告知、修正、评估影响，并提出防止再犯的流程改进建议 / Immediately inform, fix, assess impact, and propose process improvements to prevent recurrence"
  answer: "E"
  scoring: {"A": 4, "B": 1, "C": 2, "D": 2, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——全面负责的态度。A也好——快速响应。D虽有逻辑但可能为隐瞒找借口。\nE is best—fully responsible attitude. A is also good—quick response. D has logic but may be excuse-making."

- id: CHR_INT_004
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你无意中在共享文件夹中看到了你不应该看到的薪资信息。你会？\nYou accidentally see salary information in a shared folder that you shouldn't have access to. You would?"
  options:
    - "A. 当作没看到，自己不会去传播 / Pretend you didn't see it, won't spread it"
    - "B. 通知IT部门修复权限问题，不提及内容 / Notify IT to fix permissions, don't mention content"
    - "C. 和信任的同事讨论看到的内容 / Discuss what you saw with trusted colleague"
    - "D. 利用这些信息来谈判自己的薪资 / Use this info to negotiate your own salary"
    - "E. 通知IT修复权限，同时向直属上级说明情况 / Notify IT to fix permissions and inform direct supervisor"
  answer: "E"
  scoring: {"A": 3, "B": 4, "C": 1, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——透明处理并确保系统修复。B也好——解决技术问题。C和D都不当利用信息。\nE is best—transparent handling and system fix. B is also good—solves technical issue. C and D both improperly use information."

- id: CHR_INT_005
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "在论文/报告写作中，你的引用习惯是？\nIn paper/report writing, your citation habits are?"
  options:
    - "A. 只引用必须引用的 / Only cite what's absolutely necessary"
    - "B. 尽量全面引用，给予所有贡献者credit / Cite comprehensively, give credit to all contributors"
    - "C. 引用对自己结论有利的研究 / Cite research that supports my conclusions"
    - "D. 有时候会忘记引用来源 / Sometimes forget to cite sources"
    - "E. 系统性地引用，包括反对自己观点的研究 / Systematically cite, including research opposing my views"
  answer: "E"
  scoring: {"A": 2, "B": 4, "C": 1, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——学术诚信的最高标准。B也好。C是选择性引用偏差。D缺乏严谨性。\nE is best—highest standard of academic integrity. B is also good. C is selective citation bias. D lacks rigor."

- id: CHR_INT_006
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "即使没有人监督，你在编写代码和文档时的标准是？\nEven when nobody is supervising, your standards for coding and documentation are?"
  options:
    - "A. 和有人review时完全一样 / Exactly the same as when someone reviews"
    - "B. 会稍微放松一些 / Slightly more relaxed"
    - "C. 取决于项目的重要程度 / Depends on project importance"
    - "D. 能跑就行 / As long as it runs"
    - "E. 甚至更严格，因为没有外部检查意味着更需要自律 / Even stricter, because no external check means more self-discipline needed"
  answer: "E"
  scoring: {"A": 4, "B": 2, "C": 3, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——内在驱动的高标准。A也好——一致性。社会称许性检测：A看似好但E更深层。\nE is best—internally driven high standards. A is also good—consistency. Social desirability: A seems good but E is deeper."

- id: CHR_INT_007
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你在社交场合被问到公司正在开发的新策略细节。你会？\nAt a social event you're asked about details of your company's new strategy being developed. You would?"
  options:
    - "A. 模糊地提一些不敏感的信息 / Vaguely mention some non-sensitive information"
    - "B. 明确拒绝讨论，说这是保密信息 / Clearly refuse to discuss, stating it's confidential"
    - "C. 看对方是谁再决定说多少 / Decide how much to say based on who's asking"
    - "D. 用行业公开信息来回应而不透露公司细节 / Respond with publicly available industry info without revealing company details"
    - "E. 礼貌转移话题，既不尴尬也不泄密 / Politely redirect the conversation, avoiding both awkwardness and disclosure"
  answer: "D"
  scoring: {"A": 2, "B": 4, "C": 1, "D": 5, "E": 4}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "D最佳——既维护保密又保持社交得体。E也好——巧妙处理。C根据对象调整保密标准是不当的。\nD is best—maintains confidentiality while being socially appropriate. E is also good—skillful handling. C varying confidentiality by person is inappropriate."

- id: CHR_INT_008
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你发现公司的交易系统存在一个漏洞，理论上可以被利用获利。你会？\nYou discover a loophole in the company's trading system that could theoretically be exploited for profit. You would?"
  options:
    - "A. 立即向技术团队和合规部门报告 / Immediately report to tech team and compliance"
    - "B. 先自己测试一下这个漏洞的可行性 / Test the loophole's feasibility first"
    - "C. 忽略它，不关我的事 / Ignore it, not my business"
    - "D. 和信任的同事讨论是否值得报告 / Discuss with trusted colleague whether worth reporting"
    - "E. 记录详细的漏洞信息后报告，同时建议修复方案 / Document detailed vulnerability info, report, and suggest fix"
  answer: "E"
  scoring: {"A": 4, "B": 1, "C": 1, "D": 2, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——负责任地报告并提供解决方案。A也好——快速报告。B可能构成不当行为。\nE is best—responsibly reports with solution. A is also good—quick reporting. B may constitute misconduct."

- id: CHR_INT_009
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你的直属上级要求你在报告中美化数据以吸引更多投资。你会？\nYour direct supervisor asks you to beautify data in a report to attract more investment. You would?"
  options:
    - "A. 照做，毕竟是上级的指示 / Do it, after all it's supervisor's instruction"
    - "B. 拒绝并保留书面证据 / Refuse and keep written evidence"
    - "C. 和上级沟通，解释为什么这样做不妥 / Communicate with supervisor, explain why this is inappropriate"
    - "D. 匿名向合规部门举报 / Anonymously report to compliance"
    - "E. 先向上级说明风险和后果，若坚持则向更高层或合规部门反映 / First explain risks and consequences to supervisor; if they insist, escalate to higher level or compliance"
  answer: "E"
  scoring: {"A": 1, "B": 3, "C": 4, "D": 3, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——阶梯式上升的解决路径。C也好——先沟通。A完全违反职业道德。\nE is best—graduated escalation path. C is also good—communicate first. A completely violates professional ethics."

- id: CHR_INT_010
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你对'善意的谎言'在工作中的态度是？\nYour attitude toward 'white lies' at work?"
  options:
    - "A. 有时候是必要的，特别是为了团队和谐 / Sometimes necessary, especially for team harmony"
    - "B. 绝对不应该，任何不诚实都会侵蚀信任 / Absolutely shouldn't, any dishonesty erodes trust"
    - "C. 取决于情况和后果 / Depends on situation and consequences"
    - "D. 可以不说全部真话，但不应该说假话 / Can omit full truth but shouldn't tell lies"
    - "E. 用建设性和尊重的方式说真话比善意的谎言更好 / Telling truth constructively and respectfully is better than white lies"
  answer: "E"
  scoring: {"A": 2, "B": 3, "C": 3, "D": 3, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——找到诚实和尊重的平衡。B虽原则性强但可能忽视方式方法。\nE is best—finds balance between honesty and respect. B is principled but may neglect methods."

- id: CHR_INT_011
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你在使用开源代码时，发现许可证要求必须注明出处但很少有人遵守。你会？\nWhen using open-source code, you discover the license requires attribution but few people comply. You would?"
  options:
    - "A. 按规定注明出处 / Properly attribute as required"
    - "B. 和大多数人一样不注明 / Skip attribution like most people"
    - "C. 只在重要项目中注明 / Only attribute in important projects"
    - "D. 如果代码修改较多就不注明 / Don't attribute if significantly modified"
    - "E. 不仅注明出处，还建立团队统一的开源使用规范 / Not only attribute but establish team-wide open-source usage standards"
  answer: "E"
  scoring: {"A": 4, "B": 1, "C": 2, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——从个人合规提升到团队制度。A也好——个人层面遵守。B随大流缺乏原则。\nE is best—elevates from personal compliance to team institution. A is also good—personal compliance. B follows crowd without principles."

- id: CHR_INT_012
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你负责的策略在特定条件下可能会对市场造成不公平影响（如加剧流动性危机）。你会？\nYour strategy may cause unfair market impact under certain conditions (e.g., exacerbate liquidity crisis). You would?"
  options:
    - "A. 只要合规合法就没问题 / As long as it's legal and compliant, no problem"
    - "B. 主动添加安全阀机制来限制策略在极端情况下的行为 / Proactively add safety valve mechanism to limit strategy behavior in extreme conditions"
    - "C. 只有在监管要求时才做调整 / Only adjust when regulators require"
    - "D. 不是我的问题，市场参与者应该自己管理风险 / Not my problem, market participants should manage their own risk"
    - "E. 研究策略的系统性影响并主动和风控团队讨论改进方案 / Study strategy's systemic impact and proactively discuss improvements with risk team"
  answer: "E"
  scoring: {"A": 2, "B": 4, "C": 2, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——超越合规，考虑更广泛的市场影响。B也好——主动的安全措施。D缺乏社会责任。\nE is best—goes beyond compliance to consider broader market impact. B is also good—proactive safety measures. D lacks social responsibility."

- id: CHR_INT_013
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你偶然发现一位同事在利用公司资源做个人项目。你会？\nYou accidentally discover a colleague using company resources for a personal project. You would?"
  options:
    - "A. 直接向上级报告 / Report directly to supervisor"
    - "B. 私下提醒该同事这样做不合适 / Privately remind them this is inappropriate"
    - "C. 不干涉，不关我的事 / Don't interfere, not my business"
    - "D. 看项目规模——小事就算了 / Depends on scale—let minor things slide"
    - "E. 先了解情况——是否已获得批准或是否属于灰色地带 / First understand—has it been approved or is it a gray area"
  answer: "E"
  scoring: {"A": 3, "B": 4, "C": 1, "D": 2, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——不急于判断，先了解全貌。B也好——私下解决。A可能过于严苛（如果已被批准）。\nE is best—doesn't rush to judgment, understands full picture first. B is also good—private resolution. A may be overly harsh (if approved)."

- id: CHR_INT_014
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "在面试过程中，面试官问你的一个弱点。你会？\nDuring an interview, the interviewer asks about your weakness. You would?"
  options:
    - "A. 说一个其实是优点的'弱点'（如'我太追求完美了'） / Give a weakness that's actually a strength ('I'm too much of a perfectionist')"
    - "B. 诚实地分享一个真实弱点以及你如何在改进 / Honestly share a real weakness and how you're improving"
    - "C. 说一个无关紧要的弱点 / Mention an irrelevant weakness"
    - "D. 说你没有明显的弱点 / Say you have no notable weaknesses"
    - "E. 分享一个真实弱点，具体说明它如何影响过你的工作，以及你采取了什么措施 / Share a real weakness with specific examples of how it affected your work and what measures you took"
  answer: "E"
  scoring: {"A": 2, "B": 4, "C": 2, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——深度自我认知加改进行动。B也好——诚实。A是常见但透明度低的策略。D缺乏自我认知。\nE is best—deep self-awareness plus improvement action. B is also good—honest. A is common but low-transparency strategy. D lacks self-awareness."

- id: CHR_INT_015
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你收到了一条可能是内幕消息的信息（如某公司即将被收购）。你会？\nYou receive what might be insider information (e.g., a company is about to be acquired). You would?"
  options:
    - "A. 利用这个信息交易获利 / Use this information to trade for profit"
    - "B. 忽略它，不确定是否真实 / Ignore it, unsure if it's real"
    - "C. 向合规部门报告并确保自己没有基于此做任何交易 / Report to compliance and ensure no trades based on this"
    - "D. 告诉朋友让他去交易 / Tell a friend to trade"
    - "E. 立即记录收到信息的时间和来源，报告合规部门，并主动限制自己对相关标的的交易权限 / Immediately document time and source, report to compliance, and proactively restrict own trading access to related securities"
  answer: "E"
  scoring: {"A": 1, "B": 2, "C": 4, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——全面保护自己和公司。C也好。A和D是违法行为（内幕交易）。\nE is best—comprehensively protects self and company. C is also good. A and D are illegal (insider trading)."

- id: CHR_INT_016
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你对'结果证明一切'这句话的看法是？\nYour view on 'results justify everything'?"
  options:
    - "A. 完全同意，在商业世界中结果就是一切 / Completely agree, results are everything in business"
    - "B. 过程同样重要，不道德的手段不应被接受 / Process equally important, unethical means shouldn't be accepted"
    - "C. 大多数时候是对的 / True most of the time"
    - "D. 短期内可能，长期来看过程决定了可持续性 / Maybe short-term, but long-term process determines sustainability"
    - "E. 结果和过程的完整性同样重要——好结果不能洗白坏过程 / Integrity of both results and process matters equally—good results don't whitewash bad process"
  answer: "E"
  scoring: {"A": 1, "B": 4, "C": 2, "D": 3, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——明确表达过程完整性不可妥协。B也好。A在金融中可能导致道德风险。\nE is best—clearly states process integrity is non-negotiable. B is also good. A may lead to moral hazard in finance."

- id: CHR_INT_017
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "当你对公司的某项政策有不同意见时，你会？\nWhen you disagree with a company policy, you would?"
  options:
    - "A. 默默遵守，不发表意见 / Silently comply, no opinion expressed"
    - "B. 在公开场合批评该政策 / Publicly criticize the policy"
    - "C. 通过正当渠道表达意见并提出替代建议 / Express opinion through proper channels with alternative suggestions"
    - "D. 暗中不执行 / Secretly not comply"
    - "E. 先遵守政策，同时通过正式渠道推动改变 / Comply first, while pushing for change through formal channels"
  answer: "E"
  scoring: {"A": 2, "B": 2, "C": 4, "D": 1, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——先合规后推动改变。C也好——积极表达。D最差——暗中违规。\nE is best—comply first then push for change. C is also good—actively express. D is worst—covert non-compliance."

- id: CHR_INT_018
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你在审核同事的代码时发现了一个bug但同事正在度假。你会？\nWhile reviewing a colleague's code you find a bug but the colleague is on vacation. You would?"
  options:
    - "A. 等他回来再说 / Wait until they return"
    - "B. 自己修复并记录下来 / Fix it yourself and document"
    - "C. 发一封邮件通知他 / Send an email to notify them"
    - "D. 只有影响到生产环境才处理 / Only handle if it affects production"
    - "E. 评估紧急程度——紧急则修复并通知，不紧急则记录并在他回来后讨论 / Assess urgency—fix and notify if urgent; document and discuss upon return if not"
  answer: "E"
  scoring: {"A": 1, "B": 4, "C": 3, "D": 2, "E": 5}
  dimension: "诚信正直 Integrity & Ethics"
  explanation: "E最佳——根据情况合理处理。B也好——主动修复。A可能导致问题扩大。\nE is best—handles reasonably based on situation. B is also good—proactive fix. A may let problem grow."

- id: CHR_INT_019
  category: integrity_ethics
  type: multiple_choice
  points: 1
  question: "你认为在量化金融中，什么比赚钱更重要？\nWhat do you think is more important than making money in quantitative finance?"
  options:
    - "A. 没有什么比赚钱更重要 / Nothing is more important than making money"
    - "B. 维护个人和公司的声誉 / Maintaining personal and company reputation"
