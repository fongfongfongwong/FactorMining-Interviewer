- id: CHR_INT_001
  category: integrity_ethics
  type: likert_scale
  question: 即使没有人监督，我也会遵循正确的流程和规范。/ Even when no one is watching, I follow the correct processes and standards.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估自律性和内在道德标准。在量化交易中，许多操作是自主进行的，没有实时监督，内在诚信至关重要。/ Assesses self-discipline and internal moral standards. In quantitative trading, many operations are conducted autonomously without real-time supervision; internal integrity is crucial.
- id: CHR_INT_002
  category: integrity_ethics
  type: scenario
  question: 你发现回测结果中有一个对你有利的数据错误——修正后策略的夏普比率从2.0降为1.2。下周就是向投资委员会汇报的日期。你会？/ You discover a data error in backtesting results that favors your strategy—after correction, the Sharpe ratio drops from 2.0 to 1.2. Next week is the presentation to the investment committee. What would you do?
  options:
  - A. 修正错误并如实汇报，即使时间紧迫 / Correct the error and report honestly, even though time is tight
  - B. 先用原数据汇报，之后再悄悄修正 / Present with original data first, then quietly correct later
  - C. 修正数据但通过调整其他参数使结果看起来差不多 / Correct the data but adjust other parameters to make results look similar
  - D. 假装没发现这个错误 / Pretend you didn't find the error
  scoring:
    A: 4
    B: 1
    C: 1
    D: 1
  dimension: 诚信正直 Integrity & Ethics
  explanation: A是唯一正确答案。B、C、D都属于不同程度的数据造假，在量化金融中是严重的职业道德问题，可能导致巨大的投资损失。/ A is the only correct answer. B, C, D are varying degrees of data fabrication, a serious ethical issue in quantitative finance that could lead to massive investment losses.
- id: CHR_INT_003
  category: integrity_ethics
  type: likert_scale
  question: 当发现自己的错误可能影响他人时，我会立即主动告知。/ When I discover my mistake might affect others, I immediately and proactively inform them.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估错误披露的主动性。在量化系统中，延迟报告错误可能导致级联损失。/ Assesses proactiveness in error disclosure. In quantitative systems, delayed error reporting can cause cascading losses.
- id: CHR_INT_004
  category: integrity_ethics
  type: scenario
  question: 一位前同事跳槽到竞争对手后，私下向你索要你当前公司的策略参数和特征数据。他表示可以给你一份丰厚的回报。你会？/ A former colleague who moved to a competitor privately asks you for your current company's strategy parameters and feature data. They offer generous compensation. What would you do?
  options:
  - A. 断然拒绝并向公司合规部门报告此事 / Firmly refuse and report the incident to the company's compliance department
  - B. 拒绝但不报告，不想惹麻烦 / Refuse but don't report, not wanting trouble
  - C. 分享一些不太重要的信息作为人情 / Share some less important information as a favor
  - D. 考虑对方的提议，因为回报很丰厚 / Consider the offer because the compensation is generous
  scoring:
    A: 4
    B: 2
    C: 1
    D: 1
  dimension: 诚信正直 Integrity & Ethics
  explanation: A最优，既保护了公司利益又履行了合规义务。B虽然拒绝了但未尽报告义务。C和D都涉及商业秘密泄露，是严重违规。/ A is optimal, protecting company interests and fulfilling compliance obligations. B refuses but doesn't meet reporting duties. C and D both involve trade secret leakage, a serious violation.
- id: CHR_INT_005
  category: integrity_ethics
  type: likert_scale
  question: 我认为在竞争中使用一些'灰色地带'的手段是可以接受的。/ I believe using some 'gray area' methods in competition is acceptable.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: reverse
  dimension: 诚信正直 Integrity & Ethics
  explanation: 反向计分。评估道德底线的清晰度。在高度监管的金融行业，灰色地带操作可能演变为严重违规。/ Reverse-scored. Assesses clarity of moral boundaries. In the heavily regulated financial industry, gray-area operations may escalate into serious violations.
- id: CHR_INT_006
  category: integrity_ethics
  type: likert_scale
  question: 如果一个'白色谎言'能避免团队冲突，我认为这是可以接受的。/ If a 'white lie' can avoid team conflict, I think it's acceptable.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: reverse
  dimension: 诚信正直 Integrity & Ethics
  explanation: 反向计分。评估诚实度的一致性。即使是善意的谎言也可能侵蚀团队信任，在数据驱动的环境中尤其危险。/ Reverse-scored. Assesses consistency of honesty. Even well-intentioned lies can erode team trust, especially dangerous in data-driven environments.
- id: CHR_INT_007
  category: integrity_ethics
  type: scenario
  question: 你在研究中意外发现了一个可能带来巨大个人收益的内幕信息（如某上市公司即将并购）。你会？/ During your research, you accidentally discover insider information that could bring huge personal gain (e.g., an upcoming corporate merger). What would you do?
  options:
  - A. 利用这个信息在个人账户进行交易 / Use this information to trade in your personal account
  - B. 告知朋友或家人让他们交易 / Tell friends or family so they can trade
  - C. 立即报告给合规部门，并在公开前回避相关交易 / Immediately report to the compliance department and avoid related trades until public disclosure
  - D. 不交易但也不报告，当作没看到 / Don't trade but don't report either, pretend you didn't see it
  scoring:
    A: 1
    B: 1
    C: 4
    D: 2
  dimension: 诚信正直 Integrity & Ethics
  explanation: C是唯一正确答案。A和B都构成内幕交易，是严重违法行为。D虽未交易但未履行报告义务，也有合规风险。/ C is the only correct answer. A and B constitute insider trading, a serious legal offense. D avoids trading but fails to meet reporting obligations, also posing compliance risk.
- id: CHR_INT_008
  category: integrity_ethics
  type: likert_scale
  question: 我在面试或工作汇报中从未夸大过自己的成绩。/ I have never exaggerated my achievements in interviews or work reports.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: social_desirability_check
  dimension: 社会期望性检测 Social Desirability Detection
  explanation: 社会期望性检测题。绝大多数人在某些场合都会适度美化自己的表现，绝对的'从未'不太可信。/ Social desirability check. Most people embellish their performance on some occasions; an absolute 'never' is not very credible.
- id: CHR_INT_009
  category: integrity_ethics
  type: likert_scale
  question: 我会拒绝执行我认为不道德的指令，即使它来自上级。/ I would refuse to execute an instruction I consider unethical, even if it comes from a superior.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估对权威的道德独立性。在金融历史中，许多重大丑闻都源于下级盲目服从上级的不当指令。/ Assesses moral independence from authority. In financial history, many major scandals originated from subordinates blindly following superiors' improper instructions.
- id: CHR_INT_010
  category: integrity_ethics
  type: scenario
  question: 你发现团队中一位同事在策略回报中使用了'前视偏差'（look-ahead bias），导致结果虚高。他是你的好朋友。你会？/ You discover a teammate is using look-ahead bias in strategy returns, causing inflated results. They are a good friend. What would you do?
  options:
  - A. 视而不见，因为是好朋友 / Look the other way because they're a good friend
  - B. 私下告诉他这个问题，督促他自行修正并汇报 / Privately tell them about the issue and urge them to correct and report it themselves
  - C. 直接向PM报告 / Report directly to the PM
  - D. 在公开会议上指出这个问题 / Point out the issue in a public meeting
  scoring:
    A: 1
    B: 4
    C: 3
    D: 2
  dimension: 诚信正直 Integrity & Ethics
  explanation: B最优，平衡了友情和职业道德——给朋友机会自行纠正。C也可接受。A是包庇。D虽正确但方式可能不当。/ B is optimal, balancing friendship and professional ethics—giving the friend a chance to self-correct. C is also acceptable. A is covering up. D is correct but the approach may be inappropriate.
- id: CHR_INT_011
  category: integrity_ethics
  type: likert_scale
  question: 我在汇报研究结果时会如实呈现所有测试，包括失败的测试。/ When reporting research results, I present all tests honestly, including failed ones.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估选择性报告偏差抗性。隐藏失败的测试是p-hacking的一种形式，在因子研究中极其危险。/ Assesses resistance to selective reporting bias. Hiding failed tests is a form of p-hacking, extremely dangerous in factor research.
- id: CHR_INT_012
  category: integrity_ethics
  type: likert_scale
  question: 结果好的话，过程中的小违规是可以接受的。/ If the result is good, small violations in the process are acceptable.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: reverse
  dimension: 诚信正直 Integrity & Ethics
  explanation: 反向计分。评估'结果导向'vs'过程导向'的道德观。好的结果不能为不当手段正名，在量化金融中过程合规至关重要。/ Reverse-scored. Assesses 'outcome-oriented' vs 'process-oriented' ethics. Good results don't justify improper means; process compliance is crucial in quantitative finance.
- id: CHR_INT_013
  category: integrity_ethics
  type: scenario
  question: 你注意到公司的风控系统有一个漏洞，可以让你的策略绕过某些限制来提升表现。这个漏洞没有被其他人发现。你会？/ You notice the company's risk control system has a loophole that could let your strategy bypass certain limits to improve performance. No one else has discovered this loophole. What would you do?
  options:
  - A. 利用这个漏洞来提升策略表现 / Exploit the loophole to improve strategy performance
  - B. 报告给风控团队，帮助修复漏洞 / Report to the risk control team and help fix the loophole
  - C. 不利用也不报告，与自己无关 / Don't exploit it but don't report it either; it's not your concern
  - D. 和几个信任的同事分享，看他们怎么做 / Share with a few trusted colleagues and see what they do
  scoring:
    A: 1
    B: 4
    C: 2
    D: 2
  dimension: 诚信正直 Integrity & Ethics
  explanation: B是唯一正确的选择。A是不诚信行为。C和D都没有尽到发现风险后的报告义务。风控漏洞未修复可能导致系统性风险。/ B is the only correct choice. A is dishonest behavior. C and D fail to meet reporting obligations after discovering a risk. Unfixed risk control loopholes may lead to systemic risk.
- id: CHR_INT_014
  category: integrity_ethics
  type: likert_scale
  question: 我会保守客户和公司的商业机密，即使已经离开了这家公司。/ I keep clients' and the company's trade secrets, even after leaving the company.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估保密意识的持续性。量化策略的核心竞争力在于知识产权，离职后的保密义务同样重要。/ Assesses persistence of confidentiality awareness. The core competitiveness of quantitative strategies lies in intellectual property; post-departure confidentiality obligations are equally important.
- id: CHR_INT_015
  category: integrity_ethics
  type: likert_scale
  question: 当面临利益冲突时，我会选择对公司和客户最有利的方案。/ When facing conflicts of interest, I choose the option most beneficial to the company and clients.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估利益冲突处理。信托责任要求将客户利益置于个人利益之上，这是金融业的基本道德准则。/ Assesses conflict of interest handling. Fiduciary duty requires placing client interests above personal interests, a fundamental ethical principle in finance.
- id: CHR_INT_016
  category: integrity_ethics
  type: likert_scale
  question: 我从未对工作中遇到的人有过负面看法。/ I have never had negative thoughts about anyone I've worked with.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: social_desirability_check
  dimension: 社会期望性检测 Social Desirability Detection
  explanation: 社会期望性检测题。在工作中完全没有负面想法是不现实的，强烈同意可能表示粉饰回答。/ Social desirability check. Having absolutely no negative thoughts at work is unrealistic; strong agreement may indicate embellished responses.
- id: CHR_INT_017
  category: integrity_ethics
  type: scenario
  question: 你的策略在实际运行中因为市场流动性问题表现不如回测。在季度汇报中，PM问你为什么实际表现与回测差距这么大。你会？/ Your strategy performs worse in live trading than in backtesting due to market liquidity issues. In the quarterly report, the PM asks why there's such a large gap between live and backtested performance. What would you do?
  options:
  - A. 坦诚地解释流动性影响，并展示你已经在做的改进措施 / Honestly explain the liquidity impact and show improvements you're already making
  - B. 强调回测的理论正确性，淡化实际差距 / Emphasize the theoretical correctness of the backtest and downplay the actual gap
  - C. 将问题归咎于市场环境异常 / Blame the issue on abnormal market conditions
  - D. 承诺下季度一定能改善，但不详细解释原因 / Promise improvement next quarter without explaining the reasons in detail
  scoring:
    A: 4
    B: 1
    C: 2
    D: 2
  dimension: 诚信正直 Integrity & Ethics
  explanation: A最优，展示了诚实和问题解决导向。B是误导性陈述。C推卸责任。D缺乏透明度。/ A is optimal, showing honesty and problem-solving orientation. B is misleading. C deflects responsibility. D lacks transparency.
- id: CHR_INT_018
  category: integrity_ethics
  type: likert_scale
  question: 我认为诚实有时会让人在职场中处于不利地位。/ I believe honesty sometimes puts you at a disadvantage in the workplace.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: reverse
  dimension: 诚信正直 Integrity & Ethics
  explanation: 反向计分。评估对诚实代价的认知。虽然这种想法有一定现实性，但强烈认同可能反映出为不诚实行为寻找合理化的倾向。/ Reverse-scored. Assesses perception of the cost of honesty. While this thought has some realism, strong agreement may reflect a tendency to rationalize dishonest behavior.
- id: CHR_INT_019
  category: integrity_ethics
  type: likert_scale
  question: 我在数据处理和分析中严格遵循可复现性原则。/ I strictly follow reproducibility principles in data processing and analysis.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估科学诚信。可复现性是量化研究的基石，不可复现的结果无法被验证和信任。/ Assesses scientific integrity. Reproducibility is the cornerstone of quantitative research; non-reproducible results cannot be verified or trusted.
- id: CHR_INT_020
  category: integrity_ethics
  type: scenario
  question: 你的朋友在另一家量化基金工作，在社交场合他随口提到了他们正在研究的一个新因子方向。你会？/ Your friend works at another quant fund. At a social event, they casually mention a new factor direction they're researching. What would you do?
  options:
  - A. 仔细记住并在自己的工作中利用这个信息 / Carefully remember and use this information in your own work
  - B. 礼貌地中断话题，提醒对方注意保密义务 / Politely interrupt and remind them about confidentiality obligations
  - C. 继续听但不主动追问细节 / Continue listening but don't actively ask for details
  - D. 故意引导他透露更多信息 / Deliberately guide them to reveal more information
  scoring:
    A: 1
    B: 4
    C: 2
    D: 1
  dimension: 诚信正直 Integrity & Ethics
  explanation: B最优，展示了双向保密意识——不仅保护自己公司的秘密，也提醒对方注意保密。A和D是不道德的信息获取。/ B is optimal, showing bilateral confidentiality awareness—protecting not only your company's secrets but also reminding others about confidentiality. A and D are unethical information gathering.
- id: CHR_INT_021
  category: integrity_ethics
  type: likert_scale
  question: 当我的分析结论不支持PM想要的方向时，我仍然会如实呈现。/ When my analysis conclusions don't support the direction the PM wants, I still present them honestly.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估对权威的诚实独立性。在压力下仍坚持数据说话而非迎合上级是量化研究者最重要的品质之一。/ Assesses honest independence from authority. Sticking to data-driven conclusions rather than catering to superiors under pressure is one of the most important qualities of a quantitative researcher.
- id: CHR_INT_022
  category: integrity_ethics
  type: likert_scale
  question: 我会如实填写工作时间记录，不会虚报加班。/ I honestly fill in work time records and don't falsely claim overtime.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
  explanation: 评估日常工作中的诚信。小事上的诚信反映了一个人的整体道德标准。/ Assesses integrity in daily work. Integrity in small matters reflects a person's overall moral standards.
- id: CHR_INT_023
  category: integrity_ethics
  type: likert_scale
  question: 我认为为了更大的目标，偶尔歪曲事实是可以接受的。/ I believe occasionally distorting facts for a greater goal is acceptable.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: reverse
  dimension: 诚信正直 Integrity & Ethics
  explanation: 反向计分。评估功利主义伦理倾向。'目的正当化手段'的思维在金融行业中已导致多次重大丑闻。/ Reverse-scored. Assesses utilitarian ethical tendency. 'The end justifies the means' thinking has led to multiple major scandals in the finance industry.
- id: CHR_INT_024
  category: integrity_ethics
  type: scenario
  question: 公司的一项新合规政策大幅增加了你的策略开发周期，从2周延长到6周。你感觉这个政策过于严格。你会？/ A new company compliance policy significantly extends your strategy development cycle from 2 weeks to 6 weeks. You feel this policy is too strict. What would you do?
  options:
  - A. 找漏洞绕过合规检查以加快进度 / Find loopholes to bypass compliance checks to speed up
  - B. 通过正式渠道提出建设性的改进建议 / Submit constructive improvement suggestions through formal channels
  - C. 抱怨但遵守，消极对待合规要求 / Complain but comply, passively fulfilling compliance requirements
  - D. 公开表达不满，影响团队士气 / Openly express dissatisfaction, affecting team morale
  scoring:
    A: 1
    B: 4
    C: 2
    D: 1
  dimension: 诚信正直 Integrity & Ethics
  explanation: B最优，通过建设性参与来改善流程。A是违规行为。C虽然遵守但态度消极。D破坏团队氛围。/ B is optimal, improving processes through constructive engagement. A is a violation. C complies but with a negative attitude. D damages team atmosphere.
- id: CHR_INT_025
  category: integrity_ethics
  type: likert_scale
  question: 我相信长期来看，诚信的人在量化金融行业中会更成功。/ I believe that in the long run, people with integrity will be more successful in the quantitative finance industry.
  options:
  - 1. 非常不同意 Strongly Disagree
  - 2. 不同意 Disagree
  - 3. 中立 Neutral
  - 4. 同意 Agree
  - 5. 非常同意 Strongly Agree
  scoring_direction: positive
  dimension: 诚信正直 Integrity & Ethics
