- id: TR_RISK_008
  category: risk_management
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "Maximum drawdown的定义是什么？\nWhat is the definition of maximum drawdown?"
  options:
    - "A. 从任意历史高点到随后最低点的最大跌幅 / Maximum decline from any historical peak to subsequent trough"
    - "B. 单日最大亏损 / Maximum single-day loss"
    - "C. 年度最大累计亏损 / Maximum annual cumulative loss"
    - "D. 低于均值的最大偏差 / Maximum deviation below the mean"
  answer: "A"
  explanation: "Maximum drawdown (MDD) = max_{t} (max_{s<=t} P(s) - P(t)) / max_{s<=t} P(s)。即在整个时间序列中，从任意历史高点（peak）到随后低点（trough）的最大百分比下跌幅度。MDD是衡量下行风险的重要指标，投资者和allocator通常非常关注这个指标。Calmar ratio = annualized return / max drawdown。"
  hints: []
  rubric: ""
  time_limit_seconds: 45

- id: TR_RISK_009
