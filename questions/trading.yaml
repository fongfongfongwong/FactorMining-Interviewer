- id: TR_HFT_199
  category: hft_concepts
  difficulty: expert
  type: multiple_choice
  points: 1
  question: "在评价做市商表现时，'effective spread'和'realized spread'的区别是什么？\nWhat is the difference between 'effective spread' and 'realized spread' in evaluating market maker performance?"
  options:
    - "A. Effective spread衡量即时执行成本(trade price vs midpoint)；Realized spread衡量做市商的实际利润(扣除after-trade price movement的adverse selection成本) / Effective spread measures immediate execution cost; Realized spread measures actual MM profit after adverse selection"
    - "B. 两者完全相同 / They are identical"
    - "C. Realized spread总是更大 / Realized spread is always larger"
    - "D. Effective spread包含所有成本 / Effective spread includes all costs"
  answer: "A"
  explanation: "Effective vs Realized Spread：(1)Effective spread = 2 × |trade_price - midpoint|——衡量投资者的即时成本(做市商的即时毛利)；(2)Realized spread = 2 × direction × (trade_price - midpoint_after_Δt)——Δt后(如5分钟)价格的变化反映了adverse selection→realized spread = effective spread - adverse selection；(3)做市商的真正利润是realized spread(扣除了知情交易者的'挑选'成本)；(4)如果realized spread < 0→做市商在亏钱(adverse selection > spread收入)。"
