- id: TR_MATH_013
  category: mental_math
  difficulty: medium_high
  type: show_work
  points: 5
  question: "你有60%的概率赢得一场赌注，每次赢得3元，输则损失2元。连续独立玩5次。计算：(1) 至少赢3次的概率；(2) 5次游戏的期望总收益；(3) 5次游戏总收益的标准差。展示计算过程。\nWin prob=60%, win 3, lose 2, play 5 times independently. Calculate: (1) P(at least 3 wins); (2) Expected total payoff over 5 games; (3) Std dev of total payoff. Show work."
  options: []
  answer: "(1) P(>=3) = P(3) + P(4) + P(5) = C(5,3)*0.6^3*0.4^2 + C(5,4)*0.6^4*0.4 + 0.6^5 = 10*0.216*0.16 + 5*0.1296*0.4 + 0.07776 = 0.3456 + 0.2592 + 0.07776 = 0.6826 ≈ 68.3%。\n(2) 每次EV = 0.6*3 + 0.4*(-2) = 1.8 - 0.8 = 1.0元。5次总EV = 5*1.0 = 5.0元。\n(3) 每次Var = E[X^2] - (E[X])^2。E[X^2] = 0.6*9 + 0.4*4 = 5.4 + 1.6 = 7.0。Var = 7.0 - 1.0 = 6.0。5次总Var = 5*6.0 = 30.0。Std = sqrt(30) ≈ 5.48元。"
  explanation: "本题综合考察概率计算、期望值和方差。关键：(1) 二项分布概率计算；(2) 独立随机变量之和的期望 = 期望之和；(3) 独立随机变量之和的方差 = 方差之和。"
