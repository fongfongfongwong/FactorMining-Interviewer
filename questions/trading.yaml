- id: TR_HFT_139
  category: hft_concepts
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "以下关于做市商的'逆向选择'(adverse selection)风险的说法哪个正确？\nWhich statement about market maker adverse selection risk is correct?"
  options:
    - "A. 知情交易者倾向于在做市商的报价上成交，使做市商持续在不利方向上累积头寸 / Informed traders tend to trade against market maker quotes, causing unfavorable inventory accumulation"
    - "B. 逆向选择只影响做空方 / Adverse selection only affects short sellers"
    - "C. 做市商可以完全消除逆向选择 / Market makers can fully eliminate adverse selection"
    - "D. 逆向选择与信息不对称无关 / Adverse selection is unrelated to information asymmetry"
  answer: "A"
  explanation: "Adverse selection(Glosten-Milgrom模型)：(1)知情交易者知道资产真实价值——他们只在做市商报价有利(低于真实价值时买入、高于时卖出)时交易；(2)不知情交易者(noise traders)随机交易；(3)做市商与知情交易者交易平均亏钱——需要从不知情交易者赚的spread来补偿。对策：(1)加宽spread(但会失去竞争力)；(2)检测知情交易流(如大单、特定时段)并调整报价。"
