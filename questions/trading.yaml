  question: "在波动率交易中，'variance swap'和'volatility swap'的关键区别是什么？\nWhat is the key difference between a variance swap and a volatility swap?"
  options:
    - "A. Variance swap的payoff是线性于方差(σ²)的，更容易用vanilla期权复制；Volatility swap是线性于波动率(σ)的，复制更困难 / Variance swap payoff is linear in variance (easier to replicate); vol swap is linear in volatility (harder to replicate)"
    - "B. 两者完全相同 / They are identical"
    - "C. Variance swap风险更小 / Variance swap has less risk"
    - "D. Volatility swap更常见 / Volatility swap is more common"
  answer: "A"
  explanation: "Variance swap：payoff = N_var × (RV² - K²)，线性于已实现方差。可以通过静态复制(一系列不同行权价的vanilla期权)进行无模型定价(Carr-Madan)。Volatility swap：payoff = N_vol × (RV - K_vol)，线性于已实现波动率。由于σ = √(σ²)是凸函数，复制需要动态对冲，对模型依赖更强。因此variance swap在机构市场更流行(更容易对冲)。"
