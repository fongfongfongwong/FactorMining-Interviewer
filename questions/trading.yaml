  question: "在宏观量化中，'nowcasting'（即时预测）GDP的方法论是什么？\nWhat is the methodology of GDP 'nowcasting' in quantitative macro?"
  options:
    - "A. 使用高频数据(如PMI、就业、消费指标)通过因子模型实时估算当季GDP——弥补GDP滞后2个月发布的缺陷 / Use high-frequency data (PMI, employment, consumption) via factor models to estimate current-quarter GDP in real time"
