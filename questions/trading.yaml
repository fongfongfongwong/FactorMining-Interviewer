    - "B. 只投资一个行业 / Invest in one sector only"
    - "C. 增加行业偏离 / Increase sector deviation"
    - "D. 不做任何行业约束 / No sector constraint"
  answer: "A"
  explanation: "行业中性的价值：(1)将alpha来源限制为个股选择(stock selection)——而非行业配置(sector allocation)；(2)如果因子信号(如value)自然偏向某些行业(如银行)，不做行业中性则portfolio是在做行业赌注(bet on banking)而非选股；(3)实现：在优化器中约束Σ(w_i * sector_dummy_j) = Σ(w_bench_i * sector_dummy_j)对所有行业j；(4)trade-off：行业中性会损失一些alpha(如果行业配置本身有信息)但降低了行业风险(如某行业政策突变)。"
