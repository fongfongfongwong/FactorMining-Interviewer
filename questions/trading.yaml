  question: "在Kyle (1985)模型的均衡中，以下哪项描述是正确的？\nIn the equilibrium of Kyle's (1985) model, which statement is correct?"
  options:
    - "A. 知情交易者提交的订单量与其信息优势（V-p_0）成线性关系，做市商定价规则也是线性的 / The informed trader's order is linear in information advantage, and market maker's pricing rule is also linear"
    - "B. 知情交易者总是提交最大量的订单以最大化利润 / The informed trader always submits maximum volume"
    - "C. 做市商可以完全区分知情和不知情订单 / The market maker can perfectly distinguish informed from uninformed orders"
    - "D. 均衡spread为零因为竞争消除了利润 / Equilibrium spread is zero due to competition"
  answer: "A"
  explanation: "Kyle (1985)模型的核心结果是线性均衡：知情交易者的最优策略是x = beta*(V-p_0)，做市商的定价规则是p = p_0 + lambda*y（y=x+u是总订单流）。知情交易者不会全力交易（隐藏信息），做市商无法区分知情和噪音订单但通过lambda调节定价。beta = sigma_u/(2*lambda*sigma_V)，lambda = sigma_V/(2*sigma_u)。这产生了著名的结果：知情交易者获取一半的信息租金。"
  hints:
    - "思考知情交易者的最优行为：全力交易 vs 隐藏信息"
  rubric: ""
