  answer: ""
  explanation: "实验设计：\n(1) Disposition Effect测试：给trader模拟portfolio，跟踪其sell decisions。统计sell winner vs sell loser的比例（PGR vs PLR）。Debiasing：实施mechanical trailing stops，消除人为决策。\n(2) Overconfidence测试：让trader对未来价格给出90% confidence interval，计算calibration（理论上90%应该落入区间，但overconfident traders通常只有60-70%）。Debiasing：定期review预测vs实际，建立feedback loop。\n(3) Anchoring测试：给trader random starting point（'昨天价格是X'），看是否影响fair value估计。Debiasing：使用多种独立估值方法，减少对单一参考点的依赖。\n(4) Status Quo Bias测试：观察trader是否不愿调整现有持仓（即使信号已改变）。Debiasing：定期'blank sheet' exercise，从零开始构建最优portfolio。"
