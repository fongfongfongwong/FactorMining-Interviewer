    - "D. Cross-sectional不存在 / CS doesn't exist"
  answer: "A"
  explanation: "两种momentum的区别(Moskowitz, Ooi, Pedersen, 2012)：(1)Time-series momentum——每个资产独立：过去12个月收益>0则做多，<0则做空。CTA主要使用TS momentum(如Managed Futures)。可以是net long或net short。(2)Cross-sectional momentum——相对排名：在一组资产中做多过去表现最好的N个、做空最差的N个。总头寸通常是dollar-neutral。(3)关键区别：TS momentum可以对所有资产同时做多(如牛市中)或同时做空(如熊市)；CS momentum总是多空平衡(零敞口)。两者的alpha来源不同但有重叠。"
