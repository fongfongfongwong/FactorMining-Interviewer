- id: TR_MATH_002
  category: mental_math
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "一枚硬币连续抛3次，至少出现2次正面的概率是多少？\nA fair coin is flipped 3 times. What is the probability of at least 2 heads?"
  options:
    - "A. 1/2"
    - "B. 3/8"
    - "C. 1/4"
    - "D. 5/8"
  answer: "A"
  explanation: "至少2次正面 = P(2次) + P(3次) = C(3,2)*(1/2)^3 + C(3,3)*(1/2)^3 = 3/8 + 1/8 = 4/8 = 1/2。也可以用对称性：由于P(>=2 heads) = P(>=2 tails) = P(<=1 heads)，而两者之和为1，所以P(>=2 heads) = 1/2。"
  hints: []
  rubric: ""
  time_limit_seconds: 30

