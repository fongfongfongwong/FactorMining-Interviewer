- id: TR_RISK_019
  category: risk_management
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在Monte Carlo VaR中，使用Cholesky decomposition的目的是什么？\nWhat is the purpose of Cholesky decomposition in Monte Carlo VaR?"
  options:
    - "A. 生成具有指定相关结构的随机数 / Generate random numbers with specified correlation structure"
    - "B. 加速Monte Carlo模拟 / Speed up Monte Carlo simulation"
    - "C. 减少方差 / Reduce variance"
    - "D. 将非正态分布转换为正态分布 / Transform non-normal to normal distributions"
  answer: "A"
  explanation: "Cholesky decomposition将相关矩阵Sigma分解为L*L'（L为下三角矩阵）。然后用L乘以独立标准正态随机向量z得到具有目标相关结构的随机向量：x = L*z，其中Cov(x) = L*I*L' = Sigma。这是Monte Carlo simulation中生成相关资产价格路径的标准方法。注意Sigma必须是正定矩阵才能进行Cholesky分解。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

