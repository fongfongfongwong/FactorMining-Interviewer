  answer: "A"
  explanation: "策略容量分析：(1)随着AUM增加→交易量增加→市场冲击增加→net alpha下降；(2)容量上限(capacity constraint)：alpha被市场冲击完全侵蚀时的AUM——small-cap momentum策略可能只有5亿，large-cap value策略可能100亿；(3)估算方法：模拟不同AUM下的执行成本(参与率×ADV×impact function)，找到net alpha归零的AUM点；(4)实际影响：很多优秀的小市值因子(如A股小盘股reversal)在实际中因容量限制无法管理大规模资金——capacity是策略可行性的核心维度。"
