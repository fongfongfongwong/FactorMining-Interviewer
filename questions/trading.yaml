  question: "Optimal stopping problem (Secretary Problem)：面试100个候选人，依次面试不能回头。你的目标是选到最优秀的。经典策略是什么？\nOptimal stopping (Secretary Problem): Interview 100 candidates sequentially. Classic strategy?"
  options:
    - "A. 先面试约37个（100/e ≈ 37）不选，然后选择第一个超过前37个最优者的候选人 / Interview ~37 (100/e), then pick first one better than best of first 37"
    - "B. 随机选一个 / Pick randomly"
    - "C. 选第50个 / Pick the 50th"
    - "D. 先面试10个然后选下一个比平均好的 / Interview 10, then pick next above-average"
  answer: "A"
  explanation: "经典的Secretary Problem最优策略（1/e stopping rule）：先拒绝前n/e ≈ 37个候选人（'exploration phase'），记录他们中的最高水平。然后在剩余候选人中选择第一个超过exploration phase最高水平的。这个策略选到最优候选人的概率约为1/e ≈ 36.8%，是所有策略中最高的。这个思想在trading中也有应用：观察期后设定阈值进行决策。"
  hints:
