    - "B. Treynor ratio"
    - "C. Information ratio"
    - "D. Jensen's alpha"
  answer: "A"
  explanation: "Sortino ratio = (R_p - R_f) / Downside_deviation。与Sharpe ratio不同，Sortino ratio只惩罚低于目标收益率（通常为无风险利率或0）的波动，不惩罚上行波动。这更符合投资者的真实偏好——投资者不厌恶正方向的波动。Treynor ratio用beta作为风险度量；Information ratio用tracking error；Jensen's alpha是绝对超额收益。"
  hints: []
  rubric: ""
  time_limit_seconds: 45

