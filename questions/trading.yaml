  question: "在做市中，'skewing the quotes'是什么意思？\nIn market making, what does 'skewing the quotes' mean?"
  options:
    - "A. 根据库存方向不对称地偏移bid和ask / Asymmetrically shifting bid and ask based on inventory direction"
    - "B. 报出虚假的价格 / Quoting fake prices"
