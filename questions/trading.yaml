  rubric: ""
  time_limit_seconds: 45

- id: TR_PNL_008
  category: pnl_analysis
  difficulty: expert
  type: multiple_choice
  points: 1
  question: "在PnL attribution中，'interaction effect'指的是什么？\nIn PnL attribution, what is the 'interaction effect'?"
  options:
    - "A. 多个因子暴露变化同时发生导致的交叉项效应 / Cross-term effect from simultaneous changes in multiple factor exposures"
    - "B. 不同策略之间的相关性 / Correlation between different strategies"
    - "C. 市场波动对PnL的影响 / Market volatility's impact on PnL"
    - "D. 交易频率对成本的影响 / Trading frequency's impact on costs"
  answer: "A"
  explanation: "在Brinson attribution或multi-factor PnL分解中，interaction effect是由于多个维度同时变化产生的交叉项。例如，在Brinson模型中：total effect = allocation effect + selection effect + interaction effect。Interaction effect = sum_i (w_p,i - w_b,i) * (r_p,i - r_b,i)，反映了'在超配的行业中选择了超额收益的股票'这种叠加效应。这个项在实际归因中经常被忽视但可能很大。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

- id: TR_PNL_009
  category: pnl_analysis
  difficulty: expert
  type: show_work
  points: 8
  question: "一个量化策略在某一天的交易如下：上午10:00决定买入股票A，decision price=50.00元；分3笔执行：10:05以50.05成交3000股，10:15以50.12成交4000股，10:30以50.20成交3000股。当天A的VWAP=50.15元，收盘价=50.50元。计算：(1) Arrival price slippage；(2) VWAP slippage；(3) 将total slippage分解为timing cost和market impact。\nA strategy decides to buy stock A at 10:00 (decision price=50.00). 3 fills: 50.05/3K at 10:05, 50.12/4K at 10:15, 50.20/3K at 10:30. VWAP=50.15, close=50.50. Calculate arrival, VWAP slippage, and decompose."
  options: []
  answer: "加权平均成交价 = (50.05*3000 + 50.12*4000 + 50.20*3000) / 10000 = (150,150 + 200,480 + 150,600) / 10000 = 501,230 / 10000 = 50.123元。\n\n(1) Arrival price slippage = 加权成交价 - Decision price = 50.123 - 50.00 = 0.123元/股 = 0.246%。总slippage金额 = 0.123 * 10,000 = 1,230元。\n\n(2) VWAP slippage = 加权成交价 - VWAP = 50.123 - 50.15 = -0.027元/股。负值表示执行价格优于VWAP（成交均价低于市场VWAP），执行质量良好。\n\n(3) 分解（简化方法）：假设价格在执行期间线性上涨。Timing cost ≈ 执行期间的价格漂移对未执行部分的影响。Market impact ≈ 每笔成交价格vs当时市场价格的差异。精确分解需要执行期间的market mid-price数据，这里做近似：如果价格从50.00均匀涨到50.30（30分钟内），则timing cost = 无market impact时的成交均价 - decision price；market impact = 实际成交均价 - 无impact时的成交均价。"
  explanation: "本题考察实际的TCA分析能力。关键点：(1) 正确计算加权平均成交价；(2) 理解不同benchmark的含义（arrival price vs VWAP）；(3) slippage分解需要同期市场价格数据，实际中需要用mid-price时间序列。"
  hints:
    - "先计算加权平均成交价"
    - "注意VWAP slippage的正负含义"
  rubric: "成交均价计算(2分)；Arrival slippage(2分)；VWAP slippage(2分)；分解(2分)"
  time_limit_seconds: 360

- id: TR_PNL_010
  category: pnl_analysis
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在评估执行算法的质量时，以下哪个指标最适合衡量算法的'市场冲击最小化'能力？\nWhich metric best measures an execution algorithm's ability to minimize market impact?"
  options:
    - "A. Arrival price slippage减去同期市场趋势的估计 / Arrival price slippage minus estimated market trend"
    - "B. Fill rate / 成交率"
    - "C. 总执行时间 / Total execution time"
    - "D. 订单拆分的均匀程度 / Uniformity of order splitting"
  answer: "A"
  explanation: "衡量market impact需要将价格变化中由交易引起的部分和市场本身趋势分离。方法：Estimated impact = Arrival slippage - Alpha (market trend estimate)。如果不去除market trend，在上涨市场中买入的slippage会被高估。常用方法包括：(1) T+30min的price reversion分析；(2) 使用market return作为benchmark；(3) 用matched non-traded stocks作为control group。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

