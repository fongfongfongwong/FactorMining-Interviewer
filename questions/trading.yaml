  question: "一个策略在100个交易日中有58天盈利，平均盈利日赚1.5万元，平均亏损日亏2万元。计算：(1) 总PnL；(2) Profit factor；(3) 日均PnL的t-statistic（假设日PnL标准差为4万元）。该策略在统计上显著吗？\n58 wins in 100 days, avg win=15K, avg loss=20K. Calculate: (1) Total PnL; (2) Profit factor; (3) t-stat of daily PnL (assume daily PnL std=40K). Is it statistically significant?"
  options: []
  answer: "Total PnL = 58*1.5万 - 42*2万 = 87万 - 84万 = 3万元。\nProfit Factor = 87/84 = 1.036。\n日均PnL = 3万/100 = 0.03万 = 300元。t-stat = (mean PnL)/(std/sqrt(n)) = 300/(40000/sqrt(100)) = 300/4000 = 0.075。t-stat=0.075远小于1.96（5%显著性水平），策略在统计上不显著。虽然PnL为正，但完全可能是随机噪音。"
