    - "D. 不需要预测GDP / No need to forecast GDP"
  answer: "A"
  explanation: "GDP Nowcasting (Giannone, Reichlin, Small, 2008; NY Fed Nowcast)：(1)挑战：GDP是季度数据、滞后2个月发布——对交易来说太慢；(2)方法：Dynamic Factor Model将100+个高频指标(日/周/月频)提取共同因子，实时估算当季GDP；(3)数据：PMI(月初)、就业(周)、零售(月中)、工业产出(月底)等逐步更新→nowcast随新数据到达不断修正；(4)在宏观交易中：nowcast的revision方向(上修/下修)比水平更有交易价值——surprise factor驱动资产价格变化。"
