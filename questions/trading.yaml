- id: TR_RISK_017
  category: risk_management
  difficulty: medium_high
  type: show_work
  points: 5
  question: "一个portfolio的VaR(95%, 1-day)为100万元。在正态分布假设下：(1) 计算VaR(99%, 1-day)；(2) 计算VaR(95%, 10-day)；(3) 计算ES(95%, 1-day)。展示计算过程。已知z(95%)=1.645, z(99%)=2.326, phi(z_{95%})=0.1031。\nPortfolio VaR(95%, 1-day)=1M. Under normality: (1) VaR(99%, 1-day); (2) VaR(95%, 10-day); (3) ES(95%, 1-day). Show work."
  options: []
  answer: "(1) sigma = VaR(95%)/z(95%) = 100/1.645 = 60.79万。VaR(99%, 1-day) = z(99%)*sigma = 2.326*60.79 = 141.4万。\n(2) VaR(95%, 10-day) = VaR(95%, 1-day) * sqrt(10) = 100 * 3.162 = 316.2万。（square root of time rule）\n(3) ES(95%, 1-day) = sigma * phi(z_{0.95}) / (1-0.95) = 60.79 * 0.1031 / 0.05 = 60.79 * 2.062 = 125.3万。其中phi是标准正态PDF。"
  explanation: "本题考察VaR和ES的基本计算能力。关键公式：VaR scales with z-score for confidence level changes, with sqrt(T) for time horizon changes。ES under normality = sigma * phi(z_alpha) / alpha。"
