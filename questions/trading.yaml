  question: "Card Game Market Making (Jane Street style): 从一副标准52张扑克牌中随机抽取5张。'产品'是5张牌点数之和（A=1, J=11, Q=12, K=13, 2-10按面值）。(1) 在没有任何信息时，给出你的bid/ask。(2) 现在你知道5张牌中有2张是K。更新报价。(3) 讨论最优spread应如何确定。\nCard Game: 5 cards drawn from standard 52-card deck. Product = sum of card values (A=1, J=11, Q=12, K=13). (1) Quote without info. (2) Update given 2 Kings. (3) Discuss optimal spread."
