  question: "在宏观量化中，Taylor Rule（泰勒规则）如何用于利率预测和交易？\nHow is the Taylor Rule used for interest rate prediction and trading in quant macro?"
  options:
    - "A. 用Taylor Rule估算'应该的'政策利率，与实际利率的偏差可以预测央行下一步动作(加息/降息) / Estimate 'warranted' policy rate via Taylor Rule; deviation from actual rate predicts next central bank move"
    - "B. Taylor Rule已经过时 / Taylor Rule is outdated"
    - "C. 只适用于美国 / Only applies to US"
    - "D. 不能用于交易 / Cannot be used for trading"
  answer: "A"
  explanation: "Taylor Rule in Macro Trading：(1)公式：i* = r* + π + 0.5(π-π*) + 0.5(y-y*)，其中r*=自然利率，π=通胀，π*=通胀目标，y-y*=产出缺口；(2)交易应用：计算Taylor Rule隐含的'应该利率'→如果当前利率远低于Taylor Rule(too loose)→预测加息→做空债券(利率上升→债券价格下跌)；(3)变体：各央行可能使用不同权重(如Yellen Rule更偏重就业)；(4)局限：(a)参数(r*, y*)不可直接观测需要估计；(b)央行可能因其他原因偏离Taylor Rule(如金融稳定考虑)。"
