  explanation: "(1) 无信息时：每张牌的期望值 = (1+2+...+13)*4/52 * 13/13 = (91/13) = 7。5张的期望总和 = 5*7 = 35。报价：33/37（spread=4）。\n(2) 已知2张K（值=13）：已确定26点。剩余3张从剩余48张（减去2张K，还有2张K和46张其他）中抽取。剩余牌的均值 = (91*4 - 13*2)/48 = (364-26)/48 = 338/48 = 7.042。3张期望 = 21.125。总期望 = 26 + 21.125 = 47.125。更新报价：45/49（spread=4）。\n(3) 最优spread取决于：剩余不确定性（方差）、对手信息优势、竞争强度。可以用剩余方差来校准。"
