- id: TR_MICRO_017
  category: microstructure
  difficulty: expert
  type: multiple_choice
  points: 1
  question: "Price impact的square-root law指的是什么？\nWhat does the square-root law of price impact refer to?"
  options:
    - "A. 价格影响与交易量的平方根成正比 / Price impact is proportional to the square root of trading volume"
    - "B. 价格影响与时间的平方根成正比 / Price impact is proportional to square root of time"
    - "C. Spread与波动率的平方根成正比 / Spread is proportional to square root of volatility"
    - "D. 执行成本与持仓量的平方根成正比 / Execution cost is proportional to square root of position size"
  answer: "A"
  explanation: "大量实证研究（Bouchaud, 2009; Almgren et al., 2005; Torre, 1997）发现market impact遵循幂律关系：Impact ~ sigma * (Q/V)^delta，其中delta约为0.5（即平方根）。这意味着交易量翻倍，价格影响只增加约41%。这个规律在不同市场、不同时期、不同资产类别中都相当稳健，被认为是市场微观结构的'universal law'之一。"
