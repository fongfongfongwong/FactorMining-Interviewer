- id: TR_RISK_013
  category: risk_management
  difficulty: expert
  type: multiple_choice
  points: 1
  question: "在计算Expected Shortfall时，关于其对尾部事件的敏感性，以下哪项描述是正确的？\nRegarding ES's sensitivity to tail events, which statement is correct?"
  options:
    - "A. ES对尾部分布的具体形状敏感，而VaR只依赖于分位数 / ES is sensitive to the shape of the tail distribution, while VaR depends only on the quantile"
    - "B. ES和VaR对尾部事件同样敏感 / ES and VaR are equally sensitive to tail events"
    - "C. VaR比ES对极端事件更敏感 / VaR is more sensitive to extreme events than ES"
    - "D. ES不受极端outlier影响 / ES is unaffected by extreme outliers"
  answer: "A"
  explanation: "ES = E[L | L > VaR_alpha]是尾部损失的条件均值，因此它对尾部的整个形状（包括极端事件）都敏感。如果尾部分布从thin-tailed变为fat-tailed，即使VaR_alpha不变，ES也会显著增大。VaR只是一个分位数，不关心超过该分位数后损失有多大。这既是ES的优势（更全面衡量尾部风险），也是其挑战（对极端outlier敏感，估计的variance更大）。"
