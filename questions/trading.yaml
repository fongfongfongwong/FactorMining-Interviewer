  explanation: "Dispersion trading：(1)核心：指数波动率 < Σ(权重 × 成分股波动率)×相关系数。实际中指数IV往往包含'correlation premium'(投资者倾向于购买指数put保护，推高指数IV)；(2)策略：卖出指数期权(做空指数vol)+买入成分股期权(做多个股vol)；(3)本质上做空correlation——赚钱条件是实际相关系数低于隐含相关系数；(4)风险：市场恐慌时相关性飙升至1(所有股票同跌)，策略会亏损。"
