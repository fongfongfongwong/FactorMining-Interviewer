  question: "Market Making Game (Jane Street style): 我要卖给你一个mystery box，里面有一个数字X。X是从1到100均匀随机抽取的。你可以问我一个YES/NO问题来获取关于X的信息，然后你需要给出你的bid和ask（spread至少为5）。你的对手也在做同样的事情。问题是：'X是否大于50？' 我回答 'YES'。请给出你的bid/ask，并解释你的定价逻辑。\nMarket Making Game: I sell you a mystery box with number X drawn uniformly from 1-100. You ask one YES/NO question, then quote bid/ask (min spread=5). Your question: 'Is X > 50?' Answer: 'YES'. Give your bid/ask and explain."
  options: []
  answer: ""
  explanation: "已知X > 50，X均匀分布在51-100上，E[X] = 75.5。作为做市商，bid/ask应该以75.5为中心。最小spread为5，所以基础报价为73/78。但需要考虑：(1) 对手可能有不同信息（他们问了不同问题）；(2) 如果对手的bid高于你的ask，他可能知道X较大；(3) 可以根据对手行为调整。一个合理的初始报价：73/78（spread=5，居中于75.5）。如果需要更保守：71/79（spread=8，留出adverse selection buffer）。竞争激烈时收窄到73/78。"
