- id: TR_RISK_002
  category: risk_management
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "Expected Shortfall (CVaR) 相比VaR的主要优势是什么？\nWhat is the main advantage of Expected Shortfall (CVaR) over VaR?"
  options:
    - "A. ES是coherent risk measure，满足次可加性(sub-additivity) / ES is a coherent risk measure satisfying sub-additivity"
    - "B. ES计算更简单 / ES is simpler to compute"
    - "C. ES不需要分布假设 / ES requires no distributional assumptions"
    - "D. ES总是小于VaR / ES is always smaller than VaR"
  answer: "A"
  explanation: "ES (Expected Shortfall, 也叫CVaR) 是coherent risk measure（Artzner et al., 1999），满足次可加性：ES(A+B) <= ES(A) + ES(B)。这意味着分散化不会增加风险，符合经济直觉。而VaR不满足次可加性——两个组合合并后的VaR可能超过各自VaR之和。ES定义为E[L | L > VaR_alpha]，即超过VaR阈值的平均损失，它考虑了尾部的形状而不仅仅是分位数。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

- id: TR_RISK_003
  category: risk_management
  difficulty: senior
  type: show_work
  points: 5
  question: "一个portfolio持有100万元的股票A（beta=1.2, 日波动率=2%）和50万元的股票B（beta=0.8, 日波动率=3%）。假设两只股票的相关系数为0.6。计算该portfolio的95% 1-day parametric VaR。\nA portfolio holds 1M of stock A (beta=1.2, daily vol=2%) and 0.5M of stock B (beta=0.8, daily vol=3%). Correlation=0.6. Calculate 95% 1-day parametric VaR."
  options: []
  answer: "Portfolio variance: sigma_p^2 = w_A^2 * sigma_A^2 + w_B^2 * sigma_B^2 + 2*w_A*w_B*rho*sigma_A*sigma_B。w_A=1,000,000, w_B=500,000, sigma_A=0.02, sigma_B=0.03, rho=0.6。sigma_p^2 = (1M)^2*(0.02)^2 + (0.5M)^2*(0.03)^2 + 2*(1M)*(0.5M)*0.6*0.02*0.03 = 400 + 225 + 360 = 985 (单位：元^2*10^-6 → 即985*10^6*10^-6=985)。等等，让我重算：sigma_p^2(dollar) = (1,000,000*0.02)^2 + (500,000*0.03)^2 + 2*(1,000,000*0.02)*(500,000*0.03)*0.6 = 20,000^2 + 15,000^2 + 2*20,000*15,000*0.6 = 400,000,000 + 225,000,000 + 360,000,000 = 985,000,000。sigma_p = sqrt(985,000,000) = 31,385元。VaR_95% = 1.645 * 31,385 = 51,628元。"
  explanation: "本题考察参数法VaR的计算。关键步骤：(1) 计算dollar-weighted的portfolio方差；(2) 使用正态分布的分位数（95%对应1.645）乘以portfolio标准差。注意beta信息在此题中未直接使用，因为我们直接给出了个股波动率和相关系数。beta在portfolio层面的市场风险分析中更相关。"
  hints:
    - "先计算portfolio的dollar variance"
    - "95%对应正态分布的1.645倍标准差"
  rubric: "公式正确(2分)；计算正确(2分)；单位和解释(1分)"
  time_limit_seconds: 300

- id: TR_RISK_004
  category: risk_management
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "Kelly criterion建议的最优仓位比例f*的公式是什么（二元结果情况）？\nWhat is the Kelly criterion optimal fraction f* for a binary outcome?"
  options:
    - "A. f* = (bp - q) / b，其中b为赔率，p为胜率，q=1-p / where b=odds, p=win prob, q=1-p"
    - "B. f* = p - q / f* = win prob minus loss prob"
    - "C. f* = E[return] / Var[return]"
    - "D. f* = Sharpe ratio / volatility"
  answer: "A"
  explanation: "Kelly criterion (Kelly, 1956)的经典公式为f* = (bp - q) / b，其中b是赢时的赔率（赢1元赔b元），p是胜率，q=1-p是败率。也可以写成f* = p - q/b = p - (1-p)/b。Kelly仓位最大化长期对数增长率。在实践中，通常使用half-Kelly或fractional Kelly来降低回撤风险，因为full Kelly的回撤可能非常大。对于连续分布，f* = mu/sigma^2（均值/方差）。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

