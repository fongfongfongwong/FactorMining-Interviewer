- id: TR_MM_012
  category: market_making
  difficulty: expert
  type: show_work
  points: 8
  question: "Auction Game: 一个sealed-bid second-price auction（Vickrey auction）。你和另外2个竞标者竞拍一件商品，该商品对你的价值V服从[0,100]均匀分布（每人独立抽取）。在second-price auction中，(1) 你的最优竞标策略是什么？(2) 如果改为first-price auction，你的最优竞标策略是什么？(3) 在两种拍卖中，你的expected payment相同吗？\nVickrey auction with 3 bidders, values uniform on [0,100]. (1) Optimal bid in second-price? (2) Optimal bid in first-price? (3) Same expected payment?"
  options: []
  answer: "(1) Second-price auction：最优策略是truthful bidding，b(v) = v。因为在second-price中，出价不影响你支付的价格（支付第二高价），所以真实报价是弱占优策略。\n\n(2) First-price auction（3个bidders，uniform[0,100]）：最优竞标函数为 b(v) = v * (n-1)/n = v * 2/3。直觉：你需要在winning（出价高）和paying less（出价低）之间权衡。\n\n推导：对称均衡中，假设b(v) = alpha*v。如果你出价b，winning概率 = P(b > b(v_j), for all j) = P(v_j < b/alpha, for all j) = (b/alpha)^(n-1)。期望收益 = (v-b)*(b/alpha)^(n-1)。对b求导令其为0：(n-1)*(v-b)*b^(n-2)/alpha^(n-1) - b^(n-1)/alpha^(n-1) = 0。解得 b = v*(n-1)/n = 2v/3。\n\n(3) Revenue Equivalence Theorem：在对称独立私有价值模型中，两种拍卖的expected payment相同。E[payment|second-price, win] = E[second highest value | v wins] = v*(n-1)/(n+1)*something... 实际上，expected revenue per bidder在两种拍卖中相等，这是Revenue Equivalence Theorem的结论。"
  explanation: "本题考察auction theory基础。关键结果：(1) Second-price auction中truthful bidding是占优策略；(2) First-price auction中最优bid是value的shading，b(v) = v*(n-1)/n；(3) Revenue Equivalence Theorem保证在标准假设下，两种拍卖产生相同的期望收入。"
  hints:
    - "Second-price auction中，你的出价不影响你支付的价格"
    - "First-price中考虑对称均衡 b(v) = alpha*v"
  rubric: "Second-price分析(2分)；First-price推导(3分)；Revenue equivalence(3分)"
  time_limit_seconds: 600

