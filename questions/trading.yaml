  question: "Sunk cost fallacy如何影响交易决策？最好的应对方法是什么？\nHow does sunk cost fallacy affect trading? What is the best countermeasure?"
  options:
    - "A. 因为已经投入了时间/金钱在一笔交易上而不愿止损。应对：每天做'blank sheet' exercise / Reluctance to cut losses due to invested time/money. Counter: daily blank-sheet exercise"
    - "B. 只影响新手，有经验的trader免疫 / Only affects beginners"
    - "C. 通过加仓来降低平均成本 / Averaging down to lower cost basis"
    - "D. 与交易无关 / Not relevant to trading"
  answer: "A"
  explanation: "Sunk cost fallacy在交易中表现为：'我已经在这笔交易上亏了这么多，不能白亏'，导致不愿止损。'Blank sheet' exercise的方法：每天问自己'如果我现在没有任何仓位，面对当前信息，我会建仓吗？'如果答案是不会，就应该平仓。这把决策从'是否继续持有'（受sunk cost影响）转换为'是否从零开始建仓'（只关注forward-looking信息）。"
