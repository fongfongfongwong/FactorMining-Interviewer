  explanation: "对比：(1)TWAP——适用：流动性好、无紧迫性、订单量小。优点：简单透明。缺点：不适应流动性变化。(2)VWAP——适用：以全天VWAP为benchmark(多数机构默认)。优点：跟踪市场成交节奏。缺点：依赖历史volume profile，信息泄露(可预测的执行模式)。(3)IS——适用：对alpha有信心、需要minimizing cost from decision。优点：动态权衡timing risk和impact。缺点：复杂度高、参数敏感。(4)POV——适用：大单执行、控制market participation rate。优点：自适应流动性。缺点：执行时间不确定。选择准则：urgency高→IS/aggressive VWAP；alpha signal强→IS(快速执行捕获alpha)；passive/benchmark→VWAP；大单/低流动性→POV。"
