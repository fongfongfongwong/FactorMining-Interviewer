    - "B. 收益和损失端都是线性的 / Linear for both gains and losses"
    - "C. 收益端凸，损失端凹 / Convex for gains, concave for losses"
    - "D. 对称的S型曲线 / Symmetric S-curve"
  answer: "A"
  explanation: "Kahneman and Tversky (1979) 的value function v(x)有三个关键特征：(1) Reference dependence - 价值相对于参考点评估；(2) Diminishing sensitivity - 收益端凹（边际收益递减），损失端凸（边际损失递减）；(3) Loss aversion - 损失的心理权重约为收益的2-2.5倍（v'(-x) > v'(x) for x>0）。典型函数形式：v(x) = x^0.88 for x>=0, v(x) = -2.25*(-x)^0.88 for x<0。"
