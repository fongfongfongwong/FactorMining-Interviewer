  answer: "A"
  explanation: "ETF做市商可以通过creation/redemption机制（申赎机制）管理库存。当做市商积累了过多的ETF多头，可以通过redemption将ETF份额换成底层一篮子股票，然后在股票市场卖出；反之亦然。此外，ETF价格与NAV的偏离也提供了无风险套利机会。这使得ETF做市相比单只股票做市有更好的库存管理工具。"
