  question: "在使用杠杆的portfolio中，volatility targeting策略的核心思想是什么？\nWhat is the core idea of a volatility targeting strategy in a leveraged portfolio?"
  options:
    - "A. 根据实现波动率动态调整杠杆，维持目标波动率水平 / Dynamically adjust leverage based on realized vol to maintain target vol"
    - "B. 始终保持最大杠杆 / Always maintain maximum leverage"
    - "C. 在波动率高时增加杠杆 / Increase leverage when vol is high"
    - "D. 仅在波动率低于阈值时交易 / Only trade when vol is below threshold"
  answer: "A"
  explanation: "Volatility targeting策略的核心是将portfolio的波动率维持在目标水平。当realized volatility低时，增加杠杆（因为risk per unit exposure低）；当realized volatility高时，降低杠杆。公式：leverage = target_vol / estimated_vol。这确保了portfolio在不同市场环境下承担大致相同的风险。Moreira and Muir (2017)发现这种策略可以提高risk-adjusted returns。"
