  points: 1
  question: "在repeated game中，tit-for-tat策略的核心特征是什么？为什么它在做市博弈中有参考价值？\nWhat are the core features of tit-for-tat in repeated games? Why is it relevant to market making?"
  options:
    - "A. 初始合作，然后模仿对方上一轮策略。在做市中可用于维持competitive但non-destructive的定价 / Start cooperating, then mirror opponent's last move. Maintains competitive but non-destructive pricing"
    - "B. 始终采取激进策略 / Always play aggressively"
    - "C. 随机选择策略 / Random strategy selection"
    - "D. 始终合作不管对方行为 / Always cooperate regardless"
  answer: "A"
  explanation: "Tit-for-tat (Axelrod, 1984)的核心特征：(1) Nice - 初始合作；(2) Retaliatory - 如果对方背叛则惩罚；(3) Forgiving - 对方回归合作后恢复合作；(4) Clear - 策略透明易理解。在做市博弈中，这意味着：初始报出competitive spread，如果竞争对手维持合理pricing则继续，如果对方恶性竞争（predatory pricing）则跟进但不升级。这在repeated market making game中是稳健策略。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

- id: TR_BEHAV_013
  category: behavioral
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "为什么position sizing在交易心理学中如此重要？\nWhy is position sizing so critical in trading psychology?"
  options:
    - "A. 仓位过大会导致情绪化决策，即使策略正确也可能因恐惧而过早退出 / Oversized positions cause emotional decisions, leading to premature exits even with correct strategy"
    - "B. 仓位大小与心理无关 / Position size is unrelated to psychology"
    - "C. 仓位越大越好，显示信心 / Larger positions are always better, showing conviction"
    - "D. 仓位大小只影响P&L，不影响决策 / Position size only affects P&L, not decisions"
  answer: "A"
  explanation: "Position sizing直接影响交易心理：(1) 仓位过大时，P&L波动超出心理承受范围，导致恐惧和anxiety；(2) 恐惧导致过早止损（即使方向正确）或无法执行计划；(3) 大亏损后的tilt心态可能导致报复性交易（revenge trading）。最佳仓位大小应让trader在最大预期亏损时仍能冷静执行策略。经验法则：如果一笔交易的浮亏让你晚上睡不着，仓位太大了。"
