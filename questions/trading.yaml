    - "C. 做市商轮流提供最优报价 / Market makers take turns providing best quotes"
    - "D. 只有一个做市商生存 / Only one market maker survives"
  answer: "A"
  explanation: "Symmetric mixed strategy Nash equilibrium中，所有做市商采用相同的概率分布来随机化自己的策略（如spread的选择），且在均衡点上，没有任何做市商可以通过单方面改变自己的策略来获得更高的期望收益。'Mixed'意味着做市商在多个spread水平上随机化，而不是确定性地选择一个spread。这在做市商数量有限且有adverse selection的博弈中是常见的均衡概念。"
