  question: "在Greeks hedging中，一个portfolio的Gamma为正且较大，这意味着什么？\nA portfolio has large positive Gamma. What does this imply?"
  options:
    - "A. Portfolio value是标的价格的凸函数，大幅波动时获利 / Portfolio value is convex in underlying price, profits from large moves"
    - "B. Portfolio value随时间衰减很快 / Portfolio value decays quickly with time"
    - "C. Portfolio对波动率变化不敏感 / Portfolio is insensitive to volatility changes"
    - "D. Portfolio需要频繁rebalance才能保持delta neutral / Portfolio needs frequent rebalancing to stay delta neutral"
  answer: "A"
  explanation: "正的Gamma意味着portfolio value是标的价格的凸函数。无论价格上涨还是下跌，正Gamma都带来正收益（delta随价格上涨而增大，随价格下跌而减小）。但正Gamma通常需要支付theta（时间衰减）作为代价。D选项也部分正确（大Gamma确实需要频繁rebalance），但A选项是最直接的含义。正Gamma等价于'long convexity'或'long volatility'。"
