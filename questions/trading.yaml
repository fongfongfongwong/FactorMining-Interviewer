- id: TR_BEHAV_007
  category: behavioral
  difficulty: medium_high
  type: open_ended
  points: 5
  question: "解释gambler's fallacy和hot-hand fallacy的区别，并各举一个在量化交易中的具体例子。讨论如何用数据驱动的方法来避免这两种偏差。\nExplain the difference between gambler's fallacy and hot-hand fallacy. Give one example of each in quantitative trading. Discuss data-driven approaches to avoid both biases."
  options: []
  answer: ""
  explanation: "Gambler's fallacy：认为连续出现某结果后，相反结果的概率增加（'该赢了'）。交易例子：连续亏损后加大仓位，相信一定会反弹。Hot-hand fallacy：认为连续成功后，成功概率增加（'手感热'）。交易例子：连续盈利后过度自信，加大杠杆。区别：一个预期反转，一个预期延续，但两者都是对随机性的误判。数据驱动的避免方法：(1) 计算策略收益的serial correlation（如果不显著则为独立）；(2) 用固定的position sizing rule（如固定比例或Kelly）；(3) 对策略进行regime detection而不是凭直觉判断。"
  hints:
    - "两种fallacy对'连续'的解读方向相反"
  rubric: "区分清晰(2分)；交易例子(1.5分)；数据方法(1.5分)"
  time_limit_seconds: 300

