- id: TR_MICRO_001
  category: microstructure
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在一个limit order book中，bid-ask spread的主要组成部分不包括以下哪项？\nIn a limit order book, which of the following is NOT a primary component of the bid-ask spread?"
  options:
    - "A. Adverse selection cost (逆向选择成本)"
    - "B. Inventory holding cost (库存持有成本)"
    - "C. Order processing cost (订单处理成本)"
    - "D. Capital gains tax (资本利得税)"
  answer: "D"
  explanation: "Bid-ask spread的经典分解（Glosten-Milgrom, 1985; Stoll, 1989）包括三个部分：adverse selection cost（因信息不对称导致的成本）、inventory holding cost（做市商持有头寸的风险成本）和order processing cost（订单处理的固定成本）。Capital gains tax不是spread的组成部分。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

- id: TR_MICRO_002
  category: microstructure
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "VPIN (Volume-Synchronized Probability of Informed Trading) 指标的核心思想是什么？\nWhat is the core idea behind the VPIN metric?"
  options:
    - "A. 通过成交量分桶来估计知情交易的概率 / Estimate probability of informed trading via volume bucketing"
    - "B. 通过价格波动来估计市场冲击 / Estimate market impact via price volatility"
    - "C. 通过订单簿深度来衡量流动性 / Measure liquidity via order book depth"
    - "D. 通过换手率来预测价格趋势 / Predict price trends via turnover rate"
  answer: "A"
  explanation: "VPIN（Easley, Lopez de Prado, O'Hara, 2012）将交易量按固定大小分桶(volume bucket)，然后在每个桶中用bulk volume classification将成交量分为buy-initiated和sell-initiated，计算|V_buy - V_sell| / V_total作为知情交易概率的估计。它是PIN模型的非参数高频版本。"
  hints:
    - "考虑PIN模型的高频扩展"
  rubric: ""
  time_limit_seconds: 60

- id: TR_MICRO_003
  category: microstructure
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在Almgren-Chriss最优执行模型中，如果trader的risk aversion参数lambda增大，最优执行策略会如何变化？\nIn the Almgren-Chriss optimal execution model, how does the optimal strategy change when risk aversion lambda increases?"
  options:
    - "A. 执行速度加快，更接近立即执行 / Execution speeds up, approaching immediate execution"
    - "B. 执行速度减慢，更接近TWAP / Execution slows down, approaching TWAP"
    - "C. 对执行速度没有影响 / No effect on execution speed"
    - "D. 执行变为随机策略 / Execution becomes a random strategy"
  answer: "A"
  explanation: "Almgren-Chriss模型在market impact cost和timing risk之间权衡。lambda越大意味着trader越厌恶风险（timing risk），因此会更快执行以减少价格不确定性带来的风险，策略更接近立即全部执行。当lambda趋近0时，策略趋近TWAP（线性执行）。最优轨迹为x(t) = X * sinh(kappa*(T-t)) / sinh(kappa*T)，其中kappa与lambda正相关。"
  hints:
    - "思考risk aversion如何影响timing risk vs market impact的权衡"
  rubric: ""
  time_limit_seconds: 90

- id: TR_MICRO_004
  category: microstructure
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "Order flow imbalance (OFI) 通常如何计算？\nHow is Order Flow Imbalance (OFI) typically computed?"
  options:
    - "A. OFI = delta(best_bid_volume) - delta(best_ask_volume)，考虑价格变化 / Considering price changes at best bid/ask"
    - "B. OFI = total_buy_volume - total_sell_volume / OFI = total buy minus sell volume"
    - "C. OFI = number_of_buy_orders - number_of_sell_orders / OFI = count of buy minus sell orders"
    - "D. OFI = bid_price - ask_price / OFI = bid minus ask price"
  answer: "A"
  explanation: "Cont, Kukanov, Stoikov (2014) 定义的OFI考虑了best bid和best ask上的volume变化，同时需要区分价格是否发生变化。当best bid price上升时，新的bid volume全部计为正；当best bid price下降时，旧的bid volume全部计为负；价格不变时计算volume的增量。Ask侧类似但符号相反。这比简单的buy-sell volume差异更能捕捉微观结构信息。"
  hints:
    - "参考Cont, Kukanov, Stoikov (2014)的定义"
  rubric: ""
  time_limit_seconds: 90

- id: TR_MICRO_005
  category: microstructure
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "以下哪个指标最适合衡量大单交易对价格的永久性影响？\nWhich metric best captures the permanent price impact of a large order?"
  options:
    - "A. Realized spread (已实现价差)"
    - "B. Kyle's lambda"
    - "C. Roll's measure"
    - "D. Amihud illiquidity ratio"
  answer: "B"
  explanation: "Kyle's lambda来自Kyle (1985)模型，衡量价格对order flow的敏感度：delta_p = lambda * delta_x + noise。lambda直接度量了单位净买入量对价格的永久性影响。Realized spread衡量的是交易成本，Roll's measure用价格自相关估计spread，Amihud ratio是日度流动性衡量。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

- id: TR_MICRO_006
  category: microstructure
  difficulty: expert
  type: open_ended
  points: 8
  question: "请推导Glosten-Milgrom (1985) 模型中bid和ask价格的设定，并解释为什么adverse selection会导致bid-ask spread。假设资产真实价值V服从{V_H, V_L}二值分布，知情交易者占比为mu。\nDerive the bid and ask prices in the Glosten-Milgrom (1985) model and explain why adverse selection causes a bid-ask spread. Assume asset value V follows a binary distribution {V_H, V_L} with informed trader proportion mu."
  options: []
  answer: ""
  explanation: "在GM模型中，做市商面对知情和不知情交易者。Ask价格设定为：A = E[V|buy order] = P(V=V_H|buy) * V_H + P(V=V_L|buy) * V_L。利用贝叶斯定理，P(V=V_H|buy) = [mu + (1-mu)*0.5]*P(V=V_H) / P(buy)（知情交易者在V=V_H时总是买，不知情者以0.5概率买）。类似地推导Bid。最终A > E[V] > B，spread来自于信息不对称：做市商知道部分交易对手拥有私有信息，因此要求补偿。"
  hints:
    - "从做市商零利润条件出发"
    - "对buy order和sell order分别用贝叶斯公式"
  rubric: "推导过程(3分)：正确写出贝叶斯公式和条件期望；经济直觉(3分)：解释adverse selection如何产生spread；完整性(2分)：讨论mu对spread的影响"
  time_limit_seconds: 600

- id: TR_MICRO_007
  category: microstructure
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在LOB (Limit Order Book) 建模中，Hawkes process的主要优势是什么？\nWhat is the main advantage of using Hawkes processes in LOB modeling?"
  options:
    - "A. 能捕捉订单到达的自激发(self-exciting)特性 / Captures self-exciting nature of order arrivals"
    - "B. 计算速度快于所有其他模型 / Faster computation than all other models"
    - "C. 不需要参数估计 / No parameter estimation required"
    - "D. 可以完美预测价格 / Can perfectly predict prices"
  answer: "A"
  explanation: "Hawkes process是一种自激发点过程，其中一个事件的发生会暂时增加后续事件发生的概率（intensity）。这很好地捕捉了金融市场中的order clustering现象：一笔大单到来后，往往会触发更多的跟随订单。Hawkes process的intensity为lambda(t) = mu + sum(alpha * exp(-beta*(t-t_i)))，其中求和遍历历史事件。"
  hints: []
  rubric: ""
  time_limit_seconds: 90

- id: TR_MICRO_008
  category: microstructure
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "Tick data中，Lee-Ready算法用于什么目的？\nWhat is the Lee-Ready algorithm used for in tick data analysis?"
  options:
    - "A. 将交易分类为buyer-initiated或seller-initiated / Classify trades as buyer- or seller-initiated"
    - "B. 估计隐含波动率 / Estimate implied volatility"
    - "C. 计算最优下单量 / Calculate optimal order size"
    - "D. 检测市场操纵 / Detect market manipulation"
  answer: "A"
  explanation: "Lee-Ready (1991)算法是交易方向分类的经典方法。它首先用quote rule：如果成交价高于mid-price则分类为buy，低于则分类为sell。当成交价等于mid-price时，使用tick rule：如果成交价高于上一笔成交价则为buy（uptick），低于则为sell（downtick）。该算法在高频数据分析中被广泛使用。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

- id: TR_MICRO_009
  category: microstructure
  difficulty: expert
  type: open_ended
  points: 8
  question: "解释permanent vs temporary market impact的区别，并描述如何在实际交易数据中分离和估计这两个分量。给出一个具体的回归框架。\nExplain the difference between permanent and temporary market impact, and describe how to separate and estimate these two components from real trade data. Provide a specific regression framework."
  options: []
  answer: ""
  explanation: "Permanent impact是交易对价格的长期信息性影响，反映了订单中包含的信息；temporary impact是由流动性需求造成的短暂价格偏离，会随时间回复。可用以下框架估计：(1) 定义r_k为第k笔交易后的价格变化；(2) 将r_k分解为 r_k = g(v_k)*sign_k + eta_k，其中g(v_k)是关于交易量的permanent impact函数；(3) 用交易后不同时间窗口的价格回复来分离temporary部分；(4) 常用幂律形式：permanent ~ sigma * (v/V)^delta，delta约0.5-0.6。"
  hints:
    - "考虑交易后不同时间窗口的价格行为"
    - "permanent impact在信息被吸收后仍然存在"
  rubric: "概念清晰度(3分)：准确区分permanent和temporary impact；回归框架(3分)：给出具体可操作的估计方法；实证认知(2分)：了解幂律关系和典型参数"
  time_limit_seconds: 600

- id: TR_MICRO_010
  category: microstructure
  difficulty: senior
  type: open_ended
  points: 5
  question: "解释order book imbalance如何预测短期价格变动。给出OBI的具体计算方式，并讨论在A股市场中的适用性和局限性。\nExplain how order book imbalance predicts short-term price movements. Provide specific OBI calculation and discuss applicability and limitations in A-share markets."
  options: []
  answer: ""
  explanation: "Order book imbalance (OBI)是短期价格变动的有效预测指标（Cont, Kukanov, Stoikov, 2014）。OBI = (V_bid - V_ask) / (V_bid + V_ask)，当OBI>0（bid侧深度更大）时，ask侧更容易被消耗，价格倾向于上涨。在A股市场中，这一现象也被广泛验证，但需要考虑：(1) 涨跌停时OBI信号失效；(2) A股散户比例高，order book噪音大；(3) 集合竞价时段OBI的计算方式不同。局限性：大单可能挂在远离best price的位置（hidden depth），cancel率高导致book depth不真实。"
  hints:
    - "考虑bid/ask volume的比率"
    - "A股特有的市场微观结构特征"
  rubric: "OBI计算(2分)；预测逻辑(1分)；A股特殊性(1分)；局限性(1分)"
  time_limit_seconds: 300

- id: TR_MICRO_011
  category: microstructure
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "以下关于market order和limit order的描述，哪项是正确的？\nWhich statement about market orders and limit orders is correct?"
  options:
    - "A. Market order提供流动性，limit order消耗流动性 / Market orders provide liquidity, limit orders consume it"
    - "B. Limit order提供流动性，market order消耗流动性 / Limit orders provide liquidity, market orders consume it"
    - "C. 两者都提供流动性 / Both provide liquidity"
    - "D. 两者都消耗流动性 / Both consume liquidity"
  answer: "B"
  explanation: "Limit order挂在order book上等待成交，为市场提供流动性（liquidity provision）；market order以当前最优价格立即成交，消耗order book上的流动性（liquidity consumption/taking）。这是市场微观结构中最基本的概念之一。Limit order面临adverse selection风险但可以获得spread，market order支付spread但保证立即执行。"
  hints: []
  rubric: ""
  time_limit_seconds: 45

