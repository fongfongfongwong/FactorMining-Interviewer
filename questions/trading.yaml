- id: TR_RISK_011
  category: risk_management
  difficulty: senior
  type: show_work
  points: 5
  question: "一个策略年化收益18%，年化波动率12%，最大回撤15%，无风险利率3%。计算：(1) Sharpe ratio；(2) Calmar ratio；(3) 如果使用Kelly criterion，最优杠杆是多少？（假设收益正态分布）\nA strategy has 18% annual return, 12% annual vol, 15% max drawdown, risk-free rate 3%. Calculate Sharpe, Calmar, and Kelly optimal leverage."
  options: []
  answer: "(1) Sharpe ratio = (18% - 3%) / 12% = 15% / 12% = 1.25\n(2) Calmar ratio = 18% / 15% = 1.2\n(3) Kelly leverage (continuous): f* = (mu - r) / sigma^2 = 15% / (12%)^2 = 0.15 / 0.0144 = 10.42x。实际使用时通常取half-Kelly = 5.2x或更低。这个高杠杆数字说明在正态分布假设下Kelly对尾部风险考虑不足。"
  explanation: "Sharpe ratio衡量单位风险的超额收益；Calmar ratio衡量收益与最大回撤的关系；Kelly criterion给出最大化对数增长率的杠杆。注意Kelly给出了非常高的杠杆（10x+），这是因为正态分布假设低估了尾部风险。实践中使用half-Kelly或更保守的杠杆。"
  hints:
    - "Kelly for continuous case: f* = excess_return / variance"
