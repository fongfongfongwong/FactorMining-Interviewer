  question: "快速估算：一只年化波动率为30%的股票，其daily 1-sigma move大约是多少？（假设一年252个交易日）\nQuick estimate: A stock with 30% annual vol has approximately what daily 1-sigma move? (252 trading days/year)"
  options:
    - "A. 约1.89% / Approximately 1.89%"
    - "B. 约1.20% / Approximately 1.20%"
    - "C. 约2.50% / Approximately 2.50%"
    - "D. 约0.12% / Approximately 0.12%"
  answer: "A"
  explanation: "Daily vol = Annual vol / sqrt(252) = 30% / sqrt(252)。sqrt(252) ≈ sqrt(256) = 16（近似）。所以daily vol ≈ 30%/16 = 1.875% ≈ 1.89%。更精确地，sqrt(252) = 15.875，30%/15.875 = 1.89%。记住sqrt(252) ≈ 16这个近似在trading面试中非常有用。"
  hints:
    - "sqrt(252) ≈ 16"
  rubric: ""
  time_limit_seconds: 20

