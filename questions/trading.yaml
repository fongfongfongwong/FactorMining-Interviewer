- id: TR_OPT_182
  category: options_strategies
  difficulty: expert
  type: show_work
  points: 5
  question: "一个期权做市商的portfolio有以下总Greeks：Delta=+200, Gamma=-50, Vega=-30, Theta=+8。(1)解释当前portfolio的风险特征；(2)如果标的价格突然下跌3%（从100到97），估算P&L；(3)如何对冲Gamma和Vega风险？\nAn option market maker's portfolio: Delta=+200, Gamma=-50, Vega=-30, Theta=+8. (1) Explain risk profile; (2) Estimate P&L if underlying drops 3% (100→97); (3) How to hedge Gamma and Vega?"
  options: []
  answer: "(1) 风险特征：Delta=+200→net long方向(市场涨赚跌亏)；Gamma=-50→short gamma(大幅波动不利)；Vega=-30→short vega(波动率上升不利)；Theta=+8→赚取时间衰减。总体是卖期权(short vol)的典型profile——赚小钱(theta)但承受大波动和高IV的风险。\n\n(2) P&L估算(ΔS=-3)：ΔP ≈ Delta×ΔS + 0.5×Gamma×ΔS² + Theta×Δt(假设1天)。ΔP ≈ 200×(-3) + 0.5×(-50)×9 + 8 = -600 - 225 + 8 = -817。另外如果IV在下跌中飙升(假设Δσ=+5%)：Vega P&L = -30 × 5 = -150。总P&L ≈ -817 - 150 = -967。\n\n(3) 对冲：(a)Gamma对冲——买入ATM期权(ATM期权gamma最大)增加+50 gamma使净gamma=0；但这也增加了theta支出和可能改变vega。(b)Vega对冲——买入远月期权(远月vega大)增加+30 vega。(c)实际操作中使用optimization找到最小成本的对冲组合。"
  explanation: "这道题测试对Greeks组合风险的理解。关键：(1)short gamma+short vega是最危险的组合——市场突然大幅下跌时delta亏损+gamma加速亏损+IV飙升的vega亏损三重打击；(2)theta是'保费'但在尾部事件中远不够补偿。这就是为什么2018年2月VIX spike中很多short vol策略爆仓。"
  hints:
    - "Short gamma意味着delta随价格变化加速恶化"
    - "下跌时IV通常上升(vega也亏损)"
  rubric: "风险特征(1分)；P&L计算(2分)；IV影响(1分)；对冲方案(1分)"
  time_limit_seconds: 360

- id: TR_HFT_183
