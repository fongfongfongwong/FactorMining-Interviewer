  explanation: "Pre-trade risk controls(MiFID II/SEC Rule 15c3-5要求)：(1)Price collar——订单价格偏离当前市场中间价超过X%(如5%)则拒绝；(2)Order size limit——单笔订单不超过日均交易量的X%(如5%)或绝对金额上限；(3)Position limit——单只股票/总portfolio的净头寸不超过设定限额；(4)Capital limit——保证金使用不超过可用资金的X%；(5)Kill switch——紧急情况一键取消所有未成交订单。这些检查在订单发出前(pre-trade)自动执行，延迟通常<1μs。"
