  question: "设计一个实验来测试一个交易团队中的behavioral biases，并提出针对性的debiasing策略。至少涉及3种不同的bias。\nDesign an experiment to test behavioral biases in a trading team, and propose targeted debiasing strategies. Cover at least 3 different biases."
