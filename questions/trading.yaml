  question: "高频交易(HFT)中，latency arbitrage指的是什么？\nWhat does latency arbitrage mean in HFT?"
  options:
    - "A. 利用不同交易所之间的信息传播延迟，在价格调整前抢先交易获利 / Exploit information propagation delays between exchanges, trading before price adjusts"
    - "B. 长期持有股票 / Hold stocks long-term"
    - "C. 使用低频策略 / Using low-frequency strategies"
    - "D. 人工交易 / Manual trading"
  answer: "A"
  explanation: "Latency arbitrage：(1)当一个交易所的价格变化后，其他交易所的价格更新有延迟(毫秒级)；(2)HFT在更快的交易所观察到价格变化后，抢在慢交易所价格调整前交易(如在A所看到买单推高价格→在B所抢先买入)；(3)这本质上是一种'速度税'——慢的参与者系统性地被快的参与者占便宜；(4)监管争议：IEX通过增加350μs延迟(speed bump)来减少latency arbitrage。"
