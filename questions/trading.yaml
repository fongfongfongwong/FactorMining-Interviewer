    - "C. 宏观经济指标 / Macro indicators"
    - "D. 财报数据 / Earnings data"
  answer: "A"
  explanation: "微观结构alpha来源：(1)Order flow imbalance——买方主导的订单流(aggressive buying)预测短期价格上涨(信息传导)；(2)Order book shape——盘口买卖深度的不对称性预测短期价格方向(如bid depth >> ask depth→短期上涨)；(3)Short-term mean reversion——tick级别的价格过度反应(如大单推动价格偏离→几秒内部分回归)；(4)Lead-lag relationship——流动性好的asset price先动→predict流动性差的asset；(5)这些alpha的半衰期极短(秒到分钟级)，需要低延迟系统才能捕获。"
