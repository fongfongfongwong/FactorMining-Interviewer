  explanation: "HFT策略分类：(1)被动/提供流动性：做市(挂单赚spread)——社会价值正(提供流动性、缩小spread)；(2)攻击/消耗流动性：latency arb(利用速度抢跑)——社会价值有争议；(3)操纵型(违法)：spoofing(挂假单引诱对手后撤单)、layering(多层假单)——违法。被动做市是HFT中最常见且被监管认可的策略，但做市商面临adverse selection风险(被知情交易者'挑选')。"
