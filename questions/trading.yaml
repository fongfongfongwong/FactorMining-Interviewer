- id: TR_OPT_197
  category: options_strategies
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在期权定价中，put-call parity的核心关系是什么？\nWhat is the core relationship of put-call parity in option pricing?"
  options:
    - "A. C - P = S - K*e^(-rT)，call和put价格之差等于标的现价减去行权价的现值 / C - P = S - K*e^(-rT), call-put price difference equals spot minus PV of strike"
    - "B. C = P / C equals P"
    - "C. C + P = S / C + P equals S"
    - "D. Put-call parity不存在 / Put-call parity doesn't exist"
  answer: "A"
  explanation: "Put-Call Parity(European options)：C - P = S - K*e^(-rT)，等价地C + K*e^(-rT) = P + S。(1)经济直觉：买一个call+持有K的现金(到期变成K) ≡ 买一个put+持有一股标的；(2)套利应用：如果parity不成立→无风险套利机会(conversion/reversal)——买入便宜的一侧+卖出贵的一侧；(3)做市商应用：可以用put price推算call price(或反向)——减少需要直接定价的期权数量；(4)在A股50ETF期权中检查parity可以发现套利机会(考虑分红和利率)。"
