  question: "在HFT系统中使用FPGA(Field-Programmable Gate Array)相比纯软件实现的核心优势是什么？\nWhat is the core advantage of FPGA over pure software in HFT systems?"
  options:
    - "A. 硬件级并行处理——网络数据包解析和交易逻辑在FPGA上可实现纳秒级延迟 / Hardware-level parallelism — packet parsing and trading logic achieve nanosecond latency on FPGA"
