- id: TR_PNL_001
  category: pnl_analysis
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "Implementation shortfall（执行缺口）的定义是什么？\nWhat is the definition of implementation shortfall?"
  options:
    - "A. 理想收益（paper portfolio）与实际收益之间的差异 / Difference between ideal return (paper portfolio) and actual return"
    - "B. Bid-ask spread的大小 / Size of bid-ask spread"
    - "C. 手续费总额 / Total commission amount"
    - "D. 策略回测收益与实盘收益的差异 / Difference between backtest and live returns"
  answer: "A"
  explanation: "Implementation shortfall (Perold, 1988) = paper portfolio return - actual portfolio return。它分解为：(1) Delay cost（从决策到下单的延迟）；(2) Market impact cost（交易本身对价格的影响）；(3) Timing cost（执行期间的价格漂移）；(4) Opportunity cost（未能成交的部分损失的收益）。IS是最全面的执行质量衡量方式，因为它捕捉了从投资决策到最终执行的所有成本。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

- id: TR_PNL_002
  category: pnl_analysis
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在Transaction Cost Analysis (TCA)中，VWAP slippage指的是什么？\nIn TCA, what does VWAP slippage refer to?"
  options:
    - "A. 实际成交均价与同期VWAP之间的差异 / Difference between actual execution price and VWAP over the same period"
    - "B. VWAP与收盘价的差异 / Difference between VWAP and closing price"
    - "C. 手续费占成交额的比例 / Commission as percentage of trade value"
    - "D. 订单的fill rate / Order fill rate"
  answer: "A"
  explanation: "VWAP slippage = 实际成交均价 - 同期市场VWAP（买入为正，卖出取反）。它衡量了相对于市场参考价格的执行质量。VWAP slippage > 0表示执行劣于市场均价。VWAP benchmark的优点是考虑了成交量分布，缺点是可以被gaming（在VWAP低的时段增加交易量）。常用的其他benchmark还有arrival price, closing price, TWAP等。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

- id: TR_PNL_003
  category: pnl_analysis
  difficulty: senior
  type: show_work
  points: 5
  question: "一个策略的PnL attribution如下：alpha PnL = +200万，market exposure PnL = -80万，industry exposure PnL = -30万，transaction costs = -40万，总PnL = +50万。(1) 计算策略的capture ratio（alpha capture）。(2) 如果市场下跌导致market exposure PnL为负，是否说明策略有问题？(3) 如何改进？\nPnL attribution: alpha=+2M, market=-800K, industry=-300K, txn costs=-400K, total=+500K. (1) Alpha capture ratio? (2) Is negative market PnL a problem? (3) Improvements?"
  options: []
  answer: "(1) Alpha capture ratio = Total PnL / Alpha PnL = 50万/200万 = 25%。或者另一种定义：(Total PnL + Transaction costs) / Alpha PnL = 90万/200万 = 45%（扣除交易成本前）。这意味着大部分alpha被非预期暴露和交易成本侵蚀了。\n\n(2) Market exposure PnL为-80万说明策略不是完全市场中性的，有net long或net short的暴露。如果策略目标是market neutral，则-80万是unintended exposure造成的损失，需要改进。如果策略允许方向性暴露，则可以接受。\n\n(3) 改进建议：(a) 加强市场中性约束（tighter beta control）；(b) 增加行业对冲（行业暴露导致-30万损失）；(c) 优化执行以降低交易成本（-40万可能过高）；(d) 提高rebalancing频率减少drift。"
  explanation: "PnL attribution是量化交易中最重要的诊断工具之一。通过分解PnL来源，可以识别哪些收益来自alpha（预期的），哪些来自非预期暴露（factor exposure, sector exposure等），以及交易成本的影响。Alpha capture ratio衡量了从alpha信号到实际收益的转化效率。"
  hints:
    - "Alpha capture = 实际PnL / Alpha PnL"
  rubric: "Capture ratio计算(2分)；市场暴露分析(1分)；改进建议(2分)"
  time_limit_seconds: 360

- id: TR_PNL_004
  category: pnl_analysis
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "以下哪个不是常用的TCA execution quality metric？\nWhich is NOT a commonly used TCA execution quality metric?"
  options:
    - "A. Price Earnings ratio (P/E ratio)"
    - "B. VWAP slippage"
    - "C. Implementation shortfall"
    - "D. Participation rate"
  answer: "A"
  explanation: "P/E ratio是估值指标，不是执行质量指标。常用的TCA metrics包括：(1) VWAP slippage - 相对于VWAP的执行偏差；(2) Implementation shortfall - 理想vs实际收益差异；(3) Participation rate - 成交量占市场成交量的比例；(4) Fill rate - 实际成交量占计划量的比例；(5) Arrival price slippage - 相对于决策时价格的偏差；(6) Market impact - 交易对价格的影响。"
  hints: []
  rubric: ""
  time_limit_seconds: 45

- id: TR_PNL_005
  category: pnl_analysis
  difficulty: expert
  type: open_ended
  points: 10
  question: "设计一个完整的slippage分析框架，用于评估和改进一个A股量化多空策略的执行质量。包括：(1) 数据需求；(2) slippage的分解方法；(3) 归因分析；(4) 改进建议的优先级排序。\nDesign a complete slippage analysis framework for evaluating and improving execution quality of an A-share long-short quant strategy. Include data needs, decomposition, attribution, and prioritized improvements."
  options: []
  answer: ""
  explanation: "完整框架：\n(1) 数据需求：订单管理系统(OMS)数据（order price, fill price, timestamps, quantity, direction）；L2行情数据；基准价格（decision price, VWAP, arrival price）；市场成交数据。\n(2) Slippage分解：Total slippage = Arrival price slippage = (Execution price - Decision price)。分解为：Delay cost（decision to order）+ Market impact（order to fill）+ Timing cost（price drift during execution）+ Spread cost（crossing the spread）。\n(3) 归因分析：按时间段（开盘/盘中/尾盘）、按单边方向（buy vs sell）、按股票特征（市值/流动性/波动率）、按订单大小（participation rate）、按市场状态（trending/ranging）。\n(4) 改进优先级：(a) 最大的slippage来源优先（通常是market impact和timing cost）；(b) 优化执行算法（TWAP/VWAP/IS minimizing）；(c) 降低latency（从决策到下单）；(d) 调整参与率（降低market impact）；(e) 考虑利用dark pool和集合竞价。"
  hints:
    - "从数据到分析到改进的完整链路"
    - "A股特有：T+1限制、涨跌停、集合竞价"
  rubric: "框架完整性(3分)；分解方法(3分)；归因分析(2分)；改进建议(2分)"
  time_limit_seconds: 600

- id: TR_PNL_006
  category: pnl_analysis
  difficulty: senior
  type: open_ended
  points: 5
  question: "描述alpha decay analysis的完整方法论：(1) 如何计算不同holding period下的IC；(2) 如何从IC decay curve确定alpha的half-life；(3) 如何利用alpha half-life来优化rebalancing频率和交易成本预算。\nDescribe the complete methodology of alpha decay analysis: (1) IC at different holding periods; (2) determining alpha half-life from IC decay; (3) using half-life to optimize rebalancing frequency and cost budgeting."
  options: []
  answer: ""
  explanation: "(1) 计算方法：在每个截面时间点，计算alpha信号与lag k天收益的rank IC（Spearman相关系数），k=1,2,5,10,20,40天。(2) Half-life确定：画出IC vs lag k的衰减曲线，找到IC降到初始值一半的lag值。如果IC(1)=0.05, IC(5)=0.025，则half-life约5天。也可以拟合指数衰减模型IC(k)=IC(0)*exp(-k/tau)。(3) 优化应用：rebalancing频率应与half-life匹配（half-life 5天则约每5天rebalance）；交易成本预算 = IC衰减导致的alpha损失应大于交易成本；短half-life的alpha允许更高的换手率和交易成本。"
  hints:
    - "IC的时间衰减模式直接决定最优持有期"
  rubric: "IC计算(2分)；half-life确定(1.5分)；实践应用(1.5分)"
  time_limit_seconds: 300

- id: TR_PNL_007
  category: pnl_analysis
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "一个策略的gross return是20%，net return是12%。Transaction costs主要包含哪些部分？\nA strategy has 20% gross return and 12% net return. What are the main components of transaction costs?"
  options:
    - "A. Commission + Spread cost + Market impact + Slippage / 佣金 + 价差成本 + 市场冲击 + 滑点"
    - "B. 仅佣金 / Commission only"
    - "C. 仅market impact / Market impact only"
    - "D. 仅税费 / Taxes only"
  answer: "A"
  explanation: "Gross return到net return的差异（8%）由所有transaction costs组成：(1) Commission（佣金，A股约0.02-0.03%单边）；(2) Stamp tax（印花税，A股卖出0.05%）；(3) Spread cost（bid-ask spread的一半）；(4) Market impact（大单交易影响价格）；(5) Slippage（决策价与成交价的差异）。对于高换手率策略，market impact通常是最大的成本分量。"
