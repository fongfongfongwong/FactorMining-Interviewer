  question: "在做市博弈中，symmetric mixed strategy Nash equilibrium意味着什么？\nIn a market making game, what does a symmetric mixed strategy Nash equilibrium imply?"
  options:
    - "A. 所有做市商使用相同的随机化策略，没有人有单方面偏离的动机 / All market makers use identical randomized strategies with no unilateral deviation incentive"
