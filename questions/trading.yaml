  explanation: "Quote skewing是做市商根据库存状况不对称调整报价的策略。例如，如果做市商持有多头库存（需要卖出减少库存），会降低ask价格（更aggressive地卖出）并降低bid价格（less aggressive地买入）。这通过不对称地调整bid和ask的价格来管理库存风险。在Avellaneda-Stoikov模型中，skew由inventory q和gamma*sigma^2*(T-t)决定。"
