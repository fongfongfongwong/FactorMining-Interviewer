- id: TR_MICRO_013
  category: microstructure
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "Roll (1984) 的spread估计方法基于以下哪个统计量？\nRoll's (1984) spread estimator is based on which statistic?"
  options:
    - "A. 价格变化的自协方差 / Autocovariance of price changes"
    - "B. 成交量的均值 / Mean of trading volume"
    - "C. 收益率的方差 / Variance of returns"
    - "D. 订单到达率 / Order arrival rate"
  answer: "A"
  explanation: "Roll (1984) 观察到在纯spread模型下（无信息），连续价格变化之间存在负自协方差。具体地，如果observed price = true price + (s/2)*q_t（q_t为买卖方向），则Cov(delta_p_t, delta_p_{t-1}) = -(s/2)^2。因此spread的估计为s = 2*sqrt(-Cov)。当协方差为正时，该估计无法使用。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

- id: TR_MICRO_014
  category: microstructure
  difficulty: expert
  type: show_work
  points: 8
  question: "一只股票当前mid-price为50元，bid-ask spread为0.04元。你需要在1小时内买入10万股（日均成交量为500万股）。假设temporary impact为 g(v) = 0.1 * sigma * (v/V)^0.6 元/股，permanent impact为 h(v) = 0.05 * sigma * (v/V)^0.5 元/股，其中sigma=0.02（日波动率），V=5,000,000股。比较以下两种策略的预期执行成本：(1) 一次性market order全部执行；(2) 分成10笔等量执行（均匀间隔）。\nA stock has mid-price 50, spread 0.04, and you need to buy 100,000 shares within 1 hour (ADV=5M shares). Compare execution costs of (1) single market order vs (2) 10 equal slices."
  options: []
  answer: "策略1（一次性执行）：v=100,000, v/V=0.02。Temporary impact = 0.1*0.02*(0.02)^0.6 = 0.002*0.02^0.6。0.02^0.6 ≈ 0.0776，所以temp = 0.000155元/股。Permanent impact = 0.05*0.02*(0.02)^0.5 = 0.001*0.1414 = 0.000141元/股。半个spread = 0.02元/股。总成本 ≈ (0.02 + 0.000155 + 0.000141) * 100,000 ≈ 2,030元。\n\n策略2（分10笔执行）：每笔v=10,000, v/V=0.002。Temp per slice = 0.1*0.02*(0.002)^0.6 = 0.002*0.002^0.6。0.002^0.6 ≈ 0.0191，temp = 0.0000382元/股。10笔的temp总和约0.000382元/股（temporary会消散）。Permanent impact叠加：每笔perm = 0.05*0.02*(0.002)^0.5 = 0.001*0.0447 = 0.0000447元/股，10笔叠加约0.000447元/股（简化计算）。半个spread = 0.02*10 = 0.02元/股（每笔都付）。总成本 ≈ (0.02 + 0.000382 + 0.000447) * 100,000 ≈ 2,083元。但分拆策略降低了timing risk。"
  explanation: "本题考察market impact模型的实际应用和执行成本分析。关键点：(1) spread cost是固定的，每笔交易都要付；(2) temporary impact是凹函数，分拆可降低总temporary impact；(3) permanent impact会叠加；(4) 分拆还需考虑timing risk。实际中需要在impact cost和timing risk之间权衡，这正是Almgren-Chriss模型解决的问题。"
  hints:
    - "先分别计算每个成本分量"
    - "注意temporary impact和permanent impact的不同叠加方式"
  rubric: "计算过程(4分)：正确计算impact各分量；策略比较(2分)：合理比较两种策略；风险讨论(2分)：讨论timing risk等额外因素"
  time_limit_seconds: 600

- id: TR_MICRO_015
  category: microstructure
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "Amihud illiquidity ratio的计算公式是什么？\nWhat is the formula for the Amihud illiquidity ratio?"
  options:
    - "A. ILLIQ = (1/D) * sum(|r_d| / volume_d) / Average of daily absolute return divided by dollar volume"
    - "B. ILLIQ = std(returns) / mean(volume) / Standard deviation of returns over mean volume"
    - "C. ILLIQ = spread / mid_price / Spread divided by mid-price"
    - "D. ILLIQ = turnover / market_cap / Turnover divided by market cap"
  answer: "A"
  explanation: "Amihud (2002) illiquidity ratio = (1/D) * sum_{d=1}^{D} (|r_d| / DVOL_d)，其中r_d是日收益率，DVOL_d是日成交金额，D是交易日数。该指标衡量单位成交金额带来的价格变化，数值越大表示流动性越差。它的优点是只需要低频数据即可计算，被广泛用于学术研究中。"
  hints: []
  rubric: ""
  time_limit_seconds: 60

