- id: TR_MM_017
  category: market_making
  difficulty: expert
  type: multiple_choice
  points: 1
  question: "在Avellaneda-Stoikov模型中，最优ask spread delta^a和bid spread delta^b的closed-form solution涉及以下哪个关键函数？\nIn the Avellaneda-Stoikov model, the closed-form optimal spreads involve which key function?"
  options:
    - "A. 涉及gamma, sigma, kappa（订单到达率参数），以及Lambert W function或对数函数 / Involves gamma, sigma, kappa, and logarithmic/Lambert W functions"
    - "B. 仅涉及线性函数 / Only linear functions"
    - "C. 涉及Black-Scholes公式 / Involves the Black-Scholes formula"
    - "D. 涉及Fourier变换 / Involves Fourier transforms"
  answer: "A"
  explanation: "Avellaneda-Stoikov模型中，假设订单到达率为lambda(delta) = A*exp(-k*delta)（delta为spread的一半），最优spread为：delta^{a,b} = (1/gamma)*ln(1 + gamma/k) ± q*gamma*sigma^2*(T-t)/2。第一项涉及对数函数，反映了spread与risk aversion和订单到达弹性的关系；第二项是库存skew项。其中gamma是risk aversion，k是订单到达率的价格弹性。"
  hints:
    - "假设订单到达率为指数衰减函数"
  rubric: ""
  time_limit_seconds: 120

