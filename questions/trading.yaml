    - "B. Overconfidence bias (过度自信)"
    - "C. Hindsight bias (后见之明偏差)"
    - "D. Survivorship bias (幸存者偏差)"
  answer: "A"
  explanation: "Confirmation bias是指人们倾向于寻找、解释和记忆符合自己已有信念的信息，同时忽视或低估与之矛盾的信息。在交易中，这特别危险，因为trader可能忽略关键的风险信号。克服方法：(1) 主动寻找反对观点（'steel man'对立面）；(2) pre-mortem分析（假设交易失败，找原因）；(3) 用系统化的决策清单减少主观判断。"
