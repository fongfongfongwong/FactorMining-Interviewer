  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "在高频数据处理中，event time（事件时间）vs clock time（时钟时间）的选择如何影响分析？\nHow does the choice of event time vs clock time affect high-frequency data analysis?"
  options:
    - "A. Event time(如按成交量/交易笔数分桶)比clock time(如按秒/分钟)更能捕捉市场活跃度的变化 / Event time (volume/trade-bucketed) better captures market activity changes than clock time (second/minute-based)"
    - "B. 两者完全相同 / They are identical"
    - "C. Clock time总是更好 / Clock time is always better"
    - "D. Event time不可用 / Event time is not usable"
  answer: "A"
  explanation: "Event time vs Clock time(Easley, Lopez de Prado, O'Hara, 2012)：(1)Clock time(如1分钟bar)——每分钟一个样本，不管该分钟内成交了多少。问题：高活跃时段(如开盘)1分钟内有1000笔成交，低活跃时段(如午休)1分钟只有10笔→同样的时间bar信息量差异巨大。(2)Event time(如每1000手成交一个bar)——每个bar包含相同的交易信息量。优势：统计特性更稳定(如收益率更接近正态分布)、对VPIN等信息指标更准确。在因子挖掘和执行算法中event time越来越受欢迎。"
