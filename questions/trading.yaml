- id: TR_RISK_001
  category: risk_management
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "以下哪种VaR计算方法最能捕捉非正态分布的尾部风险？\nWhich VaR calculation method best captures tail risk from non-normal distributions?"
  options:
    - "A. Parametric VaR (assuming normal distribution)"
    - "B. Historical simulation VaR"
    - "C. Monte Carlo simulation VaR with fat-tailed distributions"
    - "D. Delta-normal VaR"
  answer: "C"
  explanation: "Monte Carlo simulation VaR使用fat-tailed分布（如Student-t, 混合正态等）可以最好地捕捉尾部风险。Parametric VaR和Delta-normal VaR假设正态分布，会严重低估尾部风险。Historical simulation虽然不需要分布假设，但受限于历史样本，可能没有观察到极端事件。Monte Carlo可以模拟任意分布和复杂的相关结构。"
