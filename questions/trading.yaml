  question: "Protective Put（保护性看跌期权）策略相比直接止损的优势是什么？\nWhat is the advantage of a Protective Put over a direct stop-loss order?"
  options:
    - "A. Put在gap down(跳空下跌)时仍然提供保护，而止损单可能在跳空后以远低于止损价成交 / Put protects during gap downs, while stop-loss may execute far below the stop price after a gap"
    - "B. Put没有成本 / Put has no cost"
    - "C. 止损总是更好 / Stop-loss is always better"
    - "D. 两者效果完全相同 / Both have identical effect"
  answer: "A"
  explanation: "Protective Put vs Stop-loss：(1)Gap risk——如果坏消息在非交易时间发布(如周末),周一开盘跳空10%→stop-loss单在跳空后成交(滑点巨大)；put期权不受gap影响(payoff在到期日按实际价格计算)。(2)Whipsaw——价格短暂触及止损后反弹→被stop out后错过反弹；put不会被触发(持有到期)。(3)成本：put需要支付premium(确定的保险费)；stop-loss看似免费但有隐含成本(gap risk和whipsaw)。(4)灵活性：put可以选择保护程度(行权价)和时间(到期日)。"
