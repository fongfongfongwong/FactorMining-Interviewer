- id: TR_OPT_117
  category: options_strategies
  difficulty: senior
  type: show_work
  points: 5
  question: "一个期权做市商持有以下头寸：long 100 ATM calls (Delta=0.50, Gamma=0.05, Vega=0.20, Theta=-0.03)。标的价格S=100。计算：(1)组合的总Greeks；(2)Delta对冲需要卖出多少股标的？(3)如果标的价格从100涨到102，估算P&L(使用Delta+Gamma近似)。\nAn option market maker holds: long 100 ATM calls (per-option Delta=0.50, Gamma=0.05, Vega=0.20, Theta=-0.03). S=100. Calculate: (1) total Greeks; (2) shares to sell for delta hedge; (3) estimated P&L if S moves from 100 to 102."
  options: []
  answer: "(1) 总Greeks(100份call)：Delta = 100 × 0.50 = 50；Gamma = 100 × 0.05 = 5；Vega = 100 × 0.20 = 20；Theta = 100 × (-0.03) = -3。\n\n(2) Delta对冲：需要卖出50股标的(Delta neutral: 50 - 50 = 0)。\n\n(3) P&L估算(ΔS = +2)：期权P&L ≈ Delta × ΔS + 0.5 × Gamma × ΔS² = 50 × 2 + 0.5 × 5 × 4 = 100 + 10 = 110。标的对冲P&L = -50 × 2 = -100(卖空50股，价格涨了2)。净P&L ≈ 110 - 100 = +10(这是Gamma收益：0.5 × Gamma × ΔS² = 0.5 × 5 × 4 = 10)。"
  explanation: "这道题展示了期权做市的核心原理：(1)Delta对冲消除方向性风险；(2)对冲后的P&L由Gamma主导——大的价格变动带来正的Gamma PnL；(3)Theta是Gamma的'保险费'——每天损失3(一天后)。只要市场波动够大(realized vol > implied vol)，Gamma收益可以覆盖Theta损失。"
  hints:
    - "Delta对冲后的P&L主要来自Gamma"
    - "P&L ≈ 0.5 × Gamma × ΔS²"
  rubric: "总Greeks计算(1分)；对冲头寸(1分)；P&L公式(2分)；Gamma收益解释(1分)"
