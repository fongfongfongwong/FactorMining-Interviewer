- id: TR_BEHAV_001
  category: behavioral
  difficulty: medium_high
  type: multiple_choice
  points: 1
  question: "根据Prospect Theory，以下哪种现象最好地解释了交易者倾向于过早获利了结但持有亏损头寸？\nAccording to Prospect Theory, which phenomenon best explains traders' tendency to realize gains early but hold losing positions?"
  options:
    - "A. Disposition effect (处置效应)"
    - "B. Anchoring bias (锚定偏差)"
    - "C. Confirmation bias (确认偏差)"
    - "D. Availability bias (可得性偏差)"
  answer: "A"
  explanation: "Disposition effect（Shefrin and Statman, 1985）是指投资者倾向于卖出盈利的股票（realize gains）但持有亏损的股票（hold losers）。这由Prospect Theory的两个核心特征解释：(1) 收益区域的risk aversion - 有了利润后急于锁定；(2) 损失区域的risk seeking - 亏损时宁愿赌一把以期回本。加上reference point效应（以买入价为参照点），形成了这种不对称行为。"
  hints: []
  rubric: ""
  time_limit_seconds: 45

