- id: TR_MM_001
  category: market_making
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在Avellaneda-Stoikov做市模型中，reservation price与mid-price的偏移方向取决于什么？\nIn the Avellaneda-Stoikov market-making model, what determines the direction of reservation price offset from mid-price?"
  options:
    - "A. 当前库存的大小和方向 / Current inventory size and direction"
    - "B. 历史波动率 / Historical volatility"
    - "C. 做市商的资本金 / Market maker's capital"
    - "D. 订单到达率 / Order arrival rate"
  answer: "A"
  explanation: "Avellaneda-Stoikov (2008) 模型的reservation price为：r(s,q,t) = s - q*gamma*sigma^2*(T-t)，其中s是mid-price，q是库存，gamma是risk aversion，sigma是波动率，T-t是剩余时间。当q>0（多头库存）时，reservation price低于mid-price（做市商想卖出减少库存），反之亦然。库存管理是做市策略的核心。"
  hints:
    - "思考做市商在多头库存时希望做什么"
  rubric: ""
  time_limit_seconds: 90

