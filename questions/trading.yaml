- id: TR_CROSS_195
  category: cross_asset_trading
  difficulty: senior
  type: multiple_choice
  points: 1
  question: "在进行跨资产相关性分析时，以下关于'tail dependence'(尾部依赖性)的说法哪个正确？\nWhich statement about tail dependence in cross-asset correlation analysis is correct?"
  options:
    - "A. 线性相关系数低估了尾部事件中的依赖性——使用copula模型(如Clayton copula)能更准确刻画下尾依赖 / Linear correlation underestimates tail event dependence — copula models (e.g., Clayton) better capture lower tail dependence"
    - "B. 线性相关性足够 / Linear correlation is sufficient"
    - "C. 尾部事件中资产完全独立 / Assets are independent in tail events"
    - "D. Copula不适用于金融 / Copula doesn't apply to finance"
  answer: "A"
  explanation: "尾部依赖性(tail dependence)：(1)正常市场：股票和商品相关性可能只有0.2(看似低相关)；(2)危机时(如2008年)：几乎所有资产同时暴跌(相关性→1)——线性相关性无法捕捉这种非线性的依赖结构；(3)Copula建模：Clayton copula专门刻画下尾依赖(lower tail dependence——市场暴跌时的同步性)；Gumbel copula刻画上尾依赖；(4)对组合管理的影响：使用正态copula(忽略尾部依赖)会低估组合的尾部风险→用Clayton copula计算的CVaR通常比正态假设高30-50%。"
