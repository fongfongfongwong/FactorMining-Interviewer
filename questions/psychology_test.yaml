    explanation: "评估风险评估的全面性。只看上行空间或只看下行风险都不利于做出平衡的风险决策。/ Assesses comprehensiveness of risk assessment. Focusing only on upside potential or only on downside risk is detrimental to balanced risk decisions."

  - id: PSY_RISK_017
    category: risk_appetite
    type: likert_scale
