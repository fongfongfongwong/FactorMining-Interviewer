    - "D. 参加会议但心不在焉 / Attend meeting but be distracted"
    - "E. 请同事帮忙覆盖部分任务后去开会 / Ask colleague to cover some tasks, then attend meeting"
  answer: "B"
  scoring: {"A": 1, "B": 5, "C": 2, "D": 1, "E": 4}
