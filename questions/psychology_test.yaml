      - "C. 先自己默默尝试修复，看能不能挽回损失 / Quietly try to fix it yourself first to see if losses can be recovered"
      - "D. 将错误归咎于代码审查流程，认为不完全是自己的责任 / Blame the code review process and believe it's not entirely your responsibility"
    scoring: {"A": 1, "B": 4, "C": 2, "D": 1}
