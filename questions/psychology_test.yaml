- id: PSY_STRESS_001
  category: stress_tolerance
  type: multiple_choice
  points: 1
  question: "当你管理的策略连续三天亏损，总回撤达到5%时，你最可能的反应是什么？\nWhen your strategy has lost money for 3 consecutive days with 5% total drawdown, what is your most likely reaction?"
  options:
    - "A. 立即关闭所有头寸，等待市场稳定 / Immediately close all positions and wait for stability"
    - "B. 系统性分析亏损原因，判断是模型失效还是市场异常 / Systematically analyze causes—model failure or market anomaly"
    - "C. 坚持原有策略不变，相信回归均值 / Stick with strategy, trust mean reversion"
    - "D. 缩减仓位50%，同时开始调研新方向 / Cut positions 50% and research alternatives"
    - "E. 感到焦虑，难以集中注意力工作 / Feel anxious, hard to focus on work"
  answer: "B"
  scoring: {"A": 2, "B": 5, "C": 3, "D": 4, "E": 1}
  dimension: "压力耐受 Stress Tolerance"
  explanation: "理想回答展示冷静分析能力，不恐慌也不忽视。B最佳因为体现系统性思维和冷静判断。\nIdeal answer shows calm analytical ability. B is best as it demonstrates systematic thinking and composed judgment."

- id: PSY_STRESS_002
  category: stress_tolerance
  type: multiple_choice
  points: 1
  question: "面对紧迫的截止日期时，你通常如何表现？\nHow do you typically perform when facing tight deadlines?"
  options:
    - "A. 感到压力巨大，效率明显下降 / Feel enormous pressure, efficiency drops noticeably"
    - "B. 有些紧张但能按时完成 / Somewhat nervous but can finish on time"
    - "C. 在压力下反而更高效 / Actually more efficient under pressure"
    - "D. 无论有没有压力表现一样 / Perform the same regardless of pressure"
    - "E. 倾向于提前完成以避免最后时刻的压力 / Tend to finish early to avoid last-minute pressure"
  answer: "C"
  scoring: {"A": 1, "B": 3, "C": 5, "D": 4, "E": 3}
  dimension: "压力耐受 Stress Tolerance"
  explanation: "C最佳表示能将压力转化为动力。D也不错，表明稳定性。E虽好但可能暗示回避压力。\nC is best—converts pressure into motivation. D is also good, showing stability. E is decent but may suggest pressure avoidance."

- id: PSY_STRESS_003
  category: stress_tolerance
  type: multiple_choice
  points: 1
  question: "你负责的因子策略在过去两周持续跑输基准1.5%，团队开始质疑你的模型。你会怎么做？\nYour factor strategy has underperformed the benchmark by 1.5% over the past two weeks, and the team is questioning your model. What would you do?"
  options:
    - "A. 立即暂停策略，全面重新回测 / Immediately pause strategy and conduct full re-backtest"
    - "B. 分析是否属于正常回撤范围，同时向团队展示历史类似情况 / Analyze if within normal drawdown range while showing team historical parallels"
    - "C. 坚持运行策略，短期波动不代表模型失效 / Keep running, short-term volatility doesn't mean model failure"
    - "D. 在承受压力的同时悄悄调整参数改善短期表现 / Quietly tweak parameters to improve short-term performance"
    - "E. 请求上级介入并暂时移交策略管理权 / Ask supervisor to step in and temporarily hand over management"
  answer: "B"
  scoring: {"A": 2, "B": 5, "C": 3, "D": 1, "E": 2}
  dimension: "压力耐受 Stress Tolerance"
  explanation: "B最优，体现压力下保持分析性思维并有效沟通。D最差——在压力下偷改参数属于过度拟合且缺乏透明度。\nB is optimal—analytical thinking under pressure with effective communication. D is worst—quietly tweaking parameters is overfitting and lacks transparency."

