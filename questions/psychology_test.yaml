- id: PSY_STRESS_009
  category: stress_tolerance
  type: multiple_choice
  points: 1
  question: "你的策略在实盘中出现了回测中从未见过的极端亏损情况。你的反应是？\nYour strategy experiences an extreme loss in live trading never seen in backtesting. Your reaction?"
