# =============================================================================
# Psychology Test Question Bank for Quantitative Finance Roles
# =============================================================================
# Target roles: Quant Developer, Quant Researcher, Trader, Portfolio Manager
# Total questions: 150
# Categories:
#   - stress_tolerance (30)
#   - risk_appetite (25)
#   - decision_making (25)
#   - emotional_regulation (25)
#   - cognitive_flexibility (25)
#   - team_collaboration (20)
#
# Question types: likert_scale, scenario, multiple_choice
# Bilingual: Chinese + English
# Reverse-scored items: ~30% of likert items (scoring_direction: reverse)
# Social desirability detection items included
# =============================================================================

metadata:
  version: "1.0.0"
  total_questions: 150
  language: "zh-CN / en"
  assessment_framework: "Big Five adapted for quantitative finance"
  scoring_model: "dimensional"
  estimated_completion_minutes: 45
  categories:
    stress_tolerance: 30
    risk_appetite: 25
    decision_making: 25
    emotional_regulation: 25
    cognitive_flexibility: 25
    team_collaboration: 20

questions:

  # ===========================================================================
  # STRESS TOLERANCE (30 questions)
  # ===========================================================================

  - id: PSY_STRESS_001
    category: stress_tolerance
    type: likert_scale
    question: "在面对紧迫的截止日期时，我能够保持冷静和专注。/ When facing tight deadlines, I can remain calm and focused."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "直接评估在时间压力下维持认知功能的能力，这是量化交易中应对实时市场波动的核心素质。/ Directly assesses the ability to maintain cognitive function under time pressure, a core trait for handling real-time market volatility in quantitative trading."

  - id: PSY_STRESS_002
    category: stress_tolerance
    type: likert_scale
    question: "当策略出现连续亏损时，我会感到极度焦虑，难以集中注意力。/ When a strategy experiences consecutive losses, I feel extremely anxious and have difficulty concentrating."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "压力耐受 Stress Tolerance"
    explanation: "反向计分题。评估面对连续回撤时的心理韧性，高焦虑水平可能导致过早止损或偏离策略。/ Reverse-scored. Assesses psychological resilience during consecutive drawdowns; high anxiety may lead to premature stop-losses or strategy deviation."

  - id: PSY_STRESS_003
    category: stress_tolerance
    type: scenario
    question: "你负责的因子策略在过去两周持续跑输基准1.5%，团队开始质疑你的模型。你会怎么做？/ Your factor strategy has underperformed the benchmark by 1.5% over the past two weeks, and the team is questioning your model. What would you do?"
    options:
      - "A. 立即暂停策略，全面重新回测 / Immediately pause the strategy and conduct a full re-backtest"
      - "B. 分析是否属于正常回撤范围，同时向团队展示历史类似情况 / Analyze whether this falls within normal drawdown range while showing the team historical parallels"
      - "C. 坚持运行策略，认为短期波动不代表模型失效 / Continue running the strategy, believing short-term fluctuation doesn't indicate model failure"
      - "D. 在承受压力的同时悄悄调整参数以改善短期表现 / Quietly adjust parameters to improve short-term performance while under pressure"
    scoring: {"A": 2, "B": 4, "C": 3, "D": 1}
    dimension: "压力耐受 Stress Tolerance"
    explanation: "B为最优，体现了在压力下保持分析性思维并有效沟通的能力。D最差，因为在压力下偷改参数属于过度拟合，且缺乏透明度。/ B is optimal, demonstrating analytical thinking under pressure with effective communication. D is worst as quietly tweaking parameters under stress constitutes overfitting and lacks transparency."

  - id: PSY_STRESS_004
    category: stress_tolerance
    type: likert_scale
    question: "高压环境反而能激发我的最佳表现。/ High-pressure environments actually bring out my best performance."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估候选人是否属于'压力驱动型'人格，这在交易和紧急策略修复场景中尤为重要。/ Assesses whether the candidate has a 'pressure-driven' personality, particularly important in trading and urgent strategy repair scenarios."

  - id: PSY_STRESS_005
    category: stress_tolerance
    type: likert_scale
    question: "我从未在工作中感到过压力。/ I have never felt stressed at work."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: social_desirability_check
    dimension: "社会期望性检测 Social Desirability Detection"
    explanation: "社会期望性检测题。几乎所有人都经历过工作压力，选'非常同意'的候选人可能在粉饰回答。/ Social desirability check. Nearly everyone experiences work stress; candidates selecting 'Strongly Agree' may be embellishing their responses."

  - id: PSY_STRESS_006
    category: stress_tolerance
    type: scenario
    question: "凌晨3点，你的实盘策略突然出现异常大额亏损，监控系统报警。你的第一反应是？/ At 3 AM, your live strategy suddenly shows abnormally large losses and the monitoring system triggers an alert. Your first reaction is?"
    options:
      - "A. 恐慌，立即手动平掉所有仓位 / Panic and immediately manually close all positions"
      - "B. 先检查是否为数据源错误或系统故障，再决定下一步 / First check whether it's a data feed error or system malfunction before deciding next steps"
      - "C. 按照预设的风控流程执行，同时通知相关负责人 / Execute pre-set risk control procedures while notifying relevant stakeholders"
      - "D. 继续睡觉，等白天再处理 / Go back to sleep and handle it during the day"
    scoring: {"A": 2, "B": 3, "C": 4, "D": 1}
    dimension: "压力耐受 Stress Tolerance"
    explanation: "C最优，体现了在极端压力下遵循流程的纪律性。B也不错但缺少通知团队的环节。A体现恐慌反应，D体现忽视风险。/ C is optimal, showing discipline in following procedures under extreme pressure. B is good but lacks the team notification step. A shows panic response, D shows risk neglect."

  - id: PSY_STRESS_007
    category: stress_tolerance
    type: likert_scale
    question: "面对不确定性时，我的睡眠质量会明显下降。/ My sleep quality noticeably deteriorates when facing uncertainty."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "压力耐受 Stress Tolerance"
    explanation: "反向计分。评估不确定性对生理状态的影响程度。量化金融从业者需要在持续不确定性中维持良好的身心状态。/ Reverse-scored. Assesses the impact of uncertainty on physiological state. Quant finance professionals need to maintain good physical and mental health amid continuous uncertainty."

  - id: PSY_STRESS_008
    category: stress_tolerance
    type: likert_scale
    question: "我能够在多个项目同时推进时有效地管理优先级。/ I can effectively manage priorities when multiple projects are progressing simultaneously."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估多任务压力下的优先级管理能力。量化团队常需同时维护多个策略、处理研究任务和应对生产问题。/ Assesses priority management under multi-task pressure. Quant teams often need to maintain multiple strategies, handle research tasks, and respond to production issues simultaneously."

  - id: PSY_STRESS_009
    category: stress_tolerance
    type: scenario
    question: "年度业绩评估前一个月，你的策略突然回撤超过历史最大回撤。PM告诉你如果月底前不能恢复，可能会削减你的策略资金。你会？/ One month before the annual performance review, your strategy suddenly draws down beyond its historical maximum. The PM tells you that if it doesn't recover by month-end, your strategy allocation may be cut. What would you do?"
    options:
      - "A. 加大杠杆试图快速回本 / Increase leverage to try to recover quickly"
      - "B. 严格遵守风控纪律，接受可能的资金削减，同时准备详细的分析报告 / Strictly follow risk control discipline, accept the possible allocation cut, and prepare a detailed analysis report"
      - "C. 立即开始开发新策略作为备选 / Immediately start developing a new strategy as backup"
      - "D. 微调模型参数让近期表现看起来好一些 / Fine-tune model parameters to make recent performance look better"
    scoring: {"A": 1, "B": 4, "C": 2, "D": 1}
    dimension: "压力耐受 Stress Tolerance"
    explanation: "B最优，体现了在职业压力下坚持纪律和诚信。A和D都是压力下的不当行为（加杠杆赌博/数据操纵）。C虽非最差，但可能分散注意力。/ B is optimal, showing discipline and integrity under career pressure. A and D are inappropriate responses under pressure (leverage gambling/data manipulation). C is not the worst but may scatter attention."

  - id: PSY_STRESS_010
    category: stress_tolerance
    type: likert_scale
    question: "当市场出现极端波动（如闪崩）时，我能保持客观的判断力。/ When the market experiences extreme volatility (such as a flash crash), I can maintain objective judgment."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估在黑天鹅事件中的认知清晰度。如2015年A股股灾、2020年原油负价格等极端市场条件下，保持客观判断至关重要。/ Assesses cognitive clarity during black swan events. Maintaining objective judgment is critical under extreme market conditions like the 2015 A-share crash or 2020 negative oil prices."

  - id: PSY_STRESS_011
    category: stress_tolerance
    type: likert_scale
    question: "同事的负面情绪很容易影响到我的工作状态。/ Colleagues' negative emotions easily affect my work state."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "压力耐受 Stress Tolerance"
    explanation: "反向计分。评估情绪隔离能力。在交易团队中，一个人的焦虑可能传染给整个团队，影响集体决策质量。/ Reverse-scored. Assesses emotional insulation ability. In trading teams, one person's anxiety can spread to the entire team, affecting collective decision-making quality."

  - id: PSY_STRESS_012
    category: stress_tolerance
    type: likert_scale
    question: "我可以在收到批评后迅速恢复并继续高效工作。/ I can quickly recover and continue working efficiently after receiving criticism."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估从负面反馈中恢复的速度。量化研究中，模型被质疑和推翻是常态，快速恢复能力是生产力的保障。/ Assesses recovery speed from negative feedback. In quant research, having models questioned and overturned is the norm; quick recovery ability ensures productivity."

  - id: PSY_STRESS_013
    category: stress_tolerance
    type: scenario
    question: "你发现一个同事的策略代码有严重bug可能导致重大亏损，但该同事正处于极度紧张的个人评估期。你会怎么做？/ You discover a serious bug in a colleague's strategy code that could cause major losses, but the colleague is going through an extremely stressful personal review period. What would you do?"
    options:
      - "A. 等评估结束后再告诉他 / Wait until the review period is over to tell them"
      - "B. 直接向PM报告，让PM来处理 / Report directly to the PM and let them handle it"
      - "C. 私下告诉同事并帮助修复，同时确保风控部门知情 / Tell the colleague privately and help fix it, while ensuring the risk control department is informed"
      - "D. 自己悄悄修复bug，不告诉任何人 / Quietly fix the bug yourself without telling anyone"
    scoring: {"A": 1, "B": 3, "C": 4, "D": 2}
    dimension: "压力耐受 Stress Tolerance"
    explanation: "C最优，平衡了人际关怀和风险管理责任。此题同时测试压力情境下的沟通能力和职业判断力。/ C is optimal, balancing interpersonal care with risk management responsibility. This question also tests communication ability and professional judgment under pressure."

  - id: PSY_STRESS_014
    category: stress_tolerance
    type: likert_scale
    question: "长时间的高强度工作后，我仍然能做出高质量的决策。/ After prolonged periods of high-intensity work, I can still make high-quality decisions."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估认知疲劳耐受度。策略上线期间或重要研究冲刺阶段，可能需要连续多日高强度工作。/ Assesses cognitive fatigue tolerance. During strategy launch periods or important research sprints, sustained high-intensity work over multiple days may be required."

  - id: PSY_STRESS_015
    category: stress_tolerance
    type: likert_scale
    question: "我经常因为工作中的挫折而失眠。/ I often lose sleep due to setbacks at work."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "压力耐受 Stress Tolerance"
    explanation: "反向计分。评估工作挫折对生理恢复的影响。持续失眠会导致判断力下降，形成恶性循环。/ Reverse-scored. Assesses the impact of work setbacks on physiological recovery. Persistent insomnia leads to impaired judgment, creating a vicious cycle."

  - id: PSY_STRESS_016
    category: stress_tolerance
    type: likert_scale
    question: "在压力下，我更倾向于系统性地分析问题而非凭直觉行动。/ Under pressure, I tend to analyze problems systematically rather than act on intuition."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估压力下是否能维持分析性思维方式。压力易触发System 1（快速直觉）而非System 2（慢速分析）思维。/ Assesses whether analytical thinking can be maintained under pressure. Pressure easily triggers System 1 (fast intuitive) rather than System 2 (slow analytical) thinking."

  - id: PSY_STRESS_017
    category: stress_tolerance
    type: scenario
    question: "在一次重要的策略评审会上，CIO当众质疑你的研究方法存在根本性缺陷。你会如何回应？/ During an important strategy review meeting, the CIO publicly questions your research methodology as having fundamental flaws. How would you respond?"
    options:
      - "A. 情绪激动地为自己辩护 / Emotionally defend yourself"
      - "B. 沉默不语，会后私下找CIO讨论 / Stay silent and find the CIO privately after the meeting"
      - "C. 冷静地请CIO具体说明问题所在，并当场讨论可能的改进方向 / Calmly ask the CIO to specify the issues and discuss possible improvements on the spot"
      - "D. 立即承认所有问题并表示会重做 / Immediately acknowledge all issues and say you will redo everything"
    scoring: {"A": 1, "B": 2, "C": 4, "D": 2}
    dimension: "压力耐受 Stress Tolerance"
    explanation: "C最优，展现了在公开挑战下保持冷静、理性回应的能力。A过度情绪化，B和D过于被动。/ C is optimal, demonstrating the ability to stay calm and respond rationally under public challenge. A is overly emotional, B and D are too passive."

  - id: PSY_STRESS_018
    category: stress_tolerance
    type: likert_scale
    question: "我善于将大的压力分解为可管理的小任务。/ I am good at breaking down large pressures into manageable small tasks."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估压力管理策略。将复杂问题分解的能力是应对多因子研究和系统开发中复杂性的关键技能。/ Assesses stress management strategy. The ability to decompose complex problems is a key skill for handling complexity in multi-factor research and system development."

  - id: PSY_STRESS_019
    category: stress_tolerance
    type: likert_scale
    question: "当我犯了一个代价高昂的错误时，我会陷入长时间的自我谴责。/ When I make a costly mistake, I fall into prolonged self-blame."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "压力耐受 Stress Tolerance"
    explanation: "反向计分。评估从错误中恢复的能力。长时间自责会消耗认知资源，阻碍从错误中学习和改进。/ Reverse-scored. Assesses ability to recover from mistakes. Prolonged self-blame consumes cognitive resources and hinders learning and improvement from errors."

  - id: PSY_STRESS_020
    category: stress_tolerance
    type: likert_scale
    question: "我能够有效地隔离工作压力和个人生活。/ I can effectively separate work stress from personal life."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估生活-工作边界管理能力。量化金融的高强度特性使得工作-生活平衡尤为重要，以维持长期可持续的高性能。/ Assesses life-work boundary management. The high-intensity nature of quantitative finance makes work-life balance especially important for sustainable long-term high performance."

  - id: PSY_STRESS_021
    category: stress_tolerance
    type: scenario
    question: "你同时面临三个紧急任务：一个生产bug需要立即修复，一个策略因子需要在今天提交，PM要求你在一小时内出一份分析报告。你会如何处理？/ You simultaneously face three urgent tasks: a production bug needs immediate fixing, a strategy factor needs to be submitted today, and the PM requires an analysis report within one hour. How would you handle this?"
    options:
      - "A. 感到不知所措，先处理最容易的任务 / Feel overwhelmed and tackle the easiest task first"
      - "B. 按影响程度排优先级：先修复生产bug，再与PM沟通报告延期，最后完成因子提交 / Prioritize by impact: fix the production bug first, negotiate report deadline with PM, then complete factor submission"
      - "C. 同时推进三个任务，频繁切换 / Push all three tasks simultaneously with frequent switching"
      - "D. 先完成PM的报告，因为PM的要求最紧急 / Complete the PM's report first because the PM's request is most urgent"
    scoring: {"A": 1, "B": 4, "C": 2, "D": 2}
    dimension: "压力耐受 Stress Tolerance"
    explanation: "B最优，展示了在多重压力下的优先级判断能力和沟通主动性。生产bug通常是最高优先级，与PM沟通体现了成熟的压力管理。/ B is optimal, showing priority judgment and communication initiative under multiple pressures. Production bugs are typically highest priority, and communicating with the PM reflects mature stress management."

  - id: PSY_STRESS_022
    category: stress_tolerance
    type: likert_scale
    question: "面对连续失败，我仍能保持对成功的信心。/ In the face of consecutive failures, I can still maintain confidence in eventual success."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估心理韧性和乐观主义。因子挖掘过程中，大量假设会被证伪，维持信心对持续创新至关重要。/ Assesses psychological resilience and optimism. In factor mining, many hypotheses will be falsified; maintaining confidence is critical for sustained innovation."

  - id: PSY_STRESS_023
    category: stress_tolerance
    type: likert_scale
    question: "当周围的人都很紧张时，我也会变得紧张。/ When people around me are tense, I also become tense."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "压力耐受 Stress Tolerance"
    explanation: "反向计分。评估情绪传染抵抗力。在市场恐慌时期，交易室的紧张氛围不应影响个人的理性判断。/ Reverse-scored. Assesses resistance to emotional contagion. During market panic periods, the tense atmosphere in the trading floor should not affect one's rational judgment."

  - id: PSY_STRESS_024
    category: stress_tolerance
    type: likert_scale
    question: "我能够将失败视为学习机会而非个人能力的否定。/ I can view failures as learning opportunities rather than denials of my personal ability."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估失败归因模式。成长型心态有助于在高压环境中持续学习和改进。/ Assesses failure attribution patterns. A growth mindset helps sustain learning and improvement in high-pressure environments."

  - id: PSY_STRESS_025
    category: stress_tolerance
    type: likert_scale
    question: "在工作中遇到困难时，我的第一反应是寻找解决方案而非抱怨。/ When encountering difficulties at work, my first reaction is to find solutions rather than complain."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "压力耐受 Stress Tolerance"
    explanation: "评估问题导向 vs. 情绪导向的应对方式。问题导向的应对方式在量化金融中更为有效。/ Assesses problem-oriented vs. emotion-oriented coping style. Problem-oriented coping is more effective in quantitative finance."

  - id: PSY_STRESS_026
    category: stress_tolerance
