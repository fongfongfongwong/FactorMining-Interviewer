  - id: PSY_RISK_001
    category: risk_appetite
    type: scenario
    question: "你管理的策略今天亏损了2%，而benchmark只跌了0.5%。你会怎么做？/ Your strategy lost 2% today while the benchmark only dropped 0.5%. What would you do?"
    options:
      - "A. 立即减仓以控制进一步亏损 / Immediately reduce positions to control further losses"
      - "B. 分析alpha衰减原因和市场环境变化后决定 / Analyze alpha decay reasons and market environment changes before deciding"
      - "C. 维持现有仓位，认为这是正常波动 / Maintain current positions, believing this is normal fluctuation"
      - "D. 在确认信号仍然有效后适度加仓 / Moderately increase positions after confirming signals are still valid"
    scoring: {"A": 2, "B": 4, "C": 3, "D": 2}
    dimension: "风险偏好 Risk Appetite"
    explanation: "B为最优，体现了风险管理的分析性方法。A可能过度反应，C可能忽视风险信号，D在当日亏损背景下加仓需要更充分的依据。/ B is optimal, showing an analytical approach to risk management. A may be overreacting, C may ignore risk signals, D requires stronger justification for adding positions on a losing day."

  - id: PSY_RISK_002
    category: risk_appetite
    type: likert_scale
    question: "我宁愿选择稳定但收益较低的策略，也不愿承受高波动性策略的压力。/ I would rather choose a stable but lower-return strategy than bear the stress of a high-volatility strategy."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "风险偏好 Risk Appetite"
    explanation: "反向计分。评估风险-收益权衡偏好。过度风险规避在量化交易中可能限制alpha的捕获。注意：此处评估的是理性的风险承受倾向，非鲁莽。/ Reverse-scored. Assesses risk-return tradeoff preference. Excessive risk aversion in quant trading may limit alpha capture. Note: This assesses rational risk tolerance tendency, not recklessness."

  - id: PSY_RISK_003
    category: risk_appetite
    type: likert_scale
    question: "我认为承担经过计算的风险是获得超额收益的必要条件。/ I believe taking calculated risks is a necessary condition for achieving excess returns."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "风险偏好 Risk Appetite"
    explanation: "评估对风险-收益关系的理性认知。理解并接受适度风险是量化策略的基础。/ Assesses rational understanding of the risk-return relationship. Understanding and accepting moderate risk is fundamental to quantitative strategies."

  - id: PSY_RISK_004
    category: risk_appetite
    type: scenario
    question: "一个新因子在回测中显示夏普比率2.5，但样本外测试仅有6个月数据且夏普0.8。你会建议？/ A new factor shows a Sharpe ratio of 2.5 in backtesting, but out-of-sample testing with only 6 months of data shows a Sharpe of 0.8. Would you recommend?"
    options:
      - "A. 立即分配全额资金上线 / Immediately allocate full capital and go live"
      - "B. 用小仓位试跑，同时继续收集样本外数据 / Run with a small position while continuing to collect out-of-sample data"
      - "C. 等待至少2年的样本外数据再做决定 / Wait for at least 2 years of out-of-sample data before deciding"
      - "D. 放弃该因子，样本外表现差距太大 / Abandon the factor as the out-of-sample performance gap is too large"
    scoring: {"A": 1, "B": 4, "C": 2, "D": 2}
    dimension: "风险偏好 Risk Appetite"
    explanation: "B最优，平衡了机会成本和风险控制。A过于激进（可能过拟合），C过于保守（可能错失机会），D过于绝对（6个月数据不足以完全否定）。/ B is optimal, balancing opportunity cost and risk control. A is too aggressive (possibly overfitting), C too conservative (may miss opportunity), D too absolute (6 months insufficient to fully reject)."

  - id: PSY_RISK_005
    category: risk_appetite
    type: likert_scale
    question: "我每次交易都不愿意承受超过资金1%的亏损。/ I am unwilling to bear a loss of more than 1% of capital on any single trade."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "风险偏好 Risk Appetite"
    explanation: "反向计分。评估单笔风险容忍度。虽然风控很重要，但过度保守的止损设置可能导致策略频繁被止损出局。/ Reverse-scored. Assesses single-trade risk tolerance. While risk control is important, overly conservative stop-loss settings may cause strategies to be frequently stopped out."

  - id: PSY_RISK_006
    category: risk_appetite
    type: likert_scale
    question: "在不确定的市场环境中，我更倾向于等待确认信号而非率先行动。/ In uncertain market conditions, I tend to wait for confirmation signals rather than act first."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "风险偏好 Risk Appetite"
    explanation: "反向计分。评估行动倾向。量化策略中，过度等待确认可能错过最佳入场时机，但这也需要与鲁莽行动区分。/ Reverse-scored. Assesses action tendency. In quant strategies, waiting too long for confirmation may miss optimal entry, but this must be distinguished from reckless action."

  - id: PSY_RISK_007
    category: risk_appetite
    type: scenario
    question: "PM提出一个大胆的策略想法，预期年化收益50%但最大回撤可能达30%。你的第一反应是？/ The PM proposes a bold strategy idea with an expected 50% annualized return but a potential maximum drawdown of 30%. Your first reaction is?"
