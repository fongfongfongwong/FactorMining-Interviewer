    - "B. 能忍受但更愿意避免 / Can tolerate but prefer to avoid"
    - "C. 适度压力有帮助，过大则不行 / Moderate pressure helps, too much does not"
    - "D. 高压反而激发我的最佳表现 / High pressure actually brings out my best"
    - "E. 不太确定，取决于具体情况 / Not sure, depends on the situation"
  answer: "D"
  scoring: {"A": 1, "B": 2, "C": 4, "D": 5, "E": 3}
  dimension: "压力耐受 Stress Tolerance"
  explanation: "D最佳，顶级量化交易环境本质上是高压的。C也是成熟的回答。E过于模糊。\nD is best—top quant trading environments are inherently high-pressure. C is also mature. E is too vague."

- id: PSY_STRESS_005
  category: stress_tolerance
  type: multiple_choice
  points: 1
  question: "周五下午5点，你发现线上策略的风控模块有一个潜在bug可能在周一开盘时触发异常交易。你会？\nAt 5pm Friday, you discover a potential bug in your live strategy's risk module that might trigger abnormal trades at Monday's open. What do you do?"
  options:
    - "A. 先关掉策略，周末再慢慢查 / Shut down strategy first, investigate over weekend"
    - "B. 立即开始排查，不管需要多长时间 / Start debugging immediately, regardless of time needed"
    - "C. 发邮件通知团队，让周一有人跟进 / Email the team so someone follows up Monday"
    - "D. 评估bug影响范围：若风险可控则周一处理，若严重则立即修复 / Assess impact scope: handle Monday if manageable, fix immediately if severe"
    - "E. 感觉很有压力，不确定该怎么处理 / Feel stressed, unsure how to handle it"
  answer: "D"
  scoring: {"A": 3, "B": 3, "C": 1, "D": 5, "E": 1}
  dimension: "压力耐受 Stress Tolerance"
  explanation: "D最佳——冷静评估风险后做出合理判断。B虽积极但缺乏优先级判断。C推卸责任。\nD is best—calm risk assessment followed by sound judgment. B is proactive but lacks prioritization. C deflects responsibility."

