  - id: PSY_RISK_020
    category: risk_appetite
    type: likert_scale
    question: "我会在做任何决定之前尽量收集所有可能的信息。/ I try to collect all possible information before making any decision."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "风险偏好 Risk Appetite"
    explanation: "反向计分。评估分析瘫痪倾向。信息永远不完美，过度追求完美信息会错失交易时机。/ Reverse-scored. Assesses analysis paralysis tendency. Information is never perfect; pursuing perfect information excessively will miss trading opportunities."

  - id: PSY_RISK_021
    category: risk_appetite
    type: likert_scale
    question: "我更喜欢可预测的工作成果，而非高方差的结果。/ I prefer predictable work outcomes over high-variance results."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "风险偏好 Risk Appetite"
    explanation: "反向计分。评估对结果波动性的偏好。量化金融本质上是高方差行业，需要对不确定性有一定的舒适度。/ Reverse-scored. Assesses preference for outcome volatility. Quantitative finance is inherently a high-variance industry, requiring some comfort with uncertainty."

  - id: PSY_RISK_022
    category: risk_appetite
    type: scenario
    question: "你发现了一个可能的市场微观结构套利机会，但如果判断错误可能损失较大。你的研究时间有限。你会？/ You discover a potential market microstructure arbitrage opportunity, but if your judgment is wrong, losses could be significant. Your research time is limited. What would you do?"
    options:
      - "A. 放弃，风险太大 / Give up, the risk is too great"
      - "B. 快速建立简化模型估算风险-收益比，如果满足条件则用极小仓位试探 / Quickly build a simplified model to estimate risk-return ratio, then probe with minimal position if criteria are met"
      - "C. 凭经验判断机会可靠性后全仓进入 / Enter with full position based on experience judgment of reliability"
      - "D. 记录下来等有更多时间时再研究 / Record it and research when more time is available"
    scoring: {"A": 1, "B": 4, "C": 1, "D": 2}
    dimension: "风险偏好 Risk Appetite"
    explanation: "B最优，在有限时间内快速量化评估并控制风险敞口。C过于鲁莽，A过于保守，D可能错失时效性机会。/ B is optimal, quickly quantifying assessment and controlling risk exposure within limited time. C is too reckless, A too conservative, D may miss time-sensitive opportunity."

  - id: PSY_RISK_023
    category: risk_appetite
    type: likert_scale
    question: "我认为适度的杠杆是提升策略收益的合理工具。/ I believe moderate leverage is a reasonable tool for enhancing strategy returns."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "风险偏好 Risk Appetite"
    explanation: "评估对杠杆的理性态度。适度杠杆是量化策略中的标准工具，完全排斥或滥用杠杆都不理想。/ Assesses rational attitude toward leverage. Moderate leverage is a standard tool in quantitative strategies; completely rejecting or abusing leverage are both suboptimal."

  - id: PSY_RISK_024
    category: risk_appetite
    type: likert_scale
    question: "我倾向于在有高度把握时才采取行动。/ I tend to only take action when I have a high degree of certainty."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "风险偏好 Risk Appetite"
    explanation: "反向计分。评估确定性需求程度。量化交易中，等待100%确定性往往意味着错过所有机会。/ Reverse-scored. Assesses degree of certainty need. In quantitative trading, waiting for 100% certainty usually means missing all opportunities."

  - id: PSY_RISK_025
    category: risk_appetite
    type: likert_scale
    question: "我相信只要风险被正确量化和管理，就应该大胆追求alpha。/ I believe that as long as risk is properly quantified and managed, one should boldly pursue alpha."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "风险偏好 Risk Appetite"
    explanation: "评估对风险管理与收益追求平衡的理念。这是量化投资的核心哲学——不是规避风险，而是管理风险。/ Assesses the philosophy of balancing risk management with return pursuit. This is the core philosophy of quantitative investing—not avoiding risk, but managing it."

  # ===========================================================================
  # DECISION MAKING (25 questions)
  # ===========================================================================

  - id: PSY_DEC_001
    category: decision_making
    type: likert_scale
    question: "做决定时，我更倾向于依赖数据分析而非直觉。/ When making decisions, I tend to rely on data analysis rather than intuition."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估分析型 vs. 直觉型决策偏好。量化金融强调数据驱动决策，但也需要在数据不足时运用合理判断。/ Assesses analytical vs. intuitive decision preference. Quantitative finance emphasizes data-driven decisions, but also requires reasonable judgment when data is insufficient."

  - id: PSY_DEC_002
    category: decision_making
    type: scenario
    question: "你的因子模型给出了'买入'信号，但你的直觉告诉你市场即将下跌。你会？/ Your factor model gives a 'buy' signal, but your intuition tells you the market is about to drop. What would you do?"
    options:
      - "A. 完全遵循模型信号执行 / Completely follow the model signal and execute"
      - "B. 完全相信直觉，不执行信号 / Completely trust intuition and skip the signal"
      - "C. 检查直觉背后是否有模型未捕获的信息，如果有则调整；如果没有则执行 / Check if there's information behind the intuition that the model hasn't captured; adjust if yes, execute if no"
      - "D. 执行一半仓位作为折中 / Execute half the position as a compromise"
    scoring: {"A": 3, "B": 1, "C": 4, "D": 2}
    dimension: "决策风格 Decision Making Style"
    explanation: "C最优，体现了将直觉系统性化的能力——检查直觉是否包含模型遗漏的信息。A也可接受（纪律性），B最差（纯主观），D缺乏理性基础。/ C is optimal, showing ability to systematize intuition—checking if intuition contains information the model missed. A is acceptable (disciplined), B is worst (purely subjective), D lacks rational basis."

  - id: PSY_DEC_003
    category: decision_making
    type: likert_scale
    question: "我在做决定前会主动寻找反驳自己观点的证据。/ Before making a decision, I actively seek evidence that contradicts my own view."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估确认偏差抵抗力。主动寻求反证是科学方法的核心，也是因子研究中避免虚假发现的关键。/ Assesses confirmation bias resistance. Actively seeking counter-evidence is core to the scientific method and key to avoiding false discoveries in factor research."

  - id: PSY_DEC_004
    category: decision_making
    type: likert_scale
    question: "当我做出一个决定后，如果新的证据表明我错了，我会迅速改变立场。/ When I make a decision, if new evidence shows I was wrong, I will quickly change my position."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估贝叶斯更新能力。能够根据新证据更新信念是量化研究者的核心素质。/ Assesses Bayesian updating ability. The ability to update beliefs based on new evidence is a core quality of quantitative researchers."

  - id: PSY_DEC_005
    category: decision_making
    type: likert_scale
    question: "我总是能做出正确的决定。/ I always make the right decisions."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: social_desirability_check
    dimension: "社会期望性检测 Social Desirability Detection"
    explanation: "社会期望性检测题。没有人总是做出正确决定，强烈同意可能表示缺乏自我意识或粉饰回答。/ Social desirability check. No one always makes right decisions; strong agreement may indicate lack of self-awareness or embellished responses."

  - id: PSY_DEC_006
    category: decision_making
    type: scenario
    question: "你的研究发现一个新因子在统计上显著（p<0.01），但经济直觉上你找不到合理的解释。你会？/ Your research finds a new factor that is statistically significant (p<0.01), but you cannot find a reasonable economic explanation for it. What would you do?"
    options:
      - "A. 直接采纳，统计证据就是一切 / Adopt it directly; statistical evidence is everything"
      - "B. 搁置该因子，没有经济解释的因子不可信 / Shelve the factor; factors without economic explanation are untrustworthy"
      - "C. 进一步测试稳健性（不同时段、不同市场、多重假设校正），同时继续寻找可能的经济解释 / Further test robustness (different periods, markets, multiple hypothesis correction) while continuing to seek possible economic explanations"
      - "D. 先小规模试用，看实际表现再决定 / Test on a small scale first and decide based on actual performance"
    scoring: {"A": 1, "B": 2, "C": 4, "D": 3}
    dimension: "决策风格 Decision Making Style"
    explanation: "C最优，体现了严谨的科学方法论——统计显著性不等于经济意义，需要多角度验证。A忽视数据挖掘偏差的风险，B过于保守。/ C is optimal, showing rigorous scientific methodology—statistical significance doesn't equal economic significance; multi-angle verification is needed. A ignores data mining bias risk, B is too conservative."

  - id: PSY_DEC_007
    category: decision_making
    type: likert_scale
    question: "面对两个看似同样好的选择时，我会果断选择其一而非纠结不前。/ When facing two seemingly equally good options, I will decisively choose one rather than agonizing."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估决策效率。Buridan's ass paradox在量化交易中的现实版本——过度纠结会错失机会。/ Assesses decision efficiency. The real-world version of Buridan's ass paradox in quantitative trading—excessive deliberation misses opportunities."

  - id: PSY_DEC_008
    category: decision_making
    type: likert_scale
    question: "我很难区分重要和不重要的信息。/ I have difficulty distinguishing important from unimportant information."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "决策风格 Decision Making Style"
    explanation: "反向计分。评估信息过滤能力。在信息爆炸的金融市场中，信号-噪声比极低，过滤噪声的能力至关重要。/ Reverse-scored. Assesses information filtering ability. In information-flooded financial markets with extremely low signal-to-noise ratio, noise filtering ability is critical."

  - id: PSY_DEC_009
    category: decision_making
    type: scenario
    question: "团队讨论一个策略方向时，3个资深研究员支持A方案，但你通过数据分析得出B方案更优。你会？/ When the team discusses a strategy direction, 3 senior researchers support Plan A, but your data analysis suggests Plan B is superior. What would you do?"
    options:
      - "A. 服从多数意见选择A / Defer to the majority and choose A"
      - "B. 展示你的数据分析结果并说服团队考虑B / Present your data analysis and convince the team to consider B"
      - "C. 私下继续研究B方案，不在会上提出 / Continue researching Plan B privately without raising it in the meeting"
      - "D. 建议同时运行A和B的小规模测试进行对比 / Suggest running small-scale tests of both A and B for comparison"
    scoring: {"A": 1, "B": 3, "C": 1, "D": 4}
    dimension: "决策风格 Decision Making Style"
    explanation: "D最优，用数据说话而非权威说话。B也很好，体现了独立思考的勇气。A是从众效应，C虽保留独立思考但缺乏沟通勇气。/ D is optimal, letting data speak rather than authority. B is also good, showing courage for independent thinking. A shows conformity effect, C preserves independent thinking but lacks communication courage."

  - id: PSY_DEC_010
    category: decision_making
    type: likert_scale
    question: "我意识到自己的认知偏差并主动采取措施去减少它们的影响。/ I am aware of my cognitive biases and actively take measures to reduce their influence."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估元认知能力。对锚定效应、确认偏差、近因效应等的意识是减少投资决策错误的前提。/ Assesses metacognitive ability. Awareness of anchoring, confirmation bias, recency bias, etc. is a prerequisite for reducing investment decision errors."

  - id: PSY_DEC_011
    category: decision_making
    type: likert_scale
    question: "做完决定后，我常常会反复怀疑自己的选择。/ After making a decision, I often repeatedly doubt my choice."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "决策风格 Decision Making Style"
    explanation: "反向计分。评估决策后悔倾向。适度反思是好的，但反复自我怀疑会消耗精力并影响后续决策。/ Reverse-scored. Assesses post-decision regret tendency. Moderate reflection is good, but repeated self-doubt drains energy and affects subsequent decisions."

  - id: PSY_DEC_012
    category: decision_making
    type: likert_scale
    question: "我善于区分相关性和因果性。/ I am good at distinguishing correlation from causation."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估统计思维能力。混淆相关性与因果性是因子研究中最常见也是最危险的错误之一。/ Assesses statistical thinking ability. Confusing correlation with causation is one of the most common and dangerous errors in factor research."

  - id: PSY_DEC_013
    category: decision_making
    type: scenario
    question: "你有一个策略的优化结果显示在特定参数下表现最佳，但该参数附近区域表现差异很大（参数敏感性高）。你会？/ Your strategy optimization results show best performance at specific parameters, but performance varies greatly in the surrounding parameter region (high parameter sensitivity). What would you do?"
    options:
      - "A. 使用最优参数，因为它表现最好 / Use the optimal parameter because it performs best"
      - "B. 选择一个表现稍差但参数更稳健的区域 / Choose a region with slightly worse performance but more robust parameters"
      - "C. 使用集成方法，在参数空间中取加权平均 / Use an ensemble method, taking weighted averages across parameter space"
      - "D. 认为参数敏感性高意味着模型有问题，重新设计 / Believe high parameter sensitivity means the model is flawed, redesign it"
    scoring: {"A": 1, "B": 3, "C": 4, "D": 3}
    dimension: "决策风格 Decision Making Style"
    explanation: "C最优，体现了先进的模型稳健性处理方法。B和D也合理。A最差，追求峰值参数是过拟合的典型表现。/ C is optimal, showing advanced model robustness handling. B and D are also reasonable. A is worst; pursuing peak parameters is a classic overfitting behavior."

  - id: PSY_DEC_014
    category: decision_making
    type: likert_scale
    question: "我在决策前会考虑该决定的二阶效应（间接后果）。/ Before making a decision, I consider the second-order effects (indirect consequences) of that decision."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估系统思维深度。例如：增加杠杆不仅影响收益，还影响保证金要求、流动性需求、压力测试结果等。/ Assesses depth of systems thinking. For example: increasing leverage affects not only returns but also margin requirements, liquidity needs, stress test results, etc."

  - id: PSY_DEC_015
    category: decision_making
    type: likert_scale
    question: "我倾向于先行动再完善，而不是等到一切完美才开始。/ I tend to act first and refine later, rather than waiting until everything is perfect before starting."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估行动偏向。在快速变化的市场中，追求完美可能导致错失机会；迭代改进的方法更为有效。/ Assesses action bias. In fast-changing markets, pursuing perfection may lead to missed opportunities; an iterative improvement approach is more effective."

  - id: PSY_DEC_016
    category: decision_making
    type: likert_scale
    question: "当结果不好时，我能够区分是决策过程有问题还是纯粹的运气不好。/ When outcomes are bad, I can distinguish whether the decision process was flawed or it was purely bad luck."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估过程-结果分离能力。好的决策可能有坏的结果（因为随机性），区分这两者是量化思维的核心。/ Assesses process-outcome separation ability. Good decisions can have bad outcomes (due to randomness); distinguishing the two is core to quantitative thinking."

  - id: PSY_DEC_017
    category: decision_making
    type: scenario
    question: "你发现自己对某只股票有强烈的正面看法，可能是因为你个人经常使用该公司的产品。这会如何影响你的研究决策？/ You notice you have a strong positive view of a stock, possibly because you personally use the company's products frequently. How would this affect your research decisions?"
    options:
      - "A. 不影响，我能保持客观 / No effect, I can remain objective"
      - "B. 意识到这个偏差后，我会刻意回避研究这只股票 / After recognizing this bias, I would deliberately avoid researching this stock"
      - "C. 承认偏差存在，在分析中增加反方论证的权重来补偿 / Acknowledge the bias exists and compensate by increasing the weight of counter-arguments in analysis"
      - "D. 寻求没有该偏差的同事来独立验证我的分析 / Seek a colleague without this bias to independently verify my analysis"
    scoring: {"A": 1, "B": 2, "C": 3, "D": 4}
    dimension: "决策风格 Decision Making Style"
    explanation: "D最优，利用团队来对冲个人偏差。C也好，展示了主动补偿偏差的意识。A过于自信，B过度反应。/ D is optimal, using the team to hedge personal bias. C is also good, showing proactive bias compensation awareness. A is overconfident, B is an overreaction."

  - id: PSY_DEC_018
    category: decision_making
    type: likert_scale
    question: "我能够在信息不完整的情况下做出'足够好'的决策。/ I can make 'good enough' decisions when information is incomplete."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估满意决策(satisficing)能力。Herbert Simon的有限理性理论在交易实践中高度相关——完美是好的敌人。/ Assesses satisficing ability. Herbert Simon's bounded rationality theory is highly relevant in trading practice—perfect is the enemy of good."

  - id: PSY_DEC_019
    category: decision_making
    type: likert_scale
    question: "我会定期回顾过去的决策来评估其质量和改进空间。/ I regularly review past decisions to assess their quality and room for improvement."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估决策反思习惯。如交易日志、策略复盘等实践，是持续改进决策质量的基础。/ Assesses decision reflection habits. Practices like trading journals and strategy postmortems are the foundation for continuously improving decision quality."

  - id: PSY_DEC_020
    category: decision_making
    type: likert_scale
    question: "我的决策很少受到沉没成本的影响。/ My decisions are rarely influenced by sunk costs."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "决策风格 Decision Making Style"
    explanation: "评估沉没成本偏差抵抗力。在因子研究中，花了大量时间开发的因子如果表现不好应该果断放弃。/ Assesses sunk cost bias resistance. In factor research, factors that perform poorly should be decisively abandoned despite significant development time invested."

  - id: PSY_DEC_021
    category: decision_making
    type: scenario
    question: "你连续三次用相同的框架分析市场但预测都是错的。你会？/ You have used the same framework to analyze the market three times in a row but your predictions were all wrong. What would you do?"
    options:
      - "A. 继续使用同一框架，相信长期会均值回归 / Continue using the same framework, believing it will mean-revert over time"
      - "B. 立即放弃该框架，寻找全新的方法 / Immediately abandon the framework and look for an entirely new approach"
      - "C. 分析三次错误是否有共同模式，更新框架假设并进行压力测试 / Analyze whether the three errors share a common pattern, update framework assumptions, and stress test"
      - "D. 暂停交易，花时间深入研究市场结构是否发生了变化 / Pause trading and spend time deeply researching whether market structure has changed"
    scoring: {"A": 1, "B": 2, "C": 4, "D": 3}
    dimension: "决策风格 Decision Making Style"
    explanation: "C最优，展示了基于证据迭代更新认知框架的能力。D也可接受。A忽视持续反馈，B过于极端。/ C is optimal, showing ability to iteratively update cognitive frameworks based on evidence. D is also acceptable. A ignores persistent feedback, B is too extreme."

