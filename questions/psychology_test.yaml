  - id: PSY_EMO_024
    category: emotional_regulation
    type: likert_scale
    question: "我能够接受'有时候没有做错什么也会亏钱'这个事实。/ I can accept the fact that 'sometimes you lose money without doing anything wrong.'"
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "情绪调节 Emotional Regulation"
    explanation: "评估对随机性的情绪接纳。理解亏损不一定等于错误，是量化交易者情绪成熟的重要标志。/ Assesses emotional acceptance of randomness. Understanding that losses don't necessarily equal mistakes is an important sign of emotional maturity for quantitative traders."

  - id: PSY_EMO_025
    category: emotional_regulation
    type: likert_scale
    question: "我能在高度不确定的环境中保持内心的平静。/ I can maintain inner peace in a highly uncertain environment."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "情绪调节 Emotional Regulation"
    explanation: "综合评估情绪调节能力的核心指标。内心平静是做出理性决策的前提条件。/ Comprehensive core indicator of emotional regulation ability. Inner peace is a prerequisite for making rational decisions."

  # ===========================================================================
  # COGNITIVE FLEXIBILITY (25 questions)
  # ===========================================================================

  - id: PSY_FLEX_001
    category: cognitive_flexibility
    type: likert_scale
    question: "当一种方法不奏效时，我能快速切换到另一种方法。/ When one approach doesn't work, I can quickly switch to another."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估方法论灵活性。在因子研究中，一个方向不通时需要快速探索替代路径。/ Assesses methodological flexibility. In factor research, when one direction doesn't work, alternative paths must be quickly explored."

  - id: PSY_FLEX_002
    category: cognitive_flexibility
    type: likert_scale
    question: "我更喜欢遵循既定的流程和方法，不太愿意尝试新的方式。/ I prefer following established processes and methods and am reluctant to try new approaches."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "反向计分。评估对变化的开放程度。过度依赖既定流程在快速变化的量化金融环境中可能成为劣势。/ Reverse-scored. Assesses openness to change. Excessive reliance on established processes may become a disadvantage in the fast-changing quant finance environment."

  - id: PSY_FLEX_003
    category: cognitive_flexibility
    type: scenario
    question: "你一直使用传统的线性因子模型，但团队中有人提议采用深度学习方法。你对机器学习方法没有太多经验。你会？/ You've been using traditional linear factor models, but a team member proposes adopting deep learning methods. You don't have much experience with ML methods. What would you do?"
    options:
      - "A. 坚持线性模型，认为深度学习在金融中是过度拟合的工具 / Stick with linear models, believing deep learning is an overfitting tool in finance"
      - "B. 开始学习深度学习基础，同时评估其在因子研究中的优缺点 / Start learning deep learning fundamentals while evaluating its pros and cons in factor research"
      - "C. 完全转向深度学习，追随最新趋势 / Completely shift to deep learning, following the latest trend"
      - "D. 提议设计一个公平的对比实验，让两种方法在相同条件下竞争 / Propose designing a fair comparison experiment where both methods compete under the same conditions"
    scoring: {"A": 1, "B": 3, "C": 1, "D": 4}
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "D最优，体现了开放心态和科学方法论。B也不错，展示了学习意愿。A和C都是极端——一个固执，一个盲从。/ D is optimal, showing open-mindedness and scientific methodology. B is also good, showing learning willingness. A and C are both extreme—one stubborn, one blindly following."

  - id: PSY_FLEX_004
    category: cognitive_flexibility
    type: likert_scale
    question: "我能从完全不同领域的知识中获取灵感来解决当前的问题。/ I can draw inspiration from knowledge in completely different fields to solve current problems."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估跨领域迁移能力。量化金融的许多突破来自物理学、信息论、生物学等领域的思维方式迁移。/ Assesses cross-domain transfer ability. Many breakthroughs in quant finance come from transferring thinking patterns from physics, information theory, biology, etc."

  - id: PSY_FLEX_005
    category: cognitive_flexibility
    type: likert_scale
    question: "当市场环境发生根本变化时，我能调整我的投资框架。/ When market conditions undergo fundamental changes, I can adjust my investment framework."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估市场适应性。市场制度变化（如从低波动到高波动regime）要求策略和思维框架的相应调整。/ Assesses market adaptability. Market regime changes (e.g., from low to high volatility regime) require corresponding adjustments in strategy and thinking frameworks."

  - id: PSY_FLEX_006
    category: cognitive_flexibility
    type: likert_scale
    question: "我发现很难改变已经形成的观点或判断。/ I find it difficult to change opinions or judgments I've already formed."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "反向计分。评估观点更新阻力。固守已形成的判断是锚定效应的表现，在因子研究中可能导致错失新发现。/ Reverse-scored. Assesses resistance to opinion updating. Clinging to formed judgments is a manifestation of anchoring effect, potentially causing missed discoveries in factor research."

  - id: PSY_FLEX_007
    category: cognitive_flexibility
    type: scenario
    question: "你的因子策略一直基于基本面数据，但最近你注意到另类数据（卫星图像、社交媒体情绪等）在行业中越来越流行。你会？/ Your factor strategies have always been based on fundamental data, but recently you've noticed alternative data (satellite imagery, social media sentiment, etc.) becoming increasingly popular in the industry. What would you do?"
    options:
      - "A. 忽略这些新数据源，坚持你擅长的基本面分析 / Ignore these new data sources and stick to your fundamental analysis strengths"
      - "B. 投入大量时间全面学习所有另类数据类型 / Invest significant time to comprehensively learn all alternative data types"
      - "C. 选择性地评估哪些另类数据最有可能增强你现有的因子框架 / Selectively evaluate which alternative data is most likely to enhance your existing factor framework"
      - "D. 立即订阅多个另类数据提供商开始实验 / Immediately subscribe to multiple alternative data providers and start experimenting"
    scoring: {"A": 1, "B": 2, "C": 4, "D": 2}
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "C最优，体现了有目的性的灵活学习。B和D虽然积极但缺乏策略性。A过于封闭。/ C is optimal, showing purposeful flexible learning. B and D are active but lack strategic focus. A is too closed-minded."

  - id: PSY_FLEX_008
    category: cognitive_flexibility
    type: likert_scale
    question: "我享受挑战自己已有的假设和信念。/ I enjoy challenging my existing assumptions and beliefs."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估知识自我挑战倾向。科学方法的核心是不断质疑和检验假设。/ Assesses knowledge self-challenge tendency. The core of the scientific method is continuously questioning and testing hypotheses."

  - id: PSY_FLEX_009
    category: cognitive_flexibility
    type: likert_scale
    question: "我能够同时持有两个相互矛盾的观点并进行评估。/ I can hold two contradictory viewpoints simultaneously and evaluate them."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估认知复杂度。能够同时考虑牛市和熊市论点的人在构建更稳健的策略方面具有优势。/ Assesses cognitive complexity. Those who can simultaneously consider bull and bear arguments have an advantage in building more robust strategies."

  - id: PSY_FLEX_010
    category: cognitive_flexibility
    type: likert_scale
    question: "面对模糊不清的信息时，我感到不安和焦虑。/ I feel uneasy and anxious when facing ambiguous information."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "反向计分。评估模糊容忍度。金融数据天然充满噪声和不确定性，对模糊信息的不安会阻碍探索性研究。/ Reverse-scored. Assesses ambiguity tolerance. Financial data is naturally full of noise and uncertainty; discomfort with ambiguous information hinders exploratory research."

  - id: PSY_FLEX_011
    category: cognitive_flexibility
    type: likert_scale
    question: "我经常主动学习与当前工作不直接相关的新知识。/ I often proactively learn new knowledge that is not directly related to my current work."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估知识探索广度。跨领域学习是产生创新因子思路的重要来源。/ Assesses breadth of knowledge exploration. Cross-domain learning is an important source for generating innovative factor ideas."

  - id: PSY_FLEX_012
    category: cognitive_flexibility
    type: scenario
    question: "监管部门突然出台了一项新规则，使得你目前最盈利的因子策略不再可行。你会？/ Regulators suddenly introduce a new rule that makes your most profitable factor strategy no longer viable. What would you do?"
    options:
      - "A. 感到极度沮丧，认为这是不公平的 / Feel extremely frustrated, believing this is unfair"
      - "B. 快速评估新规则的具体影响范围，寻找合规的替代方案或调整策略 / Quickly assess the specific scope of the new rule, look for compliant alternatives or adjust the strategy"
      - "C. 尝试寻找规则的灰色地带来维持策略 / Try to find gray areas in the rules to maintain the strategy"
      - "D. 等待看其他机构如何应对，然后跟随 / Wait to see how other institutions respond, then follow"
    scoring: {"A": 1, "B": 4, "C": 1, "D": 2}
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "B最优，展示了快速适应外部变化的能力。C有合规风险。D缺乏主动性。A纯情绪反应。/ B is optimal, showing ability to quickly adapt to external changes. C has compliance risks. D lacks initiative. A is a pure emotional response."

  - id: PSY_FLEX_013
    category: cognitive_flexibility
    type: likert_scale
    question: "我相信在量化金融领域，持续学习新工具和方法是必要的。/ I believe continuous learning of new tools and methods is necessary in quantitative finance."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估终身学习理念。量化金融技术栈快速演进（如从SAS到Python到Rust），不学习就被淘汰。/ Assesses lifelong learning philosophy. The quant finance tech stack evolves rapidly (e.g., from SAS to Python to Rust); not learning means being eliminated."

  - id: PSY_FLEX_014
    category: cognitive_flexibility
    type: likert_scale
    question: "当我的分析结论与主流共识不同时，我不确定是应该坚持还是妥协。/ When my analysis conclusion differs from mainstream consensus, I'm unsure whether to persist or compromise."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "反向计分。评估独立思考的信心。虽然应该倾听不同意见，但缺乏判断的不确定性反映了认知灵活性的不足。/ Reverse-scored. Assesses confidence in independent thinking. While one should listen to different opinions, lacking judgment-based certainty reflects insufficient cognitive flexibility."

  - id: PSY_FLEX_015
    category: cognitive_flexibility
    type: likert_scale
    question: "我能够快速适应新的编程语言或分析工具。/ I can quickly adapt to new programming languages or analytical tools."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估技术适应能力。从Python到C++/Rust的转换、新框架的采用等都需要快速的技术适应力。/ Assesses technical adaptability. Transitions from Python to C++/Rust, adoption of new frameworks, etc., all require rapid technical adaptability."

  - id: PSY_FLEX_016
    category: cognitive_flexibility
    type: likert_scale
    question: "我通常只关注一种解决问题的思路，很少考虑替代方案。/ I usually focus on only one problem-solving approach and rarely consider alternatives."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "反向计分。评估思维发散度。在因子挖掘中，对同一个经济现象从多角度构建因子的能力是创新的关键。/ Reverse-scored. Assesses thinking divergence. In factor mining, the ability to construct factors from multiple angles for the same economic phenomenon is key to innovation."

  - id: PSY_FLEX_017
    category: cognitive_flexibility
    type: scenario
    question: "你的PM要求你从量价因子转向事件驱动因子研究，这是你不熟悉的领域。你会？/ Your PM asks you to shift from price-volume factor research to event-driven factor research, a field you're unfamiliar with. What would you do?"
    options:
      - "A. 表示抗拒，认为应该发挥自己的专长 / Resist, believing you should leverage your expertise"
      - "B. 接受挑战，制定系统的学习计划并设定里程碑 / Accept the challenge, create a systematic learning plan with milestones"
      - "C. 被动地接受安排但内心不情愿 / Passively accept the assignment but feel reluctant inside"
      - "D. 主动请求在转型期间获得导师指导或配对研究 / Proactively request mentorship or paired research during the transition"
    scoring: {"A": 1, "B": 3, "C": 2, "D": 4}
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "D最优，展示了主动学习和利用团队资源的灵活性。B也不错，有规划。A过于固执，C缺乏主动性。/ D is optimal, showing proactive learning and flexibility in leveraging team resources. B is also good, with planning. A is too rigid, C lacks initiative."

  - id: PSY_FLEX_018
    category: cognitive_flexibility
    type: likert_scale
    question: "我认为犯错是学习过程中不可避免且有价值的部分。/ I believe making mistakes is an unavoidable and valuable part of the learning process."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估对错误的态度。将错误视为学习资源的人更愿意尝试新方法，认知灵活性更高。/ Assesses attitude toward mistakes. Those who view mistakes as learning resources are more willing to try new methods and have higher cognitive flexibility."

  - id: PSY_FLEX_019
    category: cognitive_flexibility
    type: likert_scale
    question: "当面对完全未知的问题时，我感到兴奋而非恐惧。/ When facing a completely unknown problem, I feel excited rather than fearful."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估对未知的情感反应。对新问题的兴奋感是驱动创新和持续探索的内在动力。/ Assesses emotional response to the unknown. Excitement toward new problems is the intrinsic motivation driving innovation and continuous exploration."

  - id: PSY_FLEX_020
    category: cognitive_flexibility
    type: likert_scale
    question: "我认为'一直有效的方法'就是最好的方法，不需要改变。/ I believe 'a method that has always worked' is the best method and doesn't need to change."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "反向计分。评估方法论固化程度。过去有效不代表未来有效，市场的非平稳性要求方法论的持续更新。/ Reverse-scored. Assesses degree of methodological rigidity. Past effectiveness doesn't guarantee future effectiveness; market non-stationarity demands continuous methodological updates."

  - id: PSY_FLEX_021
    category: cognitive_flexibility
    type: likert_scale
    question: "我善于从看似失败的实验中提取有价值的信息。/ I am good at extracting valuable information from seemingly failed experiments."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估从失败中学习的能力。在因子挖掘中，'失败'的因子研究可能揭示市场结构的重要信息。/ Assesses ability to learn from failure. In factor mining, 'failed' factor research may reveal important information about market structure."

  - id: PSY_FLEX_022
    category: cognitive_flexibility
    type: likert_scale
    question: "我乐于接受与我不同思维方式的人合作。/ I am happy to collaborate with people who have different thinking styles from mine."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估思维多样性接纳度。量化团队通常由不同学科背景的人组成，认知多样性是团队创新的源泉。/ Assesses acceptance of thinking diversity. Quant teams usually comprise people from different disciplinary backgrounds; cognitive diversity is the source of team innovation."

  - id: PSY_FLEX_023
    category: cognitive_flexibility
    type: likert_scale
    question: "当权威人士的观点与数据不一致时，我更相信数据。/ When an authority's opinion is inconsistent with data, I trust the data more."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估证据-权威平衡。在数据驱动的量化世界中，数据应该优先于权威意见。/ Assesses evidence-authority balance. In the data-driven quantitative world, data should take priority over authority opinions."

  - id: PSY_FLEX_024
    category: cognitive_flexibility
    type: likert_scale
    question: "我能够迅速从一种市场观点切换到另一种对立的观点。/ I can quickly switch from one market view to an opposing view."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "评估认知切换速度。在市场快速变化时，能够迅速更新观点是保护资本的关键。/ Assesses cognitive switching speed. When markets change rapidly, quickly updating views is key to protecting capital."

  - id: PSY_FLEX_025
    category: cognitive_flexibility
    type: likert_scale
    question: "我宁愿在一个熟悉的领域做到极致，也不愿探索新的领域。/ I would rather excel in a familiar area than explore new fields."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "认知灵活性 Cognitive Flexibility"
    explanation: "反向计分。评估探索 vs. 利用的偏好。虽然深度专注有价值，但在量化领域纯粹的'守旧'可能导致alpha衰减后无路可走。/ Reverse-scored. Assesses explore vs. exploit preference. While deep focus has value, pure 'conservatism' in quant may leave nowhere to go after alpha decay."

  # ===========================================================================
  # TEAM COLLABORATION (20 questions)
  # ===========================================================================

  - id: PSY_TEAM_001
    category: team_collaboration
    type: likert_scale
    question: "我乐于与他人分享我的研究发现和交易思路。/ I am happy to share my research findings and trading ideas with others."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估知识分享倾向。在量化团队中，信息共享促进集体智慧，但也需要在竞争环境中找到平衡。/ Assesses knowledge sharing tendency. In quant teams, information sharing promotes collective wisdom, but balance must be found in competitive environments."

  - id: PSY_TEAM_002
    category: team_collaboration
    type: likert_scale
    question: "我更喜欢独立完成工作，不太需要团队配合。/ I prefer to complete work independently and don't need much team collaboration."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "团队协作 Team Collaboration"
    explanation: "反向计分。评估团队合作倾向。现代量化策略越来越复杂，单打独斗往往不如团队协作高效。/ Reverse-scored. Assesses teamwork tendency. Modern quantitative strategies are increasingly complex; working alone is often less efficient than team collaboration."

  - id: PSY_TEAM_003
    category: team_collaboration
    type: scenario
    question: "在团队代码审查中，你发现高级研究员的代码有一个逻辑错误。你会？/ During a team code review, you find a logical error in a senior researcher's code. What would you do?"
    options:
      - "A. 不说，怕得罪前辈 / Stay silent, afraid of offending a senior"
      - "B. 以讨论和提问的方式指出该问题，给对方台阶 / Point out the issue through discussion and questions, giving them a way to save face"
      - "C. 直接在代码审查中标记为bug / Directly mark it as a bug in the code review"
      - "D. 私下告诉他 / Tell them privately"
    scoring: {"A": 1, "B": 4, "C": 3, "D": 3}
    dimension: "团队协作 Team Collaboration"
    explanation: "B最优，平衡了直接性和社交智慧。C和D也可接受。A最差，因为代码质量不应因层级关系而妥协。/ B is optimal, balancing directness and social intelligence. C and D are also acceptable. A is worst, as code quality should not be compromised due to hierarchy."

  - id: PSY_TEAM_004
    category: team_collaboration
    type: likert_scale
    question: "我擅长向非技术背景的人解释复杂的量化概念。/ I am good at explaining complex quantitative concepts to people without technical backgrounds."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估跨职能沟通能力。量化研究员需要向PM、销售、合规等非技术团队解释策略和风险。/ Assesses cross-functional communication ability. Quant researchers need to explain strategies and risks to non-technical teams like PM, sales, and compliance."

  - id: PSY_TEAM_005
    category: team_collaboration
    type: likert_scale
    question: "当团队做出我不同意的决定时，我仍然能全力支持执行。/ When the team makes a decision I disagree with, I can still fully support its execution."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估'disagree and commit'能力。在充分表达意见后，尊重团队决定并全力执行是专业团队协作的标志。/ Assesses 'disagree and commit' ability. After fully expressing opinions, respecting the team decision and executing fully is a hallmark of professional teamwork."

  - id: PSY_TEAM_006
    category: team_collaboration
    type: likert_scale
    question: "我主动寻求他人的反馈来改进我的工作。/ I proactively seek feedback from others to improve my work."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估反馈寻求倾向。主动请求代码审查、策略评估和研究讨论的人通常产出质量更高。/ Assesses feedback-seeking tendency. People who proactively request code reviews, strategy evaluations, and research discussions typically produce higher quality output."

  - id: PSY_TEAM_007
    category: team_collaboration
    type: scenario
    question: "你负责的部分代码延迟了，影响了整个团队项目的进度。你会？/ Your part of the code is delayed, affecting the entire team project's progress. What would you do?"
    options:
      - "A. 默默加班赶工，不让团队知道有延迟 / Quietly work overtime to catch up without letting the team know about the delay"
      - "B. 尽早告知团队延迟情况，重新协调时间线和任务分配 / Inform the team about the delay early, re-coordinate the timeline and task allocation"
      - "C. 交付一个不完善的版本以按时完成 / Deliver an imperfect version to meet the deadline"
      - "D. 将延迟归咎于需求变更或依赖项 / Blame the delay on requirement changes or dependencies"
    scoring: {"A": 2, "B": 4, "C": 2, "D": 1}
    dimension: "团队协作 Team Collaboration"
    explanation: "B最优，体现了透明沟通和团队协作意识。C可能引入技术债务。D缺乏责任感。A虽有责任心但缺乏沟通。/ B is optimal, showing transparent communication and team collaboration awareness. C may introduce technical debt. D lacks accountability. A shows responsibility but lacks communication."

  - id: PSY_TEAM_008
    category: team_collaboration
    type: likert_scale
    question: "我在给他人反馈时能够做到既直接又尊重。/ I can be both direct and respectful when giving feedback to others."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估建设性反馈能力。在量化团队中，代码审查和策略讨论需要直接但不伤人的反馈方式。/ Assesses constructive feedback ability. In quant teams, code reviews and strategy discussions require direct yet non-hurtful feedback."

  - id: PSY_TEAM_009
    category: team_collaboration
    type: likert_scale
    question: "我从不和同事产生分歧。/ I never have disagreements with colleagues."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: social_desirability_check
    dimension: "社会期望性检测 Social Desirability Detection"
    explanation: "社会期望性检测题。在智力密集型团队中，分歧是正常且有建设性的。声称从无分歧可能是不诚实的回答。/ Social desirability check. In intellectually intensive teams, disagreements are normal and constructive. Claiming never to have disagreements may be dishonest."

  - id: PSY_TEAM_010
    category: team_collaboration
    type: likert_scale
    question: "当团队中出现冲突时，我会主动尝试调解。/ When conflicts arise in the team, I actively try to mediate."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估冲突调解倾向。在高压量化环境中，能主动调解冲突的人对维护团队功能至关重要。/ Assesses conflict mediation tendency. In high-pressure quant environments, those who can proactively mediate conflicts are crucial for maintaining team function."

  - id: PSY_TEAM_011
    category: team_collaboration
    type: likert_scale
    question: "我认为帮助同事提高能力最终也会提升团队整体表现。/ I believe helping colleagues improve their skills ultimately enhances the team's overall performance."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估团队发展意识。在因子团队中，知识传承和能力建设对长期竞争力至关重要。/ Assesses team development awareness. In factor teams, knowledge transfer and capability building are crucial for long-term competitiveness."

  - id: PSY_TEAM_012
    category: team_collaboration
    type: scenario
    question: "你和同事同时独立发现了一个类似的因子。在向PM汇报时，你会？/ You and a colleague independently discover a similar factor at the same time. When reporting to the PM, what would you do?"
    options:
      - "A. 赶在同事前面汇报，确保功劳归自己 / Report before your colleague to ensure the credit goes to you"
      - "B. 建议合并两人的研究成果，共同署名呈现 / Suggest merging both research results and presenting with joint credit"
      - "C. 让同事先报，自己不争功劳 / Let the colleague report first and not compete for credit"
      - "D. 各自独立汇报，让PM决定谁的版本更好 / Each report independently, letting the PM decide whose version is better"
    scoring: {"A": 1, "B": 4, "C": 2, "D": 3}
    dimension: "团队协作 Team Collaboration"
    explanation: "B最优，体现了团队优先的协作精神和资源整合能力。D也可接受。A过于自利。C虽然谦让但可能不利于最佳结果。/ B is optimal, showing team-first collaboration spirit and resource integration ability. D is also acceptable. A is too self-serving. C is modest but may not lead to the best outcome."

  - id: PSY_TEAM_013
    category: team_collaboration
    type: likert_scale
    question: "我会在团队讨论中积极贡献想法，即使它们可能不成熟。/ I actively contribute ideas in team discussions, even if they may not be fully formed."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估心理安全感下的参与度。敢于提出不成熟想法的团队环境能激发更多创新。/ Assesses participation level under psychological safety. Team environments where people dare to propose immature ideas stimulate more innovation."

  - id: PSY_TEAM_014
    category: team_collaboration
    type: likert_scale
    question: "当有人对我的代码或研究提出质疑时，我的第一反应是defensive（防御性的）。/ When someone questions my code or research, my first reaction is defensive."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: reverse
    dimension: "团队协作 Team Collaboration"
    explanation: "反向计分。评估防御性反应倾向。防御性反应阻碍建设性讨论和代码质量的改进。/ Reverse-scored. Assesses defensive reaction tendency. Defensive reactions hinder constructive discussions and code quality improvement."

  - id: PSY_TEAM_015
    category: team_collaboration
    type: likert_scale
    question: "我认为在团队中承认'我不知道'是一种力量而非弱点。/ I believe admitting 'I don't know' in a team is a strength, not a weakness."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估知识诚实度和心理安全感。在量化研究中，伪装理解可能导致严重的模型错误。/ Assesses intellectual honesty and psychological safety. In quant research, pretending to understand may lead to serious modeling errors."

  - id: PSY_TEAM_016
    category: team_collaboration
    type: likert_scale
    question: "我善于文档化自己的代码和研究过程，方便他人理解和接手。/ I am good at documenting my code and research processes to facilitate others' understanding and handover."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估知识传递意识。良好的文档习惯降低了bus factor风险，提升团队的韧性。/ Assesses knowledge transfer awareness. Good documentation habits reduce bus factor risk and enhance team resilience."

  - id: PSY_TEAM_017
    category: team_collaboration
    type: likert_scale
    question: "我能有效地与远程/异地团队成员协作。/ I can effectively collaborate with remote/distributed team members."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估远程协作能力。许多量化团队分布在全球多个办公室，远程协作是必备技能。/ Assesses remote collaboration ability. Many quant teams are distributed across multiple global offices; remote collaboration is an essential skill."

  - id: PSY_TEAM_018
    category: team_collaboration
    type: likert_scale
    question: "当团队需要有人承担额外的工作时，我通常会主动请缨。/ When the team needs someone to take on extra work, I usually volunteer."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估主动承担责任的倾向。在人数有限的量化团队中，愿意承担额外工作的人对团队运转至关重要。/ Assesses tendency to proactively take responsibility. In small quant teams, those willing to take on extra work are critical to team operations."

  - id: PSY_TEAM_019
    category: team_collaboration
    type: likert_scale
    question: "我重视代码审查过程，无论是审查别人的代码还是被审查。/ I value the code review process, whether reviewing others' code or being reviewed."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估代码质量文化的认同度。代码审查是量化系统质量保障的核心环节，也是团队知识共享的重要渠道。/ Assesses alignment with code quality culture. Code review is a core link in quant system quality assurance and an important channel for team knowledge sharing."

  - id: PSY_TEAM_020
    category: team_collaboration
    type: likert_scale
    question: "我认为团队的成功比个人表现更重要。/ I believe team success is more important than individual performance."
    options: ["1. 非常不同意 Strongly Disagree", "2. 不同意 Disagree", "3. 中立 Neutral", "4. 同意 Agree", "5. 非常同意 Strongly Agree"]
    scoring_direction: positive
    dimension: "团队协作 Team Collaboration"
    explanation: "评估集体 vs. 个人取向。在因子团队中，一个人的alpha可能来自另一个人构建的基础设施或数据管道。/ Assesses collective vs. individual orientation. In factor teams, one person's alpha may come from the infrastructure or data pipeline another person built."
