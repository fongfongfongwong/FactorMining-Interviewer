version: "3.8"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://interviewer:interviewer@db:5432/interviewer
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./questions:/app/questions:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: interviewer
      POSTGRES_PASSWORD: interviewer
      POSTGRES_DB: interviewer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
